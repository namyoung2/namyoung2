<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수집가들 — 좋은 문장은 다시 찾아옵니다</title>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root{
    --bg: #FFFFFF;
    --surface: #FCFCFC;
    --text: #181818;
    --text-secondary: #666666;
    --text-tertiary: #A0A0A0;
    --border: #ECECEC;
    --accent: #2B2B2B;
    --hover: #F5F5F5;
    --danger: #B23A2E;
    --danger-soft: #F5E6E4;
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", sans-serif;
    min-height: 100vh;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap{ max-width: 720px; margin: 0 auto; padding: 56px 24px 140px; }


  /* ── 단일 책 Hero ─────────────────────────── */
  .book-hero{ margin-bottom: 8px; }
  .hero-nav{
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
  }
  .hero-arrow{
    flex-shrink: 0;
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-secondary);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items:center; justify-content:center;
    transition: background 0.15s ease, color 0.15s ease, opacity 0.15s ease;
  }
  .hero-arrow:hover{ background: var(--hover); color: var(--text); }
  .hero-arrow:disabled{ opacity: 0.2; cursor: default; }
  .hero-arrow.hidden{ visibility: hidden; }

  .hero-book{
    flex-shrink: 0;
    width: 240px;
    text-align: center;
    touch-action: pan-y;
    animation: heroFade 0.18s ease both;
  }
  .hero-cover-wrap{
    position: relative;
    width: 184px;
    margin: 0 auto 20px;
  }
  .hero-cover-wrap::before{
    content: "";
    position: absolute;
    left: 50%;
    bottom: -8px;
    transform: translateX(-50%);
    width: 138px;
    height: 26px;
    background: radial-gradient(ellipse at center, rgba(24,24,24,0.16) 0%, rgba(24,24,24,0) 72%);
    z-index: 0;
  }
  .hero-cover{
    position: relative;
    z-index: 1;
    width: 184px;
    height: 264px;
    border-radius: 6px;
    overflow: hidden;
    background: var(--hover);
    box-shadow: 0 10px 22px rgba(24,24,24,0.12);
  }
  .hero-cover img{
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .hero-cover.no-cover{
    display:flex; align-items:center; justify-content:center;
    font-size: 36px;
    font-weight: 600;
    color: var(--text-tertiary);
  }
  .hero-title{
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 5px;
    line-height: 1.4;
  }
  .hero-meta{
    font-size: 12.5px;
    color: var(--text-tertiary);
  }
  @keyframes heroFade{
    from{ opacity: 0; transform: scale(0.98); }
    to{ opacity: 1; transform: scale(1); }
  }

  .hero-manage{
    display: flex;
    justify-content: center;
    margin-bottom: 10px;
  }
  .hero-add-book{
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-tertiary);
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
    display: flex; align-items:center; justify-content:center;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .hero-add-book:hover{ background: var(--hover); color: var(--text); }

  /* ── 하단 CTA ─────────────────────────────── */
  .cta-row{
    position: fixed;
    left: 0; right: 0;
    bottom: max(20px, env(safe-area-inset-bottom));
    z-index: 60;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 0 20px;
    pointer-events: none;
  }
  .cta-btn{
    pointer-events: auto;
    border: none;
    border-radius: 999px;
    font-family: 'Pretendard', sans-serif;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  }
  .cta-primary{
    background: var(--accent);
    color: #FFFFFF;
    font-size: 14px;
    font-weight: 700;
    padding: 14px 26px;
    box-shadow: 0 6px 18px rgba(24,24,24,0.26);
  }
  .cta-primary:hover{ box-shadow: 0 8px 22px rgba(24,24,24,0.32); }
  .cta-btn:active{ transform: scale(0.96); }

  /* ── 책 읽기 뷰 ───────────────────────────── */
  .reading-view{
    max-width: 560px;
    margin: 32px auto 0;
  }
  .reading-entry{
    padding: 34px 4px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .reading-entry:last-child{ border-bottom: none; }
  .reading-text{
    font-size: 16px;
    line-height: 2;
    color: var(--text);
    margin: 0 0 8px;
    padding-right: 20px;
  }
  .reading-page{
    font-size: 11.5px;
    color: var(--text-tertiary);
    margin: 0;
  }
  .quote-entry-note{
    margin-top: 10px;
    font-size: 12px;
    color: var(--text-secondary);
    background: var(--hover);
    border-radius: 6px;
    padding: 9px 11px;
    line-height: 1.65;
  }
  .quote-entry-note .note-label{
    display:block;
    font-size: 10.5px;
    font-weight: 700;
    color: var(--text-tertiary);
    margin-bottom: 3px;
  }
  .reading-menu{
    position: absolute;
    top: 32px;
    right: 0;
    width: 24px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-tertiary);
    opacity: 0.2;
    font-size: 15px;
    letter-spacing: 1px;
    transition: opacity 0.15s ease, color 0.15s ease;
  }
  .reading-menu:hover{ opacity: 1; color: var(--text); }

  .echo-link{
    display: inline-block;
    margin-top: 12px;
    background: none; border: none; cursor: pointer;
    font-size: 11.5px;
    color: var(--text-tertiary);
    padding: 2px 0;
    opacity: 0.75;
    transition: color 0.15s ease, opacity 0.15s ease;
  }
  .echo-link:hover{ color: var(--accent); opacity: 1; }

  .echo-detail{
    display: none;
    flex-direction: column;
    gap: 16px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px dashed var(--border);
  }
  .echo-detail.open{ display: flex; }
  .echo-book{
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .echo-quote{
    font-size: 13.5px;
    line-height: 1.7;
    color: var(--text);
    margin: 0 0 3px;
  }
  .echo-quote-page{
    font-size: 11px;
    color: var(--text-tertiary);
    margin: 0 0 10px;
  }
  .echo-quote:last-of-type{ margin-bottom: 0; }

  .empty{
    text-align:center;
    padding: 64px 20px;
    color: var(--text-tertiary);
    font-size: 13.5px;
    line-height: 1.9;
  }
  .empty-title{
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 18px;
  }
  .empty-cta{
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 999px;
    padding: 10px 20px;
    font-family: 'Pretendard', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .empty-cta:hover{ background: var(--hover); }

  /* ── 확인 다이얼로그 ──────────────────────── */
  .modal-overlay{
    position: fixed;
    inset: 0;
    background: rgba(31,35,40,0.32);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 100;
  }
  .modal-overlay.open{ display: flex; }
  .modal-box{
    background: var(--surface);
    border-radius: 14px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 12px 32px rgba(31,35,40,0.16);
    animation: fadeIn 0.18s ease;
  }
  .confirm-box{
    max-width: 300px;
    padding: 26px 22px 20px;
  }
  .confirm-message{
    margin: 0 0 20px;
    font-size: 14px;
    line-height: 1.75;
    color: var(--text);
    text-align: center;
  }
  .confirm-actions{ display:flex; gap: 8px; }
  .confirm-btn{
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 0;
    font-family: 'Pretendard', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    background: var(--surface);
  }
  .confirm-cancel{ color: var(--text-secondary); }
  .confirm-cancel:hover{ background: var(--hover); }
  .confirm-ok{ color: var(--danger); border-color: var(--danger-soft); background: var(--danger-soft); }
  .confirm-ok:hover{ background: #EBDAD6; }

  @keyframes fadeIn{
    from{ opacity: 0; transform: translateY(2px); }
    to{ opacity: 1; transform: translateY(0); }
  }

  /* ── Bottom Sheet 공통 ────────────────────── */
  .sheet-overlay{
    position: fixed;
    inset: 0;
    background: rgba(24,24,24,0.32);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 90;
  }
  .sheet-overlay.open{ display: flex; }
  .bottom-sheet{
    width: 100%;
    max-width: 480px;
    max-height: 82vh;
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    box-shadow: 0 -8px 30px rgba(24,24,24,0.14);
    transform: translateY(100%);
    transition: transform 0.28s ease;
    padding-bottom: max(6px, env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sheet-overlay.open .bottom-sheet{
    transform: translateY(0);
  }
  .sheet-handle{
    flex-shrink: 0;
    width: 36px;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    margin: 12px auto 4px;
  }
  .sheet-title{
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin: 4px 20px 14px;
  }
  .sheet-body{
    padding: 0 20px 20px;
    overflow-y: auto;
  }

  /* ── 문장 남기기 시트 ─────────────────────── */
  .callout-body{
    padding: 8px 20px 20px;
  }
  .sheet-book-context{
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--hover);
    border-radius: 10px;
    padding: 8px 10px;
    margin-bottom: 14px;
    position: relative;
  }
  .sheet-book-cover{
    flex-shrink: 0;
    width: 28px;
    height: 40px;
    border-radius: 3px;
    overflow: hidden;
    background: var(--border);
    display: flex; align-items:center; justify-content:center;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-tertiary);
  }
  .sheet-book-cover img{ width:100%; height:100%; object-fit:cover; display:block; }
  .sheet-book-select{
    flex: 1;
    appearance: none;
    -webkit-appearance: none;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Pretendard', sans-serif;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    padding-right: 18px;
  }
  .sheet-book-change{
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 11px;
    color: var(--text-tertiary);
    pointer-events: none;
  }
  .input-row{
    display: flex;
    align-items: center;
    gap: 8px;
  }
  textarea#quoteInput{
    flex: 1;
    width: 100%;
    border: none;
    background: transparent;
    font-family: 'Pretendard', sans-serif;
    font-size: 15.5px;
    line-height: 1.6;
    color: var(--text);
    resize: none;
    min-height: 22px;
    max-height: none;
    overflow: hidden;
    outline: none;
    padding: 6px 0;
  }
  textarea#quoteInput::placeholder{ color: var(--text-tertiary); }

  button#submitBtn{
    flex-shrink: 0;
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    color: var(--text-tertiary);
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: color 0.15s ease, background 0.15s ease;
  }
  button#submitBtn:hover{ color: var(--accent); background: var(--hover); }
  button#submitBtn:active{ opacity: 0.7; }
  button#submitBtn:disabled{ opacity: 0.35; cursor: default; }

  .meta-row{
    display:flex; gap: 8px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .meta-field{
    display:flex; align-items:center; gap: 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 11px;
    position: relative;
    flex: 1;
  }
  .meta-field input{
    border: none;
    background: transparent;
    font-family: 'Pretendard', sans-serif;
    font-size: 13px;
    color: var(--text);
    outline: none;
    width: 100%;
  }
  .meta-field input::placeholder{ color: var(--text-tertiary); }

  .status-msg{
    font-size: 12px;
    color: var(--text-secondary);
    min-height: 0;
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.3s ease, max-height 0.3s ease, margin 0.3s ease;
  }
  .status-msg.show{
    opacity: 1;
    max-height: 30px;
    margin-top: 8px;
  }
  .status-msg.error{ color: var(--danger); }
  .status-msg.loading{
    color: var(--text-tertiary);
    animation: gentlePulse 1.6s ease-in-out infinite;
  }
  @keyframes gentlePulse{
    0%, 100%{ opacity: 0.5; }
    50%{ opacity: 1; }
  }

  /* ── 책 검색 시트 ─────────────────────────── */
  .book-search-input{
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    font-family: 'Pretendard', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    margin-bottom: 14px;
    background: var(--bg);
  }
  .book-search-input:focus{ border-color: var(--accent); }
  .search-hint{
    text-align: center;
    padding: 30px 10px;
    font-size: 13px;
    color: var(--text-tertiary);
  }
  .search-results{
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .search-result{
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 9px 8px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .search-result:hover{ background: var(--hover); }
  .search-result.added{ cursor: default; opacity: 0.55; }
  .search-result-cover{
    flex-shrink: 0;
    width: 36px;
    height: 51px;
    border-radius: 3px;
    overflow: hidden;
    background: var(--border);
    display: flex; align-items:center; justify-content:center;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-tertiary);
  }
  .search-result-cover img{ width:100%; height:100%; object-fit:cover; display:block; }
  .search-result-info{ flex: 1; min-width: 0; }
  .search-result-title{
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 2px;
  }
  .search-result-authors{
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 1px;
  }
  .search-result-meta{
    font-size: 11px;
    color: var(--text-tertiary);
  }
  .search-result-action{
    flex-shrink: 0;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
  }
  .search-result.added .search-result-action{ color: var(--text-tertiary); }

  /* ── 저장 완료 토스트 ─────────────────────── */
  .toast{
    position: fixed;
    top: max(20px, env(safe-area-inset-top));
    left: 50%;
    transform: translateX(-50%) translateY(-6px);
    background: var(--accent);
    color: #FFFFFF;
    font-size: 12.5px;
    font-weight: 600;
    padding: 9px 18px;
    border-radius: 999px;
    box-shadow: 0 6px 18px rgba(24,24,24,0.2);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
    z-index: 200;
    white-space: nowrap;
  }
  .toast.show{
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── 문장 ··· 액션 시트 ───────────────────── */
  .action-sheet .sheet-body{
    padding: 4px 20px 20px;
  }
  .action-item{
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    background: none;
    border: none;
    border-bottom: 1px solid var(--border);
    padding: 15px 6px;
    font-family: 'Pretendard', sans-serif;
    font-size: 14.5px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    text-align: left;
  }
  .action-item:last-child{ border-bottom: none; }
  .action-item:hover{ background: var(--hover); }
  .action-item.danger{ color: var(--danger); }

  footer.note{
    margin-top: 56px;
    text-align:center;
    font-size: 11px;
    color: var(--text-tertiary);
  }

  /* iOS Safari는 input/textarea의 font-size가 16px 미만이면 포커스 시 화면을 자동으로 확대함.
     사용자의 핀치 줌 기능 자체는 막지 않고(viewport에 maximum-scale/user-scalable 제한 없음),
     입력창 폰트 크기만 16px로 맞춰서 원치 않는 자동 확대만 방지함. */
  @media (max-width: 768px){
    input,
    textarea,
    select{
      font-size: 16px !important;
    }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="book-hero" id="bookHero"></div>

  <div class="reading-view" id="readingView"></div>

</div>

<div class="toast" id="toastMsg"></div>

<div class="cta-row">
  <button class="cta-btn cta-primary" id="addQuoteBtn">문장 남기기</button>
</div>

<div class="modal-overlay" id="confirmOverlay">
  <div class="modal-box confirm-box">
    <p class="confirm-message" id="confirmMessage"></p>
    <div class="confirm-actions">
      <button class="confirm-btn confirm-cancel" id="confirmCancel">취소</button>
      <button class="confirm-btn confirm-ok" id="confirmOk">꺼내기</button>
    </div>
  </div>
</div>

<!-- 문장 남기기 -->
<div class="sheet-overlay" id="sheetOverlay">
  <div class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="callout-body">
      <div class="sheet-book-context">
        <span class="sheet-book-cover" id="sheetBookCover"></span>
        <select id="sheetBookSelect" class="sheet-book-select"></select>
        <span class="sheet-book-change">▾</span>
      </div>
      <div class="input-row">
        <textarea id="quoteInput" rows="1" placeholder="기억하고 싶은 문장을 남겨보세요."></textarea>
        <button id="submitBtn" title="기록하기" aria-label="기록하기">→</button>
      </div>
      <div class="meta-row">
        <div class="meta-field">
          <input id="pageInput" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="페이지">
        </div>
      </div>
      <div class="status-msg" id="statusMsg"></div>
    </div>
  </div>
</div>

<!-- 책 추가하기 -->
<div class="sheet-overlay" id="bookSearchOverlay">
  <div class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-body">
      <div class="sheet-title">책 추가하기</div>
      <input type="text" id="bookSearchInput" class="book-search-input" placeholder="책 제목으로 검색" autocomplete="off">
      <div class="search-results" id="bookSearchResults"></div>
    </div>
  </div>
</div>

<!-- 문장 ··· 액션 (수정 / 꺼내기) -->
<div class="sheet-overlay" id="entryActionOverlay">
  <div class="bottom-sheet action-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-body">
      <button class="action-item" id="actionEditBtn">✏️ 수정하기</button>
      <button class="action-item danger" id="actionDeleteBtn">🗑️ 꺼내기</button>
    </div>
  </div>
</div>

<!-- 문장 수정 -->
<div class="sheet-overlay" id="editSheetOverlay">
  <div class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="callout-body">
      <div class="input-row">
        <textarea id="editQuoteInput" rows="1"></textarea>
        <button id="editSubmitBtn" title="저장하기" aria-label="저장하기">→</button>
      </div>
      <div class="meta-row">
        <div class="meta-field">
          <input id="editPageInput" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="페이지">
        </div>
      </div>
      <div class="status-msg" id="editStatusMsg"></div>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'truth-groups';

// 👇 Cloudflare Worker 배포 후, 여기에 본인 Worker 주소를 넣어주세요.
// (claude.ai 아티팩트 안에서 미리보기할 때는 이 값이 쓰이지 않고 자동으로 내장 방식이 사용돼요)
const WORKER_URL = "https://truth-collector-proxy.dingapark1.workers.dev";

// ⚠️ 보안 안내: 아래 SITE_SECRET은 이 HTML 파일 안에 평문으로 들어있습니다.
// GitHub Pages에 올라간 순간 "누구나 페이지 소스에서 볼 수 있는 값"이 되므로,
// 엄밀히는 "비밀"이 아니라 "약한 접근 제한 토큰" 정도로 취급해야 합니다.
// 절대 이 값을 console.log 등으로 출력하지 마세요. (아래 코드 어디에서도 출력하지 않습니다)
// 더 안전하게 만들고 싶다면 Worker 쪽에서 Origin 검증 강화, 요청 속도 제한(rate limit),
// 주기적인 SITE_SECRET 교체 등을 함께 적용하는 것을 권장합니다.
const SITE_SECRET = "my-cat-2026";

const IS_CLAUDE_ARTIFACT = !!window.storage;

// claude.ai 아티팩트 안에서는 window.storage를,
// 깃허브 페이지 등 밖에서는 Worker + Cloudflare KV(클라우드 저장소)를 사용해서
// 어느 기기에서 열어도 같은 데이터를 볼 수 있게 함
const storageAdapter = {
  async get(key){
    if(IS_CLAUDE_ARTIFACT){
      try{ return await window.storage.get(key, false); }catch(e){ return null; }
    }
    try{
      const res = await fetch(WORKER_URL + "/data", {
        method: "GET",
        headers: { "X-Site-Secret": SITE_SECRET }
      });
      if(!res.ok) return null;
      const value = await res.text();
      return { value };
    }catch(e){
      return null;
    }
  },
  async set(key, value){
    if(IS_CLAUDE_ARTIFACT){
      return await window.storage.set(key, value, false);
    }
    try{
      await fetch(WORKER_URL + "/data", {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Site-Secret": SITE_SECRET },
        body: value
      });
    }catch(e){
      return null;
    }
    return { key, value };
  }
};

// groups: 기존 "문장 의미 그룹" 데이터 (AI 그룹핑 대상, 그대로 유지)
// books: 새로 추가된 "내 서재" 컬렉션. bookGroups.book(제목 문자열)과는
//        정규화된 제목으로 매칭되며, 문장이 하나도 없어도 존재할 수 있음.
let groups = [];
let books = [];
let currentBookId = null;

const bookHero = document.getElementById('bookHero');
const readingView = document.getElementById('readingView');

const quoteInput = document.getElementById('quoteInput');
const pageInput = document.getElementById('pageInput');
const submitBtn = document.getElementById('submitBtn');
const statusMsg = document.getElementById('statusMsg');

const ctaAddQuote = document.getElementById('addQuoteBtn');

const sheetOverlay = document.getElementById('sheetOverlay');
const sheetBookCover = document.getElementById('sheetBookCover');
const sheetBookSelect = document.getElementById('sheetBookSelect');

const bookSearchOverlay = document.getElementById('bookSearchOverlay');
const bookSearchInput = document.getElementById('bookSearchInput');
const bookSearchResults = document.getElementById('bookSearchResults');

const confirmOverlay = document.getElementById('confirmOverlay');
const confirmMessage = document.getElementById('confirmMessage');
const confirmCancel = document.getElementById('confirmCancel');
const confirmOk = document.getElementById('confirmOk');
let confirmResolver = null;

function showConfirm(message){
  confirmMessage.textContent = message;
  confirmOverlay.classList.add('open');
  return new Promise((resolve) => {
    confirmResolver = resolve;
  });
}
function resolveConfirm(result){
  confirmOverlay.classList.remove('open');
  if(confirmResolver){
    confirmResolver(result);
    confirmResolver = null;
  }
}
confirmOk.addEventListener('click', () => resolveConfirm(true));
confirmCancel.addEventListener('click', () => resolveConfirm(false));
confirmOverlay.addEventListener('click', (e) => {
  if(e.target === confirmOverlay) resolveConfirm(false);
});

let statusTimer = null;
function showStatus(text, type, autoHideMs){
  clearTimeout(statusTimer);
  statusMsg.classList.remove('loading','success','error','show');
  statusMsg.textContent = text;
  if(type) statusMsg.classList.add(type);
  void statusMsg.offsetWidth; // 리플로우를 강제로 일으켜 트랜지션 재시작
  statusMsg.classList.add('show');
  if(autoHideMs){
    statusTimer = setTimeout(() => {
      statusMsg.classList.remove('show');
    }, autoHideMs);
  }
}

const toastEl = document.getElementById('toastMsg');
let toastTimer = null;
function showToast(text, ms){
  clearTimeout(toastTimer);
  toastEl.textContent = text;
  void toastEl.offsetWidth;
  toastEl.classList.add('show');
  toastTimer = setTimeout(() => {
    toastEl.classList.remove('show');
  }, ms || 1200);
}

function autoResizeQuoteInput(){
  quoteInput.style.height = 'auto';
  quoteInput.style.height = quoteInput.scrollHeight + 'px';
}
quoteInput.addEventListener('input', autoResizeQuoteInput);
autoResizeQuoteInput();

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function normalizeTitle(title){
  return (title || '').trim().replace(/\s+/g, ' ').toLowerCase();
}

// 표지 컨테이너에 이미지를 넣되, 로드 실패 시 이니셜 폴백으로 안전하게 전환.
// 검색 결과 썸네일과 Hero 표지 모두 이 함수 하나로 통일해서 처리함.
function renderCoverInto(containerEl, url, initialLetter){
  if(!containerEl) return;
  containerEl.innerHTML = '';
  if(!url){
    containerEl.classList.add('no-cover');
    containerEl.textContent = initialLetter || '';
    return;
  }
  const img = document.createElement('img');
  img.src = url;
  img.alt = '';
  img.addEventListener('error', () => {
    containerEl.classList.add('no-cover');
    containerEl.innerHTML = '';
    containerEl.textContent = initialLetter || '';
  }, { once: true });
  containerEl.classList.remove('no-cover');
  containerEl.appendChild(img);
}

// 도서 검색은 브라우저에서 Google Books를 직접 호출하지 않고,
// Cloudflare Worker의 /books/search 프록시를 거침 (CORS/차단 문제 회피 + 표지 정규화).
async function searchBooksThroughWorker(query){
  const url = `${WORKER_URL}/books/search?q=${encodeURIComponent(query)}`;
  let res;
  try{
    res = await fetch(url);
  }catch(networkErr){
    console.error('도서 API 네트워크 오류', { name: networkErr && networkErr.name, message: networkErr && networkErr.message, url });
    throw networkErr;
  }

  const raw = await res.text();
  if(!res.ok){
    console.error('도서 검색 실패', { url, status: res.status, response: raw.slice(0, 300) });
    throw new Error('books search http ' + res.status);
  }

  let data;
  try{
    data = JSON.parse(raw);
  }catch(e){
    console.error('도서 검색 응답 파싱 실패', { url, response: raw.slice(0, 300) });
    throw new Error('invalid search response');
  }

  return Array.isArray(data.items) ? data.items : [];
}

// 표지가 비어있는 책 하나에 대해서만, 필요할 때(주로 Hero에 표시될 때) 한 번 보완.
// 성공하면 books 컬렉션의 coverUrl에 영구 저장해서 다음부터는 다시 조회하지 않음.
async function resolveBookCover(book){
  if(book.coverUrl) return book.coverUrl;
  try{
    const items = await searchBooksThroughWorker(book.title);
    const norm = normalizeTitle(book.title);
    const match = items.find(it => normalizeTitle(it.title) === norm) || items[0];
    if(match && match.coverUrl){
      book.coverUrl = match.coverUrl;
      saveAll(); // 화면을 막지 않도록 결과를 기다리지 않고 백그라운드로 저장
      return match.coverUrl;
    }
  }catch(e){
    // searchBooksThroughWorker에서 이미 자세한 원인을 콘솔에 남김
  }
  return null;
}

function loadCurrentBookId(){
  try{ return localStorage.getItem('current-book-id') || null; }catch(e){ return null; }
}
function saveCurrentBookId(id){
  try{ localStorage.setItem('current-book-id', id || ''); }catch(e){}
}

function migrateGroup(g){
  if(g.bookGroups) return g;
  const map = new Map();
  (g.sources || []).forEach(s => {
    const key = (s.book || '').trim();
    if(!map.has(key)) map.set(key, []);
    map.get(key).push({ text: s.text, page: s.page || '', ts: s.ts || 0 });
  });
  g.bookGroups = Array.from(map.entries()).map(([book, quotes]) => ({ book, quotes }));
  if(g.bookGroups.length === 0){
    g.bookGroups = [{ book: '', quotes: [] }];
  }
  g.count = g.bookGroups.length;
  delete g.sources;
  return g;
}

// bookGroups에만 존재하고 아직 books 컬렉션에 없는 책들을 1회성으로 옮겨 담음
function migrateBooksFromGroups(){
  const seen = new Set(books.map(b => normalizeTitle(b.title)));
  let changed = false;
  groups.forEach(g => {
    g.bookGroups.forEach(bg => {
      const title = (bg.book || '').trim();
      if(!title) return;
      const norm = normalizeTitle(title);
      if(!seen.has(norm)){
        seen.add(norm);
        books.push({
          id: 'book_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
          title,
          authors: [],
          publisher: '',
          publishedDate: '',
          coverUrl: '',
          externalId: '',
          addedAt: Date.now()
        });
        changed = true;
      }
    });
  });
  return changed;
}

// 예전 버전에서 "표지 없음"을 빈 문자열로 영구 캐시하던 버그의 잔여 데이터를 1회성 정리.
// (이제는 book.coverUrl에 직접 저장하는 방식으로 바뀌어서 이 로컬 캐시 자체를 더 이상 사용하지 않음)
try{
  for(let i = localStorage.length - 1; i >= 0; i--){
    const k = localStorage.key(i);
    if(k && k.startsWith('cover:')){
      localStorage.removeItem(k);
    }
  }
}catch(e){}

async function loadAll(){
  let changed = false;
  try{
    const res = await storageAdapter.get(STORAGE_KEY);
    let parsed = res && res.value ? JSON.parse(res.value) : null;

    if(Array.isArray(parsed)){
      // 예전 저장 형식(문장 배열만 저장)에서 새 형식({groups, books})으로 전환
      groups = parsed;
      books = [];
      changed = true;
    } else if(parsed && typeof parsed === 'object'){
      groups = Array.isArray(parsed.groups) ? parsed.groups : [];
      books = Array.isArray(parsed.books) ? parsed.books : [];
    } else {
      groups = [];
      books = [];
    }

    // 예전 버전(브라우저 저장 방식)을 쓰던 시절, 이 브라우저에만 남아있던 데이터가 있다면
    // 클라우드가 비어있을 때 한 번만 끌어올려서 동기화
    if(!IS_CLAUDE_ARTIFACT && groups.length === 0 && books.length === 0){
      const legacyRaw = localStorage.getItem(STORAGE_KEY);
      if(legacyRaw){
        try{
          const legacyParsed = JSON.parse(legacyRaw);
          if(Array.isArray(legacyParsed) && legacyParsed.length > 0){
            groups = legacyParsed;
            changed = true;
          } else if(legacyParsed && Array.isArray(legacyParsed.groups)){
            groups = legacyParsed.groups;
            books = Array.isArray(legacyParsed.books) ? legacyParsed.books : [];
            changed = true;
          }
        }catch(e){}
      }
    }

    // 예전 데이터 구조(sources 배열)를 새 구조(책 단위 bookGroups)로 1회성 변환
    groups.forEach(g => { if(!g.bookGroups) changed = true; });
    groups = groups.map(g => migrateGroup(g));

    // bookGroups에만 있던 책들을 books 컬렉션으로 1회성 이관
    if(migrateBooksFromGroups()) changed = true;

    // 🧪 테스트 전용: claude.ai 미리보기(IS_CLAUDE_ARTIFACT) 안에서만,
    // 책이 하나도 없을 때 구글 Books API 없이도 바로 테스트할 수 있도록 책 1권을 임시로 넣어줌.
    // 실제 깃허브 페이지 배포본에서는 IS_CLAUDE_ARTIFACT가 항상 false라 이 코드는 절대 실행되지 않음.
    if(IS_CLAUDE_ARTIFACT && books.length === 0){
      books.push({
        id: 'book_test_seed',
        title: '데미안',
        authors: ['헤르만 헤세'],
        publisher: '민음사',
        publishedDate: '2000',
        coverUrl: '',
        externalId: '',
        addedAt: Date.now()
      });
      changed = true;
    }

  }catch(e){
    console.error('데이터 로드 실패:', e);
    groups = [];
    books = [];
  }

  if(changed){
    await saveAll();
  }

  currentBookId = loadCurrentBookId();
  renderApp();
}

async function saveAll(){
  try{
    await storageAdapter.set(STORAGE_KEY, JSON.stringify({ groups, books }));
  }catch(e){
    console.error('저장 실패:', e);
    showStatus('기록을 저장하지 못했습니다. 잠시 후 다시 시도해주세요.', 'error');
  }
}

function getSortedBooks(){
  return [...books].sort((a, b) => (b.addedAt || 0) - (a.addedAt || 0));
}

function getBookSentences(book){
  const norm = normalizeTitle(book.title);
  const entries = [];
  groups.forEach(g => {
    g.bookGroups.forEach((bg, bidx) => {
      if(normalizeTitle(bg.book || '') !== norm) return;
      bg.quotes.forEach((q, qidx) => {
        entries.push({
          text: q.text, page: q.page, note: q.note, ts: q.ts || 0,
          groupId: g.id, groupCount: g.count, bidx, qidx
        });
      });
    });
  });
  entries.sort((a, c) => {
    const pa = parseInt(a.page, 10), pc = parseInt(c.page, 10);
    const av = !isNaN(pa), cv = !isNaN(pc);
    if(av && cv) return pa - pc;
    if(av) return -1;
    if(cv) return 1;
    return 0;
  });
  return entries;
}

// ── 메인 화면 렌더링 ─────────────────────────
function renderApp(){
  const sortedBooks = getSortedBooks();

  if(sortedBooks.length === 0){
    bookHero.innerHTML = '';
    readingView.innerHTML = `
      <div class="empty">
        <div class="empty-title">아직 추가한 책이 없습니다.</div>
        <button class="empty-cta" id="emptyAddBookBtn">첫 책 추가하기</button>
      </div>`;
    const btn = document.getElementById('emptyAddBookBtn');
    if(btn) btn.addEventListener('click', openBookSearch);
    return;
  }

  let idx = sortedBooks.findIndex(b => b.id === currentBookId);
  if(idx < 0) idx = 0;
  currentBookId = sortedBooks[idx].id;
  saveCurrentBookId(currentBookId);

  renderHero(sortedBooks, idx);
  renderReadingView(sortedBooks[idx]);
}

function renderHero(sortedBooks, idx){
  const book = sortedBooks[idx];
  const sentenceCount = getBookSentences(book).length;
  const singleBook = sortedBooks.length <= 1;

  const authors = (book.authors || []).filter(Boolean).join(', ');
  const metaText = authors ? `${authors} · 문장 ${sentenceCount}개` : `문장 ${sentenceCount}개`;

  bookHero.innerHTML = `
    <div class="hero-manage">
      <button class="hero-add-book" id="heroAddBookBtn" title="책 추가하기">+</button>
    </div>
    <div class="hero-nav">
      <button class="hero-arrow ${singleBook ? 'hidden' : ''}" id="heroPrev" title="이전 책" ${(singleBook || idx === 0) ? 'disabled' : ''}>‹</button>
      <div class="hero-book" id="heroBook">
        <div class="hero-cover-wrap">
          <div class="hero-cover no-cover" id="heroCover">${escapeHtml(book.title.slice(0,1))}</div>
        </div>
        <div class="hero-title">${escapeHtml(book.title)}</div>
        <div class="hero-meta">${escapeHtml(metaText)}</div>
      </div>
      <button class="hero-arrow ${singleBook ? 'hidden' : ''}" id="heroNext" title="다음 책" ${(singleBook || idx === sortedBooks.length - 1) ? 'disabled' : ''}>›</button>
    </div>
  `;

  document.getElementById('heroPrev').addEventListener('click', () => goToBook(idx - 1));
  document.getElementById('heroNext').addEventListener('click', () => goToBook(idx + 1));
  document.getElementById('heroAddBookBtn').addEventListener('click', openBookSearch);

  const coverEl = document.getElementById('heroCover');
  if(book.coverUrl){
    renderCoverInto(coverEl, book.coverUrl, book.title.slice(0,1));
  } else {
    coverEl.classList.add('no-cover');
    coverEl.textContent = book.title.slice(0,1);
    resolveBookCover(book).then(url => {
      if(url && coverEl.isConnected){
        renderCoverInto(coverEl, url, book.title.slice(0,1));
      }
    });
  }

  // 좌우 스와이프 지원 (모바일)
  if(!singleBook){
    const heroBookEl = document.getElementById('heroBook');
    let touchStartX = null;
    heroBookEl.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
    }, { passive: true });
    heroBookEl.addEventListener('touchend', (e) => {
      if(touchStartX === null) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      touchStartX = null;
      if(Math.abs(dx) < 40) return;
      if(dx > 0) goToBook(idx - 1); else goToBook(idx + 1);
    }, { passive: true });
  }
}

function goToBook(newIdx){
  const sortedBooks = getSortedBooks();
  if(newIdx < 0 || newIdx >= sortedBooks.length) return;
  currentBookId = sortedBooks[newIdx].id;
  saveCurrentBookId(currentBookId);
  renderApp();
}

// 데스크톱 키보드 좌우 방향키 (입력 중일 때는 무시)
document.addEventListener('keydown', (e) => {
  const tag = document.activeElement && document.activeElement.tagName;
  if(tag === 'INPUT' || tag === 'TEXTAREA') return;
  if(e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
  const sortedBooks = getSortedBooks();
  if(sortedBooks.length === 0) return;
  const idx = sortedBooks.findIndex(b => b.id === currentBookId);
  goToBook(e.key === 'ArrowLeft' ? idx - 1 : idx + 1);
});

function renderReadingView(book){
  const entries = getBookSentences(book);

  if(entries.length === 0){
    readingView.innerHTML = `
      <div class="empty">
        <div class="empty-title">아직 남긴 문장이 없습니다.</div>
        <button class="empty-cta" id="emptyAddQuoteBtn">문장 남기기</button>
      </div>`;
    const btn = document.getElementById('emptyAddQuoteBtn');
    if(btn) btn.addEventListener('click', openQuoteSheet);
    return;
  }

  readingView.innerHTML = entries.map((e, entryIdx) => {
    const otherCount = (e.groupCount || 1) - 1;
    return `
    <div class="reading-entry">
      <button class="reading-menu" data-gid="${e.groupId}" data-bidx="${e.bidx}" data-qidx="${e.qidx}" title="더보기">···</button>
      <p class="reading-text">${escapeHtml(e.text)}</p>
      ${e.page ? `<p class="reading-page">${escapeHtml(e.page)}p</p>` : ''}
      ${e.note ? `<div class="quote-entry-note"><span class="note-label">그때의 생각</span>${escapeHtml(e.note)}</div>` : ''}
      ${otherCount > 0 ? `
        <button class="echo-link" data-gid="${e.groupId}" data-echo="echo-${entryIdx}">같은 생각을 한 책 ${otherCount}권 →</button>
        <div class="echo-detail" id="echo-${entryIdx}"></div>
      ` : ''}
    </div>
    `;
  }).join('');

  readingView.querySelectorAll('.echo-link').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const echoEl = document.getElementById(btn.dataset.echo);
      const opening = !echoEl.classList.contains('open');
      if(opening && !echoEl.dataset.filled){
        echoEl.dataset.filled = '1';
        const g = groups.find(x => x.id === btn.dataset.gid);
        if(g){
          echoEl.innerHTML = g.bookGroups
            .filter(bg => normalizeTitle(bg.book) !== normalizeTitle(book.title))
            .map(bg => `
              <div>
                <div class="echo-book">${escapeHtml(bg.book || '출처 미상')}</div>
                ${bg.quotes.map(q => `
                  <p class="echo-quote">${escapeHtml(q.text)}</p>
                  ${q.page ? `<p class="echo-quote-page">${escapeHtml(q.page)}p</p>` : ''}
                `).join('')}
              </div>
            `).join('');
        }
      }
      echoEl.classList.toggle('open');
    });
  });

  readingView.querySelectorAll('.reading-menu').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      openEntryAction({
        gid: btn.dataset.gid,
        bidx: parseInt(btn.dataset.bidx, 10),
        qidx: parseInt(btn.dataset.qidx, 10)
      });
    });
  });
}

// ── 문장 ··· 액션(수정 / 꺼내기) ──────────────
const entryActionOverlay = document.getElementById('entryActionOverlay');
const actionEditBtn = document.getElementById('actionEditBtn');
const actionDeleteBtn = document.getElementById('actionDeleteBtn');
let actionContext = null;

function openEntryAction(ctx){
  actionContext = ctx;
  entryActionOverlay.classList.add('open');
}
function closeEntryAction(){
  entryActionOverlay.classList.remove('open');
}
entryActionOverlay.addEventListener('click', (e) => {
  if(e.target === entryActionOverlay) closeEntryAction();
});

actionEditBtn.addEventListener('click', () => {
  const ctx = actionContext;
  closeEntryAction();
  if(ctx) openEditSheet(ctx);
});

actionDeleteBtn.addEventListener('click', async () => {
  const ctx = actionContext;
  closeEntryAction();
  if(!ctx) return;
  if(!(await showConfirm('이 문장을 기록에서 꺼내시겠습니까?'))) return;

  const g = groups.find(x => x.id === ctx.gid);
  if(!g) return;
  const bg = g.bookGroups[ctx.bidx];
  if(!bg) return;

  bg.quotes.splice(ctx.qidx, 1);
  if(bg.quotes.length === 0){
    g.bookGroups.splice(ctx.bidx, 1);
  }
  g.count = g.bookGroups.length;
  if(g.count === 0){
    groups = groups.filter(x => x.id !== ctx.gid);
  }

  await saveAll();
  renderApp();
});

// ── 문장 수정 시트 ───────────────────────────
const editSheetOverlay = document.getElementById('editSheetOverlay');
const editQuoteInput = document.getElementById('editQuoteInput');
const editPageInput = document.getElementById('editPageInput');
const editSubmitBtn = document.getElementById('editSubmitBtn');
const editStatusMsg = document.getElementById('editStatusMsg');
let editContext = null;

function autoResizeEditInput(){
  editQuoteInput.style.height = 'auto';
  editQuoteInput.style.height = editQuoteInput.scrollHeight + 'px';
}
editQuoteInput.addEventListener('input', autoResizeEditInput);

function showEditStatus(text, type){
  editStatusMsg.classList.remove('error','show');
  editStatusMsg.textContent = text;
  if(type) editStatusMsg.classList.add(type);
  void editStatusMsg.offsetWidth;
  editStatusMsg.classList.add('show');
}

function openEditSheet(ctx){
  const g = groups.find(x => x.id === ctx.gid);
  if(!g) return;
  const bg = g.bookGroups[ctx.bidx];
  if(!bg) return;
  const q = bg.quotes[ctx.qidx];
  if(!q) return;

  editContext = ctx;
  editQuoteInput.value = q.text;
  editPageInput.value = q.page || '';
  editStatusMsg.classList.remove('show');
  editSheetOverlay.classList.add('open');
  requestAnimationFrame(autoResizeEditInput);
  setTimeout(() => editQuoteInput.focus(), 250);
}
function closeEditSheet(){
  editSheetOverlay.classList.remove('open');
}
editSheetOverlay.addEventListener('click', (e) => {
  if(e.target === editSheetOverlay) closeEditSheet();
});

async function handleEditSubmit(){
  const newText = editQuoteInput.value.trim();
  if(!newText){
    showEditStatus('문장을 입력해주세요.', 'error');
    return;
  }
  if(!editContext) return;

  const g = groups.find(x => x.id === editContext.gid);
  if(!g) return;
  const bg = g.bookGroups[editContext.bidx];
  if(!bg) return;
  const q = bg.quotes[editContext.qidx];
  if(!q) return;

  editSubmitBtn.disabled = true;
  try{
    q.text = newText;
    q.page = editPageInput.value.trim();
    await saveAll();
    renderApp();
    closeEditSheet();
    showToast('✓ 수정했습니다.');
  }catch(e){
    console.error('문장 수정 실패:', e);
    showEditStatus('수정 사항을 저장하지 못했습니다.', 'error');
  }finally{
    editSubmitBtn.disabled = false;
  }
}
editSubmitBtn.addEventListener('click', handleEditSubmit);
editQuoteInput.addEventListener('keydown', (e) => {
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    handleEditSubmit();
  }
});
editPageInput.addEventListener('keydown', (e) => {
  if(e.key === 'Enter'){
    e.preventDefault();
    handleEditSubmit();
  }
});

// ── 문장 남기기 시트 ─────────────────────────
function openQuoteSheet(){
  if(books.length === 0){
    openBookSearch();
    return;
  }
  updateSheetBookContext();
  sheetOverlay.classList.add('open');
  setTimeout(() => quoteInput.focus(), 250);
}
function closeQuoteSheet(){
  sheetOverlay.classList.remove('open');
}
ctaAddQuote.addEventListener('click', openQuoteSheet);
sheetOverlay.addEventListener('click', (e) => {
  if(e.target === sheetOverlay) closeQuoteSheet();
});

function updateSheetBookContext(){
  const sortedBooks = getSortedBooks();
  const book = books.find(b => b.id === currentBookId) || sortedBooks[0];
  if(!book) return;
  currentBookId = book.id;

  // select 옵션 구성: 내 서재 책들 + 마지막에 "새 책 추가"
  sheetBookSelect.innerHTML = sortedBooks.map(b =>
    `<option value="${b.id}">${escapeHtml(b.title)}</option>`
  ).join('') + `<option value="__new__">＋ 새 책 추가</option>`;
  sheetBookSelect.value = currentBookId;

  sheetBookCover.className = 'sheet-book-cover';
  if(book.coverUrl){
    renderCoverInto(sheetBookCover, book.coverUrl, book.title.slice(0, 1));
  } else {
    sheetBookCover.classList.add('no-cover');
    sheetBookCover.textContent = book.title.slice(0, 1);
    resolveBookCover(book).then(url => {
      if(url) renderCoverInto(sheetBookCover, url, book.title.slice(0, 1));
    });
  }
}

// 네이티브 select라서 iOS에서는 탭하면 기기 고유의 휠 피커(드르륵 선택)가 그대로 뜸.
// 이미 서재에 있는 책들만 나열하고, 맨 아래 "새 책 추가"를 고르면 검색 시트로 이어짐.
sheetBookSelect.addEventListener('change', () => {
  const value = sheetBookSelect.value;
  if(value === '__new__'){
    sheetBookSelect.value = currentBookId; // 선택값을 원래 책으로 되돌려놓고
    openBookSearch(); // 검색 시트를 그 위에 띄움 (문장 작성 흐름은 유지됨)
    return;
  }
  currentBookId = value;
  saveCurrentBookId(currentBookId);
  updateSheetBookContext();
});

// ── 책 추가하기(검색) 시트 ───────────────────
// 트리거: Hero 하단의 + 버튼(renderHero), 빈 상태의 "첫 책 추가하기"/"문장 남기기" 버튼,
// 책 선택 시트의 "새 책 추가" 버튼에서 각각 openBookSearch()를 호출함.

let searchDebounceTimer = null;
let searchRequestId = 0;
let lastSearchItems = [];

function openBookSearch(){
  bookSearchInput.value = '';
  bookSearchResults.innerHTML = `<div class="search-hint">책 제목을 입력해보세요.</div>`;
  bookSearchOverlay.classList.add('open');
  setTimeout(() => bookSearchInput.focus(), 250);
}
function closeBookSearch(){
  bookSearchOverlay.classList.remove('open');
}
bookSearchOverlay.addEventListener('click', (e) => {
  if(e.target === bookSearchOverlay) closeBookSearch();
});

bookSearchInput.addEventListener('input', () => {
  clearTimeout(searchDebounceTimer);
  const query = bookSearchInput.value.trim();
  if(!query){
    bookSearchResults.innerHTML = `<div class="search-hint">책 제목을 입력해보세요.</div>`;
    return;
  }
  bookSearchResults.innerHTML = `<div class="search-hint">검색 중...</div>`;
  searchDebounceTimer = setTimeout(() => runBookSearch(query), 400);
});

async function runBookSearch(query){
  const myRequestId = ++searchRequestId;
  try{
    const items = await searchBooksThroughWorker(query);
    if(myRequestId !== searchRequestId) return; // 이후 검색어로 이미 대체됨
    lastSearchItems = items;

    if(items.length === 0){
      bookSearchResults.innerHTML = `<div class="search-hint">검색 결과가 없습니다.</div>`;
      return;
    }

    bookSearchResults.innerHTML = items.map(item => {
      const title = item.title || '(제목 없음)';
      const authors = (item.authors || []).join(', ');
      const meta = [item.publisher, item.publishedDate].filter(Boolean).join(' · ');
      const norm = normalizeTitle(title);
      const already = books.some(b => (item.externalId && b.externalId === item.externalId) || normalizeTitle(b.title) === norm);

      return `
        <div class="search-result ${already ? 'added' : ''}" data-id="${escapeHtml(item.externalId || '')}">
          <div class="search-result-cover"></div>
          <div class="search-result-info">
            <div class="search-result-title">${escapeHtml(title)}</div>
            ${authors ? `<div class="search-result-authors">${escapeHtml(authors)}</div>` : ''}
            ${meta ? `<div class="search-result-meta">${escapeHtml(meta)}</div>` : ''}
          </div>
          <div class="search-result-action">${already ? '추가됨' : '추가'}</div>
        </div>
      `;
    }).join('');

    // 표지는 DOM 삽입 후 개별적으로 채워서, 이미지가 깨지면 이니셜로 안전하게 전환되게 함
    const coverEls = bookSearchResults.querySelectorAll('.search-result-cover');
    items.forEach((item, i) => {
      renderCoverInto(coverEls[i], item.coverUrl, (item.title || '?').slice(0, 1));
    });

    bookSearchResults.querySelectorAll('.search-result').forEach((row, i) => {
      if(row.classList.contains('added')) return;
      row.addEventListener('click', () => addBookFromSearchResult(items[i]));
    });
  }catch(e){
    if(myRequestId !== searchRequestId) return;
    // 원인은 searchBooksThroughWorker 내부에서 이미 콘솔에 상세히 남겼음
    bookSearchResults.innerHTML = `<div class="search-hint">책 정보를 불러오지 못했습니다. 다시 시도해주세요.</div>`;
  }
}

async function addBookFromSearchResult(item){
  const title = item.title || '(제목 없음)';
  const norm = normalizeTitle(title);
  if(books.some(b => (item.externalId && b.externalId === item.externalId) || normalizeTitle(b.title) === norm)) return;

  const newBook = {
    id: 'book_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
    title,
    authors: item.authors || [],
    publisher: item.publisher || '',
    publishedDate: item.publishedDate || '',
    coverUrl: item.coverUrl || '',
    externalId: item.externalId || '',
    addedAt: Date.now()
  };
  books.push(newBook);

  await saveAll();
  currentBookId = newBook.id;
  saveCurrentBookId(currentBookId);
  closeBookSearch();
  renderApp();

  // 문장을 쓰던 중에 "새 책 추가"로 들어온 경우, 시트는 닫지 않고
  // 방금 추가한 책으로 컨텍스트만 갱신해서 작성 흐름이 끊기지 않도록 함
  if(sheetOverlay.classList.contains('open')){
    updateSheetBookContext();
  }
}

// ── AI 의미 분석 응답 파싱 (견고화 버전) ──────
// Worker/Anthropic 응답이 여러 형태로 와도 최대한 안전하게 해석하고,
// 실패하면 예외를 던져서 호출부가 "미분류 저장"으로 처리하게 함.
async function parseClassificationResponse(response, quoteText){
  const raw = await response.text();

  if(!response.ok){
    console.error('classifyQuote 응답 오류:', response.status, raw.slice(0, 300));
    throw new Error(`API ${response.status}`);
  }

  let data;
  try{
    data = JSON.parse(raw);
  }catch(e){
    data = raw;
  }

  let candidate = data;
  if(data && Array.isArray(data.content)){
    const textBlock = data.content.find(item => item && item.type === 'text');
    candidate = textBlock ? textBlock.text : null;
  } else if(data && data.result){
    candidate = data.result;
  } else if(data && typeof data.text === 'string'){
    candidate = data.text;
  }

  if(typeof candidate === 'string'){
    const cleaned = candidate.replace(/```json/gi, '').replace(/```/g, '').trim();
    const start = cleaned.indexOf('{');
    const end = cleaned.lastIndexOf('}');
    if(start !== -1 && end !== -1 && end > start){
      try{
        candidate = JSON.parse(cleaned.slice(start, end + 1));
      }catch(e){
        console.error('classifyQuote 파싱 실패, 원문 일부:', cleaned.slice(0, 300));
        candidate = null;
      }
    } else {
      candidate = null;
    }
  }

  if(!candidate || typeof candidate !== 'object'){
    console.error('classifyQuote 응답 형식을 알 수 없음, 원문 일부:', raw.slice(0, 300));
    throw new Error('Invalid response format');
  }

  return {
    matchedId: typeof candidate.matchedId === 'string' ? candidate.matchedId : null,
    canonical: (typeof candidate.canonical === 'string' && candidate.canonical.trim())
      ? candidate.canonical.trim()
      : quoteText,
    updatedCanonical: typeof candidate.updatedCanonical === 'string'
      ? candidate.updatedCanonical.trim()
      : ''
  };
}

function representativeQuotes(g, limit = 4){
  const all = [];
  g.bookGroups.forEach(bg => bg.quotes.forEach(q => all.push(q.text)));
  return all.slice(-limit);
}

async function classifyQuote(quoteText){
  const existing = groups.map(g => ({
    id: g.id,
    canonical: g.canonical,
    examples: representativeQuotes(g, 4)
  }));

  const systemPrompt = `당신은 문장의 의미를 분석해 유사한 인생 교훈/진리끼리 묶는 분류기입니다.
사용자가 새 문장을 입력하면, 기존 그룹 목록(대표 문구 + 예시 문장들)과 의미가 사실상 같은 교훈을 말하는지 판단하세요.
표현이 달라도 핵심 메시지가 같으면 매칭시킵니다 (예: "돈을 좇지 마라"와 "부를 추구하지 말라"는 같은 그룹). 예시 문장들과 새 문장이 실제로는 결이 다른 이야기라면 매칭시키지 마세요.
매칭되는 그룹이 있다면, 그 그룹의 예시 문장들 + 새 문장을 모두 참고해서 그룹 전체 의미를 가장 잘 대표하는 대표 문구를 새로 다듬어 "updatedCanonical"에 담아주세요 (기존 canonical을 그대로 유지해도 되고 조금 더 정확하게 다듬어도 됩니다. 15자 내외 한국어).
매칭되는 그룹이 없다면 matchedId를 null로 하고, 새 문장 자체를 대표하는 대표 문구를 "canonical"에 담아주세요.
반드시 아래 JSON 형식으로만 응답하고 다른 텍스트는 절대 포함하지 마세요:
{"matchedId": "기존 그룹 id 또는 null", "canonical": "새 그룹일 때 쓸 대표 문구", "updatedCanonical": "매칭된 그룹일 때 갱신할 대표 문구"}`;

  const userPrompt = `기존 그룹 목록:
${JSON.stringify(existing, null, 2)}

새 문장: "${quoteText}"`;

  const endpoint = IS_CLAUDE_ARTIFACT
    ? "https://api.anthropic.com/v1/messages"
    : WORKER_URL + "/classify";

  const response = await fetch(endpoint, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{ role: "user", content: userPrompt }]
    })
  });

  return await parseClassificationResponse(response, quoteText);
}

async function handleSubmit(){
  const quoteText = quoteInput.value.trim();
  if(!quoteText){
    showStatus('기록할 문장을 적어주세요.', 'error');
    return;
  }

  const currentBook = books.find(b => b.id === currentBookId);
  if(!currentBook){
    showStatus('먼저 책을 추가해주세요.', 'error');
    return;
  }
  const book = currentBook.title;
  const page = pageInput.value.trim();

  submitBtn.disabled = true;
  showStatus('문장을 기록하는 중입니다...', 'loading');

  // 1) AI 의미 분석은 best-effort로 시도. 실패해도 아래 저장 로직은 항상 진행됨(문장 유실 방지).
  let result = null;
  try{
    result = await classifyQuote(quoteText);
  }catch(e){
    console.error('classifyQuote 실패 (문장 저장은 계속 진행):', e && e.message);
  }

  // 2) 저장은 AI 성공 여부와 무관하게 항상 수행
  try{
    let targetId = null;

    if(result && result.matchedId && groups.some(g => g.id === result.matchedId)){
      const g = groups.find(g => g.id === result.matchedId);
      const bookKey = normalizeTitle(book);
      let bookGroup = g.bookGroups.find(bg => normalizeTitle(bg.book) === bookKey);

      if(bookGroup){
        bookGroup.quotes.push({ text: quoteText, page, ts: Date.now() });
      } else {
        bookGroup = { book, quotes: [{ text: quoteText, page, ts: Date.now() }] };
        g.bookGroups.push(bookGroup);
      }

      g.count = g.bookGroups.length;
      g.canonical = result.updatedCanonical || result.canonical || g.canonical;
      targetId = g.id;
    } else {
      const newGroup = {
        id: 'g_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
        canonical: (result && result.canonical) || quoteText,
        count: 1,
        bookGroups: [{ book, quotes: [{ text: quoteText, page, ts: Date.now() }] }],
        unclassified: !result
      };
      groups.push(newGroup);
      targetId = newGroup.id;
    }

    await saveAll();
    renderApp();

    quoteInput.value = '';
    autoResizeQuoteInput();
    pageInput.value = '';

    if(result){
      setTimeout(() => {
        closeQuoteSheet();
        showToast('✓ 기록했습니다.');
      }, 300);
    } else {
      showStatus('문장은 저장했지만 비슷한 생각을 찾지는 못했습니다.', 'error', 3000);
      setTimeout(() => {
        closeQuoteSheet();
        showToast('✓ 기록했습니다.');
      }, 900);
    }
  }catch(saveErr){
    console.error('문장 저장 실패:', saveErr);
    showStatus('문장을 저장하지 못했습니다. 잠시 후 다시 시도해주세요.', 'error');
  }finally{
    submitBtn.disabled = false;
  }
}

submitBtn.addEventListener('click', handleSubmit);
quoteInput.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    handleSubmit();
  }
});
pageInput.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter'){
    e.preventDefault();
    handleSubmit();
  }
});

loadAll();
</script>
