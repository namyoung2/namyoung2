<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수집가들 — 겹치는 진리 수집</title>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root{
    --bg: #FFFFFF;
    --bg-secondary: #F5F7FA;
    --border: #EBEEF2;
    --text: #191F28;
    --text-secondary: #6B7684;
    --text-tertiary: #B0B8C1;
    --hover: #F0F4FF;
    --blue: #3182F6;
    --blue-dark: #2272EB;
    --blue-bg: #EAF2FF;
    --blue-deep: #1B64DA;
    --gold: #F5A623;
    --gold-bg: #FFF6E5;
    --pill-bg: #F2F4F6;
    --shadow: rgba(49,130,246,0.08);
    --shadow-md: rgba(25,31,40,0.12);
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", sans-serif;
    min-height: 100vh;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.01em;
  }
  .wrap{ max-width: 760px; margin: 0 auto; padding: 64px 24px 100px; }

  header.masthead{
    margin-bottom: 28px;
    text-align: center;
  }
  .hero-cat{
    position: relative;
    display: inline-flex;
    justify-content: center;
    margin: 0 auto;
  }
  .hero-cat img{
    width: 200px;
    max-width: 60%;
    height: auto;
    display: block;
    filter: drop-shadow(0 10px 18px rgba(49,130,246,0.18));
    animation: catIdle 3.4s ease-in-out infinite;
    transform-origin: center bottom;
  }
  .hero-cat img.cat-react{
    animation: catReact 0.6s ease;
  }
  @keyframes catIdle{
    0%, 100%{ transform: translateY(0) rotate(0deg); }
    50%{ transform: translateY(-5px) rotate(-1.2deg); }
  }
  @keyframes catReact{
    0%{ transform: scale(1) rotate(0deg); }
    30%{ transform: scale(1.16) rotate(-5deg); }
    55%{ transform: scale(0.94) rotate(4deg); }
    75%{ transform: scale(1.05) rotate(-2deg); }
    100%{ transform: scale(1) rotate(0deg); }
  }

  .cat-bubble{
    position: absolute;
    top: -8px;
    left: 78%;
    background: #FFFFFF;
    border: 2px solid var(--text);
    border-radius: 14px;
    padding: 7px 13px;
    font-size: 12.5px;
    font-weight: 700;
    white-space: nowrap;
    color: var(--text);
    box-shadow: 0 4px 10px rgba(32,33,36,0.14);
    opacity: 0;
    pointer-events: none;
    z-index: 5;
    transform: translateX(-15%) scale(0.6) translateY(6px);
  }
  .cat-bubble::after{
    content: "";
    position: absolute;
    bottom: -7px;
    left: 22px;
    width: 13px; height: 13px;
    background: #FFFFFF;
    border-right: 2px solid var(--text);
    border-bottom: 2px solid var(--text);
    transform: rotate(45deg);
  }
  .cat-bubble.show{
    animation: bubblePop 2.3s ease forwards;
  }
  @keyframes bubblePop{
    0%{ opacity: 0; transform: translateX(-15%) scale(0.6) translateY(6px); }
    14%{ opacity: 1; transform: translateX(-15%) scale(1.08) translateY(0); }
    24%{ transform: translateX(-15%) scale(1) translateY(0); }
    82%{ opacity: 1; transform: translateX(-15%) scale(1) translateY(0); }
    100%{ opacity: 0; transform: translateX(-15%) scale(0.92) translateY(-6px); }
  }

  @media (max-width: 520px){
    .cat-bubble{ font-size: 11.5px; left: 68%; padding: 6px 10px; }
  }

  /* input block */
  .callout{
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: 0 2px 14px var(--shadow);
    margin-bottom: 40px;
    overflow: visible;
  }
  .callout-body{
    padding: 20px 22px 18px;
  }
  .input-row{
    display: flex;
    align-items: flex-end;
    gap: 12px;
    margin-bottom: 14px;
  }
  textarea#quoteInput{
    flex: 1;
    width: 100%;
    border: none;
    background: transparent;
    font-family: 'Pretendard', -apple-system, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    color: var(--text);
    resize: none;
    min-height: 24px;
    max-height: none;
    overflow: hidden;
    outline: none;
    padding: 4px 0;
  }
  textarea#quoteInput::placeholder{ color: var(--text-tertiary); }

  .meta-row{
    display:flex; gap: 8px; flex-wrap: wrap;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .meta-field{
    display:flex; align-items:center; gap: 6px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px 12px;
    flex: 1 1 160px;
    position: relative;
  }
  .meta-field .field-icon{ font-size: 13px; opacity: 0.6; flex-shrink: 0; }
  .meta-field input{
    border: none;
    background: transparent;
    font-family: 'Pretendard', sans-serif;
    font-size: 13px;
    color: var(--text);
    outline: none;
    width: 100%;
  }
  .meta-field input::placeholder{ color: var(--text-tertiary); }

  .book-caret{
    background:none; border:none; cursor:pointer;
    color: var(--text-tertiary);
    font-size: 11px;
    padding: 2px 2px;
    flex-shrink: 0;
    line-height: 1;
    border-radius: 3px;
  }
  .book-caret:hover{ color: var(--text); background: var(--hover); }

  .book-dropdown{
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    min-width: 100%;
    max-width: 260px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 4px 14px var(--shadow-md);
    z-index: 20;
    display: none;
    flex-direction: column;
    padding: 4px;
    max-height: 220px;
    overflow-y: auto;
  }
  .book-dropdown.open{ display: flex; }
  .book-dropdown .dropdown-empty{
    font-size: 12.5px;
    color: var(--text-tertiary);
    padding: 8px 10px;
  }
  .book-dropdown-row{
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .book-dropdown-item{
    flex: 1;
    text-align: left;
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Pretendard', sans-serif;
    font-size: 13px;
    color: var(--text);
    padding: 7px 10px;
    border-radius: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .book-dropdown-item:hover{ background: var(--hover); }
  .book-dropdown-remove{
    flex-shrink: 0;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-tertiary);
    font-size: 13px;
    padding: 6px 8px;
    border-radius: 4px;
  }
  .book-dropdown-remove:hover{ color: #EB5757; background: var(--hover); }

  .status-msg{
    font-size: 12.5px;
    color: var(--text-secondary);
    min-height: 16px;
    margin-top: 10px;
    transition: color 0.2s ease;
  }
  .status-msg:empty{ margin-top: 0; min-height: 0; }
  .status-msg.error{ color: #EB5757; font-weight: 600; }
  .status-msg.loading{
    font-weight: 600;
    background: linear-gradient(100deg,
      var(--text-tertiary) 30%, var(--blue) 48%,
      var(--blue-deep) 52%, var(--text-tertiary) 70%);
    background-size: 250% auto;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: shimmerMove 2.6s ease-in-out infinite alternate;
    will-change: background-position;
  }
  .status-msg.success{
    color: var(--text-secondary);
    font-weight: 600;
    animation: statusPop 0.3s ease;
  }
  @keyframes shimmerMove{
    0%{ background-position: 160% center; }
    100%{ background-position: -60% center; }
  }
  @keyframes statusPop{
    from{ opacity: 0; transform: translateY(3px); }
    to{ opacity: 1; transform: translateY(0); }
  }

  .confetti-piece{
    position: fixed;
    width: 6px;
    height: 6px;
    border-radius: 1px;
    pointer-events: none;
    z-index: 999;
    animation: confettiPop 0.7s ease-out forwards;
  }
  @keyframes confettiPop{
    0%{ transform: translate(0,0) rotate(0deg); opacity: 1; }
    100%{ transform: translate(var(--dx), var(--dy)) rotate(var(--rot)); opacity: 0; }
  }
  button#submitBtn{
    background: var(--blue);
    color: #FFFFFF;
    border: none;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease, box-shadow 0.15s ease;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(49,130,246,0.3);
  }
  button#submitBtn:hover{ background: var(--blue-dark); box-shadow: 0 4px 12px rgba(49,130,246,0.4); }
  button#submitBtn:active{ transform: scale(0.94); }
  button#submitBtn:disabled{ opacity: 0.4; cursor: default; box-shadow: none; }

  /* section header */
  .section-head{
    display:flex; align-items:center; justify-content: space-between;
    margin-bottom: 10px;
    padding: 0 2px;
  }
  .section-head h2{
    font-size: 14px;
    font-weight: 600;
    margin: 0;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .section-head .count-tag{
    font-size: 12px;
    color: var(--text-tertiary);
    background: var(--pill-bg);
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }

  /* cards - notion block/page style */
  .grid{ display:flex; flex-direction:column; gap: 10px; }

  .card{
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px 22px;
    position: relative;
    margin-bottom: 0;
    transition: box-shadow 0.15s ease, border-color 0.15s ease;
    animation: cardIn 0.3s ease both;
  }
  .card:hover{ box-shadow: 0 6px 18px var(--shadow-md); border-color: #DCE3EC; }
  @keyframes cardIn{
    from{ opacity:0; transform: translateY(4px); }
    to{ opacity:1; transform: translateY(0); }
  }

  .card-top{
    display:flex; align-items:flex-start; justify-content: space-between;
    gap: 12px;
  }
  .canonical{
    font-size: 16px;
    font-weight: 600;
    line-height: 1.5;
    margin: 0;
    color: var(--text);
    flex: 1;
  }
  .unclassified-tag{
    display: inline-block;
    font-size: 10.5px;
    font-weight: 600;
    color: var(--text-secondary);
    background: var(--pill-bg);
    padding: 1px 7px;
    border-radius: 8px;
    margin-left: 8px;
    vertical-align: middle;
  }
  .count-pill{
    flex-shrink: 0;
    display:flex; align-items:center; gap: 5px;
    font-size: 13.5px;
    font-weight: 800;
    padding: 5px 12px;
    border-radius: 14px;
    font-family: 'Pretendard', sans-serif;
    letter-spacing: -0.01em;
  }
  .count-pill.tier-1{
    background: var(--pill-bg);
    color: var(--text-secondary);
  }
  .count-pill.tier-2{
    background: var(--blue-bg);
    color: var(--blue-deep);
  }
  .count-pill.tier-3{
    background: var(--blue);
    color: #FFFFFF;
    box-shadow: 0 3px 10px rgba(49,130,246,0.35);
  }
  .count-pill.tier-4{
    background: linear-gradient(135deg, #FFC94D, var(--gold));
    color: #FFFFFF;
    box-shadow: 0 3px 12px rgba(245,166,35,0.4);
  }
  .count-pill.pulse{ animation: thump 0.45s ease; }
  @keyframes thump{
    0%{ transform: scale(1); }
    40%{ transform: scale(1.18); }
    100%{ transform: scale(1); }
  }

  .toggle-row{
    margin-top: 10px;
  }
  .toggle-sources{
    background:none; border:none; cursor:pointer;
    display:flex; align-items:center; gap: 5px;
    font-size: 12.5px;
    color: var(--text-secondary);
    padding: 3px 4px;
    border-radius: 3px;
  }
  .toggle-sources:hover{ background: var(--hover); color: var(--text); }
  .toggle-sources .caret{
    display:inline-block;
    transition: transform 0.15s ease;
    font-size: 10px;
  }
  .toggle-sources.open .caret{ transform: rotate(90deg); }

  .sources{
    margin-top: 4px;
    display: none;
    flex-direction: column;
    gap: 8px;
  }
  .sources.open{ display:flex; margin-top: 10px; }
  .book-chip{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    width: 100%;
    text-align: left;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 11px 14px;
    font-family: 'Pretendard', sans-serif;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
  }
  .book-chip:hover{ background: var(--hover); border-color: var(--blue); }
  .book-chip:active{ transform: scale(0.98); }
  .book-chip-count{
    flex-shrink: 0;
    background: var(--pill-bg);
    color: var(--text-secondary);
    font-size: 11.5px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
  }

  .card-controls{
    margin-top: 8px;
  }
  .delete-group{
    background:none; border:none; cursor:pointer;
    font-size: 11.5px;
    color: var(--text-tertiary);
    padding: 2px 4px;
    border-radius: 3px;
  }
  .delete-group:hover{ color: #EB5757; background: var(--hover); }

  .empty{
    text-align:center;
    padding: 48px 20px 56px;
    color: var(--text-tertiary);
    font-size: 14px;
    line-height: 1.7;
    background: var(--bg-secondary);
    border: 1px dashed var(--border);
    border-radius: 20px;
  }
  .empty img{
    width: 88px;
    height: auto;
    margin-bottom: 14px;
    opacity: 0.9;
  }
  .empty-title{
    font-size: 15px;
    font-weight: 700;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }

  /* 책 상세 모달 */
  .modal-overlay{
    position: fixed;
    inset: 0;
    background: rgba(32,33,36,0.42);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 100;
  }
  .modal-overlay.open{ display: flex; }
  .modal-box{
    background: var(--bg);
    border-radius: 16px;
    width: 100%;
    max-width: 440px;
    max-height: 76vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 16px 40px rgba(32,33,36,0.25);
    animation: modalPop 0.2s ease;
  }
  @keyframes modalPop{
    from{ opacity: 0; transform: scale(0.96) translateY(6px); }
    to{ opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-header{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .modal-header h3{
    margin: 0;
    font-size: 15.5px;
    font-weight: 700;
    color: var(--text);
  }
  .modal-header h3::before{ content: "📖 "; }
  .modal-close{
    background: var(--pill-bg);
    border: none;
    width: 28px; height: 28px;
    border-radius: 50%;
    font-size: 16px;
    color: var(--text-secondary);
    cursor: pointer;
    flex-shrink: 0;
  }
  .modal-close:hover{ background: var(--hover); color: var(--text); }
  .modal-body{
    padding: 14px 18px 18px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .modal-quote-item{
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    background: var(--bg-secondary);
    border-radius: 8px;
  }
  .modal-quote-text{
    font-size: 13.5px;
    color: var(--text);
    line-height: 1.55;
  }
  .modal-quote-page{
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 5px;
  }
  .modal-quote-delete{
    background: none; border: none; cursor: pointer;
    color: var(--text-tertiary);
    font-size: 15px;
    line-height: 1;
    flex-shrink: 0;
    padding: 2px;
    border-radius: 3px;
  }
  .modal-quote-delete:hover{ color: #EB5757; background: var(--hover); }

  .confirm-box{
    max-width: 320px;
    padding: 22px 20px 18px;
  }
  .confirm-message{
    margin: 0 0 18px;
    font-size: 14.5px;
    line-height: 1.6;
    color: var(--text);
    text-align: center;
    font-weight: 600;
  }
  .confirm-actions{
    display: flex;
    gap: 8px;
  }
  .confirm-btn{
    flex: 1;
    border: none;
    border-radius: 10px;
    padding: 10px 0;
    font-family: 'Pretendard', sans-serif;
    font-size: 13.5px;
    font-weight: 700;
    cursor: pointer;
  }
  .confirm-cancel{
    background: var(--pill-bg);
    color: var(--text-secondary);
  }
  .confirm-cancel:hover{ background: var(--hover); }
  .confirm-ok{
    background: #EB5757;
    color: #FFFFFF;
  }
  .confirm-ok:hover{ background: #D64545; }

  footer.note{
    margin-top: 44px;
    text-align:center;
    font-size: 11.5px;
    color: var(--text-tertiary);
  }

  @media (max-width: 520px){
    .card-top{ flex-direction: column; }
    .count-pill{ align-self: flex-start; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="masthead">

<script>
const STORAGE_KEY = 'truth-groups';

// 👇 Cloudflare Worker 배포 후, 여기에 본인 Worker 주소를 넣어주세요.
// (claude.ai 아티팩트 안에서 미리보기할 때는 이 값이 쓰이지 않고 자동으로 내장 방식이 사용돼요)
const WORKER_URL = "https://truth-collector-proxy.dingapark1.workers.dev";

// 👇 Worker의 Settings > Variables and Secrets에 등록한 SITE_SECRET과 똑같은 값을 넣어주세요.
const SITE_SECRET = "my-cat-2026";

const IS_CLAUDE_ARTIFACT = !!window.storage;

// claude.ai 아티팩트 안에서는 window.storage를,
// 깃허브 페이지 등 밖에서는 Worker + Cloudflare KV(클라우드 저장소)를 사용해서
// 어느 기기에서 열어도 같은 데이터를 볼 수 있게 함
const storageAdapter = {
  async get(key){
    if(IS_CLAUDE_ARTIFACT){
      try{ return await window.storage.get(key, false); }catch(e){ return null; }
    }
    try{
      const res = await fetch(WORKER_URL + "/data", {
        method: "GET",
        headers: { "X-Site-Secret": SITE_SECRET }
      });
      if(!res.ok) return null;
      const value = await res.text();
      return { value };
    }catch(e){
      return null;
    }
  },
  async set(key, value){
    if(IS_CLAUDE_ARTIFACT){
      return await window.storage.set(key, value, false);
    }
    try{
      await fetch(WORKER_URL + "/data", {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Site-Secret": SITE_SECRET },
        body: value
      });
    }catch(e){
      return null;
    }
    return { key, value };
  }
};
let groups = [];

const quoteInput = document.getElementById('quoteInput');
const bookInput = document.getElementById('bookInput');
const pageInput = document.getElementById('pageInput');
const submitBtn = document.getElementById('submitBtn');
const statusMsg = document.getElementById('statusMsg');
const cardGrid = document.getElementById('cardGrid');
const groupCountTag = document.getElementById('groupCountTag');
const bookCaret = document.getElementById('bookCaret');
const bookDropdown = document.getElementById('bookDropdown');
const bookDatalist = document.getElementById('bookDatalist');
const catImg = document.getElementById('catImg');
const catBubble = document.getElementById('catBubble');
const modalOverlay = document.getElementById('modalOverlay');
const modalBookTitle = document.getElementById('modalBookTitle');
const modalBody = document.getElementById('modalBody');
const modalClose = document.getElementById('modalClose');
const confirmOverlay = document.getElementById('confirmOverlay');
const confirmMessage = document.getElementById('confirmMessage');
const confirmCancel = document.getElementById('confirmCancel');
const confirmOk = document.getElementById('confirmOk');
let confirmResolver = null;

function showConfirm(message){
  confirmMessage.textContent = message;
  confirmOverlay.classList.add('open');
  return new Promise((resolve) => {
    confirmResolver = resolve;
  });
}
function resolveConfirm(result){
  confirmOverlay.classList.remove('open');
  if(confirmResolver){
    confirmResolver(result);
    confirmResolver = null;
  }
}
confirmOk.addEventListener('click', () => resolveConfirm(true));
confirmCancel.addEventListener('click', () => resolveConfirm(false));
confirmOverlay.addEventListener('click', (e) => {
  if(e.target === confirmOverlay) resolveConfirm(false);
});

let dismissedBooks = new Set();

const CAT_REACTIONS = {
  1: { emoji: '🌱', text: '오, 새로운 문장이다!' },
  2: { emoji: '✨', text: '어? 또 겹쳤네' },
  3: { emoji: '🔥', text: '이거 완전 국룰인데' },
  4: { emoji: '🏆', text: '인생 진리 확정!' }
};

function reactCat(tier, customMessage){
  const m = customMessage || CAT_REACTIONS[tier] || CAT_REACTIONS[1];
  catBubble.textContent = `${m.emoji} ${m.text}`;

  catBubble.classList.remove('show');
  void catBubble.offsetWidth; // 리플로우를 강제로 일으켜 애니메이션 재시작
  catBubble.classList.add('show');

  catImg.classList.remove('cat-react');
  void catImg.offsetWidth;
  catImg.classList.add('cat-react');
  setTimeout(() => catImg.classList.remove('cat-react'), 650);
}

function autoResizeQuoteInput(){
  quoteInput.style.height = 'auto';
  quoteInput.style.height = quoteInput.scrollHeight + 'px';
}
quoteInput.addEventListener('input', autoResizeQuoteInput);
autoResizeQuoteInput();

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function getRecentBooks(limit = 8){
  const all = [];
  groups.forEach(g => {
    (g.bookGroups || []).forEach(bg => {
      const book = (bg.book || '').trim();
      if(!book) return;
      if(dismissedBooks.has(book.toLowerCase())) return;
      const latestTs = bg.quotes.reduce((max,q)=> Math.max(max, q.ts || 0), 0);
      all.push({ book, ts: latestTs });
    });
  });
  all.sort((a,b) => b.ts - a.ts);
  const seen = new Set();
  const result = [];
  for(const item of all){
    const key = item.book.toLowerCase();
    if(!seen.has(key)){
      seen.add(key);
      result.push(item.book);
    }
    if(result.length >= limit) break;
  }
  return result;
}

async function loadDismissedBooks(){
  try{
    const res = await storageAdapter.get('dismissed-books');
    const arr = res && res.value ? JSON.parse(res.value) : [];
    dismissedBooks = new Set(arr);
  }catch(e){
    dismissedBooks = new Set();
  }
}

async function saveDismissedBooks(){
  try{
    await storageAdapter.set('dismissed-books', JSON.stringify([...dismissedBooks]));
  }catch(e){}
}

function refreshBookSuggestions(){
  const recent = getRecentBooks(8);

  bookDatalist.innerHTML = recent.map(b => `<option value="${escapeHtml(b)}"></option>`).join('');

  if(recent.length === 0){
    bookDropdown.innerHTML = `<div class="dropdown-empty">아직 입력한 책이 없어요</div>`;
  } else {
    bookDropdown.innerHTML = recent.map(b => `
      <div class="book-dropdown-row">
        <button type="button" class="book-dropdown-item" data-book="${escapeHtml(b)}">${escapeHtml(b)}</button>
        <button type="button" class="book-dropdown-remove" data-book="${escapeHtml(b)}" title="추천 목록에서 제거">×</button>
      </div>
    `).join('');
    bookDropdown.querySelectorAll('.book-dropdown-item').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        bookInput.value = btn.dataset.book;
        bookDropdown.classList.remove('open');
        pageInput.focus();
      });
    });
    bookDropdown.querySelectorAll('.book-dropdown-remove').forEach(btn=>{
      btn.addEventListener('click', async (e)=>{
        e.stopPropagation();
        dismissedBooks.add(btn.dataset.book.toLowerCase());
        await saveDismissedBooks();
        refreshBookSuggestions();
      });
    });
  }
}

bookCaret.addEventListener('click', (e)=>{
  e.stopPropagation();
  refreshBookSuggestions();
  bookDropdown.classList.toggle('open');
});
document.addEventListener('click', (e)=>{
  if(!bookDropdown.contains(e.target) && e.target !== bookCaret){
    bookDropdown.classList.remove('open');
  }
});

function migrateGroup(g){
  if(g.bookGroups) return g;
  const map = new Map();
  (g.sources || []).forEach(s => {
    const key = (s.book || '').trim();
    if(!map.has(key)) map.set(key, []);
    map.get(key).push({ text: s.text, page: s.page || '', ts: s.ts || 0 });
  });
  g.bookGroups = Array.from(map.entries()).map(([book, quotes]) => ({ book, quotes }));
  if(g.bookGroups.length === 0){
    g.bookGroups = [{ book: '', quotes: [] }];
  }
  g.count = g.bookGroups.length;
  delete g.sources;
  return g;
}

async function loadGroups(){
  try{
    const res = await storageAdapter.get(STORAGE_KEY);
    groups = res && res.value ? JSON.parse(res.value) : [];

    // 예전 버전(브라우저 저장 방식)을 쓰던 시절, 이 브라우저에만 남아있던 데이터가 있다면
    // 클라우드가 비어있을 때 한 번만 끌어올려서 동기화
    if(!IS_CLAUDE_ARTIFACT && groups.length === 0){
      const legacyRaw = localStorage.getItem(STORAGE_KEY);
      if(legacyRaw){
        try{
          const legacyGroups = JSON.parse(legacyRaw);
          if(Array.isArray(legacyGroups) && legacyGroups.length > 0){
            groups = legacyGroups;
            await storageAdapter.set(STORAGE_KEY, JSON.stringify(groups));
          }
        }catch(e){}
      }
    }

    // 예전 데이터 구조(sources 배열)를 새 구조(책 단위 bookGroups)로 1회성 변환
    let migrated = false;
    groups = groups.map(g => {
      if(!g.bookGroups){ migrated = true; }
      return migrateGroup(g);
    });
    if(migrated){
      await saveGroups();
    }
  }catch(e){
    groups = [];
  }
  await loadDismissedBooks();
  render();
  refreshBookSuggestions();
}

async function saveGroups(){
  try{
    await storageAdapter.set(STORAGE_KEY, JSON.stringify(groups));
  }catch(e){
    statusMsg.textContent = '저장에 실패했어요. 잠시 후 다시 시도해주세요.';
    statusMsg.classList.add('error');
  }
}

function getCountMeta(count){
  if(count >= 10) return { emoji: '🏆', tier: 4 };
  if(count >= 5) return { emoji: '🔥', tier: 3 };
  if(count >= 2) return { emoji: '✨', tier: 2 };
  return { emoji: '🌱', tier: 1 };
}

function render(pulseId){
  const sorted = [...groups].sort((a,b)=> b.count - a.count);
  groupCountTag.textContent = `${sorted.length}개`;

  if(sorted.length === 0){
    cardGrid.innerHTML = `<div class="empty">
      <img src="${catImg.src}" alt="기다리는 고양이">
      <div class="empty-title">아직 모인 문장이 없어요</div>
      위에 첫 문장을 남겨보세요
    </div>`;
    return;
  }

  cardGrid.innerHTML = sorted.map(g => {
    const meta = getCountMeta(g.count);
    const totalQuotes = g.bookGroups.reduce((sum, bg) => sum + bg.quotes.length, 0);
    return `
    <div class="card" data-id="${g.id}">
      <div class="card-top">
        <p class="canonical">${escapeHtml(g.canonical)}${g.unclassified ? '<span class="unclassified-tag">미분류</span>' : ''}</p>
        <div class="count-pill tier-${meta.tier} ${g.id === pulseId ? 'pulse' : ''}">${meta.emoji} ${g.count}회 발견</div>
      </div>
      <div class="toggle-row">
        <button class="toggle-sources" data-id="${g.id}"><span class="caret">▶</span>출처 ${g.bookGroups.length}권 (문장 ${totalQuotes}개)</button>
        <div class="sources" id="sources-${g.id}">
          ${g.bookGroups.map((bg, bidx) => `
            <button class="book-chip" data-gid="${g.id}" data-bidx="${bidx}">
              <span>📖 ${escapeHtml(bg.book || '출처 미상')}</span>
              <span class="book-chip-count">${bg.quotes.length}</span>
            </button>
          `).join('')}
        </div>
      </div>
      <div class="card-controls">
        <button class="delete-group" data-gid="${g.id}">그룹 삭제</button>
      </div>
    </div>
  `;
  }).join('');

  cardGrid.querySelectorAll('.toggle-sources').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const el = document.getElementById(`sources-${btn.dataset.id}`);
      el.classList.toggle('open');
      btn.classList.toggle('open');
    });
  });
  cardGrid.querySelectorAll('.book-chip').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      openBookModal(btn.dataset.gid, parseInt(btn.dataset.bidx, 10));
    });
  });
  cardGrid.querySelectorAll('.delete-group').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      if(!(await showConfirm('이 그룹과 그 안의 모든 문장을 정말 삭제하시겠습니까?'))) return;
      const gid = btn.dataset.gid;
      groups = groups.filter(x=>x.id!==gid);
      await saveGroups();
      render();
    });
  });
}

function sortedQuoteIndices(quotes){
  return quotes
    .map((q, idx) => ({ q, idx }))
    .sort((a, b) => {
      const pa = parseInt(a.q.page, 10);
      const pb = parseInt(b.q.page, 10);
      const aValid = !isNaN(pa);
      const bValid = !isNaN(pb);
      if(aValid && bValid) return pa - pb;
      if(aValid) return -1;
      if(bValid) return 1;
      return 0;
    });
}

function openBookModal(gid, bidx){
  const g = groups.find(x => x.id === gid);
  if(!g) return;
  const bg = g.bookGroups[bidx];
  if(!bg) return;

  modalBookTitle.textContent = bg.book || '출처 미상';
  const ordered = sortedQuoteIndices(bg.quotes);
  modalBody.innerHTML = ordered.map(({ q, idx: qidx }) => `
    <div class="modal-quote-item">
      <div>
        <div class="modal-quote-text">"${escapeHtml(q.text)}"</div>
        ${q.page ? `<div class="modal-quote-page"># ${escapeHtml(q.page)}p</div>` : ''}
      </div>
      <button class="modal-quote-delete" data-gid="${gid}" data-bidx="${bidx}" data-qidx="${qidx}" title="이 문장 삭제">×</button>
    </div>
  `).join('');
  modalOverlay.classList.add('open');

  modalBody.querySelectorAll('.modal-quote-delete').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      if(!(await showConfirm('정말 이 문장을 삭제하시겠습니까?'))) return;
      const gid2 = btn.dataset.gid;
      const bidx2 = parseInt(btn.dataset.bidx, 10);
      const qidx2 = parseInt(btn.dataset.qidx, 10);
      const g2 = groups.find(x => x.id === gid2);
      if(!g2) return;
      const bg2 = g2.bookGroups[bidx2];
      if(!bg2) return;

      bg2.quotes.splice(qidx2, 1);
      if(bg2.quotes.length === 0){
        g2.bookGroups.splice(bidx2, 1);
      }
      g2.count = g2.bookGroups.length;

      if(g2.count === 0){
        groups = groups.filter(x => x.id !== gid2);
        closeModal();
      } else if(g2.bookGroups[bidx2]){
        openBookModal(gid2, bidx2);
      } else {
        closeModal();
      }

      await saveGroups();
      render();
    });
  });
}

function closeModal(){
  modalOverlay.classList.remove('open');
}
modalClose.addEventListener('click', closeModal);
modalOverlay.addEventListener('click', (e)=>{
  if(e.target === modalOverlay) closeModal();
});

function representativeQuotes(g, limit = 4){
  const all = [];
  g.bookGroups.forEach(bg => bg.quotes.forEach(q => all.push(q.text)));
  return all.slice(-limit);
}

async function classifyQuote(quoteText){
  const existing = groups.map(g => ({
    id: g.id,
    canonical: g.canonical,
    examples: representativeQuotes(g, 4)
  }));

  const systemPrompt = `당신은 문장의 의미를 분석해 유사한 인생 교훈/진리끼리 묶는 분류기입니다.
사용자가 새 문장을 입력하면, 기존 그룹 목록(대표 문구 + 예시 문장들)과 의미가 사실상 같은 교훈을 말하는지 판단하세요.
표현이 달라도 핵심 메시지가 같으면 매칭시킵니다 (예: "돈을 좇지 마라"와 "부를 추구하지 말라"는 같은 그룹). 예시 문장들과 새 문장이 실제로는 결이 다른 이야기라면 매칭시키지 마세요.
매칭되는 그룹이 있다면, 그 그룹의 예시 문장들 + 새 문장을 모두 참고해서 그룹 전체 의미를 가장 잘 대표하는 대표 문구를 새로 다듬어 "updatedCanonical"에 담아주세요 (기존 canonical을 그대로 유지해도 되고 조금 더 정확하게 다듬어도 됩니다. 15자 내외 한국어).
매칭되는 그룹이 없다면 matchedId를 null로 하고, 새 문장 자체를 대표하는 대표 문구를 "canonical"에 담아주세요.
반드시 아래 JSON 형식으로만 응답하고 다른 텍스트는 절대 포함하지 마세요:
{"matchedId": "기존 그룹 id 또는 null", "canonical": "새 그룹일 때 쓸 대표 문구", "updatedCanonical": "매칭된 그룹일 때 갱신할 대표 문구"}`;

  const userPrompt = `기존 그룹 목록:
${JSON.stringify(existing, null, 2)}

새 문장: "${quoteText}"`;

  const endpoint = IS_CLAUDE_ARTIFACT
    ? "https://api.anthropic.com/v1/messages"
    : WORKER_URL;

  const response = await fetch(endpoint, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{ role: "user", content: userPrompt }]
    })
  });

  if(!response.ok){
    throw new Error('API 오류');
  }

  const data = await response.json();
  const textBlock = data.content.find(c => c.type === 'text');
  if(!textBlock) throw new Error('응답 파싱 실패');

  const cleaned = textBlock.text.replace(/```json|```/g, '').trim();
  return JSON.parse(cleaned);
}

function fireConfetti(originEl){
  const rect = originEl.getBoundingClientRect();
  const originX = rect.left + rect.width / 2;
  const originY = rect.top + rect.height / 2;
  const colors = ['#3182F6', '#6FA8FF', '#F5A623', '#FFD166', '#FF6B6B'];

  for(let i = 0; i < 16; i++){
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const angle = Math.random() * Math.PI * 2;
    const distance = 36 + Math.random() * 46;
    const dx = Math.cos(angle) * distance;
    const dy = Math.sin(angle) * distance - 16;
    piece.style.setProperty('--dx', dx + 'px');
    piece.style.setProperty('--dy', dy + 'px');
    piece.style.setProperty('--rot', (Math.random() * 360) + 'deg');
    piece.style.left = originX + 'px';
    piece.style.top = originY + 'px';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    if(Math.random() > 0.5){
      piece.style.borderRadius = '50%';
    }
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 720);
  }
}

async function handleSubmit(){
  const quoteText = quoteInput.value.trim();
  if(!quoteText){
    statusMsg.classList.remove('loading','success');
    statusMsg.textContent = '문장을 입력해주세요.';
    statusMsg.classList.add('error');
    return;
  }

  const book = bookInput.value.trim();
  const page = pageInput.value.trim();

  submitBtn.disabled = true;
  statusMsg.classList.remove('error','success');
  statusMsg.classList.add('loading');
  statusMsg.textContent = '의미를 분석하는 중...';

  try{
    const result = await classifyQuote(quoteText);
    let targetId = null;
    let reactionTier = 1;

    if(result.matchedId && groups.some(g => g.id === result.matchedId)){
      const g = groups.find(g => g.id === result.matchedId);
      const bookKey = book.toLowerCase();
      let bookGroup = g.bookGroups.find(bg => (bg.book || '').toLowerCase() === bookKey);
      let isNewBook = false;

      if(bookGroup){
        bookGroup.quotes.push({ text: quoteText, page, ts: Date.now() });
      } else {
        isNewBook = true;
        bookGroup = { book, quotes: [{ text: quoteText, page, ts: Date.now() }] };
        g.bookGroups.push(bookGroup);
      }

      g.count = g.bookGroups.length;
      g.canonical = result.updatedCanonical || result.canonical || g.canonical;
      targetId = g.id;

      statusMsg.classList.remove('loading');
      statusMsg.classList.add('success');

      if(isNewBook){
        reactionTier = getCountMeta(g.count).tier;
        statusMsg.textContent = `새로운 책에서도 발견! (${g.count}회째 발견)`;
      } else {
        reactionTier = null;
        statusMsg.textContent = `같은 책에서 겹치는 문장을 더 모았어요. (이 책에서 ${bookGroup.quotes.length}번째)`;
      }
    } else {
      const newGroup = {
        id: 'g_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
        canonical: result.canonical || quoteText,
        count: 1,
        bookGroups: [{ book, quotes: [{ text: quoteText, page, ts: Date.now() }] }]
      };
      groups.push(newGroup);
      targetId = newGroup.id;
      reactionTier = 1;
      statusMsg.classList.remove('loading');
      statusMsg.classList.add('success');
      statusMsg.textContent = '새 그룹으로 등록했어요.';
    }

    await saveGroups();
    render(targetId);
    refreshBookSuggestions();
    fireConfetti(submitBtn);
    if(reactionTier === null){
      reactCat(null, { emoji: '📚', text: '같은 책에서 또 겹치네' });
    } else {
      reactCat(reactionTier);
    }

    quoteInput.value = '';
    autoResizeQuoteInput();
    bookInput.value = '';
    pageInput.value = '';
    quoteInput.focus();
  }catch(e){
    console.error('classifyQuote 실패:', e);
    // AI 분석이 실패해도(사용량 초과 등) 문장 자체는 잃어버리지 않도록 새 그룹으로 저장
    const newGroup = {
      id: 'g_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      canonical: quoteText,
      count: 1,
      bookGroups: [{ book, quotes: [{ text: quoteText, page, ts: Date.now() }] }],
      unclassified: true
    };
    groups.push(newGroup);
    await saveGroups();
    render(newGroup.id);
    refreshBookSuggestions();
    reactCat(null, { emoji: '📝', text: '일단 저장해둘게!' });

    statusMsg.classList.remove('loading','success');
    statusMsg.textContent = 'AI 분석 없이 일단 저장했어요. (사용량 제한 등으로 자동 분류를 못했어요)';
    statusMsg.classList.add('error');

    quoteInput.value = '';
    autoResizeQuoteInput();
    bookInput.value = '';
    pageInput.value = '';
    quoteInput.focus();
  }finally{
    submitBtn.disabled = false;
  }
}

submitBtn.addEventListener('click', handleSubmit);
quoteInput.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    handleSubmit();
  }
});
bookInput.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter'){
    e.preventDefault();
    handleSubmit();
  }
});
pageInput.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter'){
    e.preventDefault();
    handleSubmit();
  }
});

loadGroups();
</script>
