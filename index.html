<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수집가들 — 좋은 문장은 다시 찾아옵니다</title>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root{
    --bg: #FFFFFF;
    --surface: #FCFCFC;
    --text: #181818;
    --text-secondary: #666666;
    --text-tertiary: #A0A0A0;
    --border: #ECECEC;
    --accent: #2B2B2B;
    --hover: #F5F5F5;
    --danger: #B23A2E;
    --danger-soft: #F5E6E4;
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0;
    width: 100%;
    max-width: 100%;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", sans-serif;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    overflow: hidden; /* [요청 7] 메인 화면은 위아래로 스크롤/슬라이드되지 않음 - 좌우 스와이프만 */
  }
  /* body를 flex column으로 만들고 wrap에 margin:auto를 줘서, Hero 콘텐츠가 화면
     세로 중앙에 오도록 함 - 빈 공간이 아래쪽에만 몰리지 않고 위아래로 고르게 나뉨 */
  body{
    display: flex;
    flex-direction: column;
  }
  /* [변경 2] 모달 열림 상태 - 배경 스크롤 완전 차단.
     실제 스크롤 "위치 보존"은 JS(lockBodyScroll)의 position:fixed가 담당하고,
     여기서는 요청하신 overflow:hidden / touch-action:none을 추가 안전장치로 더함. */
  body.modal-open{
    overflow: hidden;
    touch-action: none;
  }

  .wrap{
    width: 100%;
    max-width: 720px;
    margin: auto auto;
    padding: 24px 20px;
    overflow-x: clip;
  }

  .book-list-search-input{
    width: 100%;
    box-sizing: border-box;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-family: 'Pretendard', sans-serif;
    font-size: 13.5px;
    color: var(--text);
    outline: none;
    margin-bottom: 12px;
    background: var(--bg);
  }
  .book-list-search-input::placeholder{ color: var(--text-tertiary); }
  .book-list-search-input:focus{ border-color: var(--accent); }
  .book-list-empty{
    padding: 20px 4px;
    font-size: 12.5px;
    color: var(--text-tertiary);
    text-align: center;
  }
  .book-list-scroll{
    max-height: 50vh;
    overflow-y: auto;
    overscroll-behavior: contain;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .book-list-item{
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 9px 8px;
    background: none;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    text-align: left;
  }
  .book-list-item:hover{ background: var(--hover); }
  .book-list-item-cover{
    flex-shrink: 0;
    width: 28px;
    aspect-ratio: 5 / 8;
    border-radius: 3px;
    overflow: hidden;
    background: var(--border);
    display: flex; align-items:center; justify-content:center;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-tertiary);
  }
  .book-list-item-cover img{ width:100%; height:100%; object-fit:contain; background:var(--hover); display:block; }
  .book-list-item-title{
    flex: 1;
    min-width: 0;
    font-size: 14px;
    color: var(--text);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .book-list-item.current .book-list-item-title{
    font-weight: 700;
    color: var(--accent);
  }
  .book-list-heart{
    flex-shrink: 0;
    color: #FF5A5F;
  }

  /* ── 우측 하단 FAB 메뉴 (⋯ 누르면 추가/수정/검색이 스르륵 펼쳐짐) ── */
  .fab-backdrop{
    display: none;
    position: fixed;
    inset: 0;
    background: transparent;
    z-index: 68;
  }
  .fab-backdrop.open{ display: block; }
  .fab-menu{
    position: fixed;
    right: 20px;
    bottom: max(20px, env(safe-area-inset-bottom));
    z-index: 70;
  }
  .fab-trigger{
    position: relative;
    width: 48px; height: 48px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #FFFFFF;
    display: flex; align-items:center; justify-content:center;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(24,24,24,0.22);
    z-index: 2;
    transition: transform 0.15s ease;
  }
  .fab-trigger:active{ transform: scale(0.92); }
  .fab-item{
    position: absolute;
    right: 2px;
    bottom: 0;
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-secondary);
    font-size: 18px;
    line-height: 1;
    display: flex; align-items:center; justify-content:center;
    cursor: pointer;
    box-shadow: 0 3px 10px rgba(24,24,24,0.14);
    opacity: 0;
    transform: scale(0.4);
    pointer-events: none;
    transition: opacity 0.18s ease, transform 0.18s ease, bottom 0.18s ease;
    z-index: 1;
  }
  /* 스르륵 순서대로: 검색(트리거 바로 위) → 수정 → 추가(젤 위) */
  .fab-menu.open .fab-item{
    opacity: 1;
    transform: scale(1);
    pointer-events: auto;
  }
  .fab-menu.open .fab-item.search{ bottom: 58px; transition-delay: 0s; }
  .fab-menu.open .fab-item.edit{ bottom: 112px; transition-delay: 0.04s; }
  .fab-menu.open .fab-item.add{ bottom: 166px; transition-delay: 0.08s; }

  /* 좋아요 토글 (책 정보 수정 시트) */
  .edit-favorite-toggle{
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    box-sizing: border-box;
    background: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 12px;
    font-family: 'Pretendard', sans-serif;
    font-size: 14px;
    color: var(--text-secondary);
    cursor: pointer;
    text-align: left;
  }
  .edit-favorite-toggle svg{ flex-shrink: 0; color: var(--border); transition: color 0.15s ease; }
  .edit-favorite-toggle.favorited{ color: var(--text); }
  .edit-favorite-toggle.favorited svg{ color: #FF5A5F; }

  /* 한줄평 - 배경/테두리 없이, 큰 따옴표 아이콘 + 굵은 글씨로 강조 */
  .hero-oneliner{
    margin: 18px auto 0;
    max-width: 300px;
    padding: 0 6px;
    font-size: 16px;
    font-weight: 700;
    line-height: 1.55;
    color: var(--text);
    text-align: center;
  }
  .hero-oneliner .quote-mark{
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--text-tertiary);
    line-height: 0;
    vertical-align: -4px;
    margin: 0 5px;
  }
  /* "3 / 12" 위치 표시 - Dot과 달리 권수가 많아져도 크기가 그대로라 지저분해지지 않음.
     겸사겸사 "더 넘길 수 있다"는 힌트도 조용히 줌. */
  .hero-position{
    margin-top: 14px;
    text-align: center;
    font-size: 12px;
    letter-spacing: 0.02em;
    color: var(--text-tertiary);
    opacity: 0.75;
  }

  /* ── 단일 책 Hero ─────────────────────────── */
  .book-hero{
    width: 100%;
    max-width: 100%;
    margin-bottom: 8px;
    overflow-x: clip;
  }
  .hero-nav{
    position: relative;
    width: 100%;
    max-width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: clip;
  }

  .hero-book{
    flex-shrink: 0;
    width: min(360px, calc(100vw - 48px));
    text-align: center;
    user-select: none;
    touch-action: none;
    cursor: grab;
    animation: heroFade 0.2s ease both;
  }
  .hero-book:active{ cursor: grabbing; }
  .hero-book.dir-next{ animation: heroSlideFromBelow 0.2s ease both; }
  .hero-book.dir-prev{ animation: heroSlideFromAbove 0.2s ease both; }
  /* wrap은 항상 폭 100%(hero-book 기준) 고정 → Hero 전체 레이아웃(제목·저자 위치, 전체 높이)이
     책마다 절대 흔들리지 않음. 그림자(::before)도 이 고정 기준이라 안정적임. */
  .hero-cover-wrap{
    position: relative;
    width: 100%;
    margin: 0 auto 24px;
    animation: heroFloat 7s ease-in-out infinite;
  }
  .hero-cover-wrap::before{
    content: "";
    position: absolute;
    left: 50%;
    bottom: -8px;
    transform: translateX(-50%);
    width: 164px;
    height: 26px;
    background: radial-gradient(ellipse at center, rgba(24,24,24,0.16) 0%, rgba(24,24,24,0) 72%);
    z-index: 0;
  }
  /* 고정 높이 무대(stage) 위에서 표지를 가운데 정렬만 함.
     표지 자체의 가로 폭은 원본 이미지 비율에 따라 책마다 달라지지만,
     stage의 높이·중심점은 항상 동일해서 제목/저자/Dot 위치가 흔들리지 않음. */
  .hero-cover-stage{
    position: relative;
    height: 352px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* inline-block으로 hero-cover의 실제 크기에 딱 맞게 감싸는 액자.
     딤·"수정" 라벨을 여기(형제 요소)에 두면, renderCoverInto가 #heroCover의
     내용(이미지/이니셜)만 교체해도 딤/라벨은 절대 함께 지워지지 않음. */
  .hero-cover-frame{
    position: relative;
    display: inline-block;
    height: 100%;
    vertical-align: top;
  }
  /* [A] 처음 오는 사람에게 "눌러볼 수 있다"는 걸 조용히 알려주는 힌트 - 기기당 딱 한 번만 재생됨 */
  .hero-cover-frame.tap-hint{
    animation: tapHintPulse 0.55s ease-in-out 0.7s 2;
  }
  @keyframes tapHintPulse{
    0%, 100%{ transform: scale(1); }
    50%{ transform: scale(1.045); }
  }
  /* [확인 반영] 표지 프레임을 고정 크기(5:8, '100세 철학자의 행복론' 기준)로 통일.
     책마다 표지 비율이 달라도 프레임 크기는 항상 동일 → 여백 없이 이미지가 꽉 채워지고,
     원본 비율이 다르면 중앙 기준으로 자연스럽게 크롭됨(아래 object-fit:cover). */
  .hero-cover{
    position: relative;
    z-index: 1;
    height: 100%;
    width: 220px;
    border-radius: 8px;
    overflow: hidden;
    background: var(--hover);
    box-shadow: 0 10px 22px rgba(24,24,24,0.12);
  }
  .hero-cover img{
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
    pointer-events: none;
  }
  .hero-cover.no-cover{
    display:flex; align-items:center; justify-content:center;
    font-size: 42px;
    font-weight: 600;
    color: var(--text-tertiary);
  }
  .hero-title{
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.35;
  }
  .hero-meta{
    font-size: 13.5px;
    color: var(--text-tertiary);
  }
  .hero-meta .meta-chevron{
    display: inline-block;
    margin-left: 2px;
    opacity: 0.6;
  }
  .hero-meta .meta-connect-dot{
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    margin-left: 5px;
    vertical-align: middle;
  }
  @keyframes heroFade{
    from{ opacity: 0; transform: scale(0.98); }
    to{ opacity: 1; transform: scale(1); }
  }
  @keyframes heroSlideFromBelow{
    from{ opacity: 0; transform: translateY(18px); }
    to{ opacity: 1; transform: translateY(0); }
  }
  @keyframes heroSlideFromAbove{
    from{ opacity: 0; transform: translateY(-18px); }
    to{ opacity: 1; transform: translateY(0); }
  }
  @keyframes heroFloat{
    0%, 100%{ transform: translateY(0); }
    50%{ transform: translateY(2px); }
  }

  /* ── 문장 남기기 버튼 (문장 시트 맨 아래) ──── */
  .add-quote-fab{
    display: flex;
    align-items: center;
    justify-content: center;
    width: auto;
    margin: 20px auto 4px;
    padding: 6px 14px;
    border: none;
    background: none;
    color: var(--text-tertiary);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .add-quote-fab:hover{ color: var(--text); }
  .add-quote-fab:active{ opacity: 0.6; }

  .cta-btn{
    pointer-events: auto;
    border: none;
    border-radius: 999px;
    font-family: 'Pretendard', sans-serif;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  }
  .cta-primary{
    background: var(--accent);
    color: #FFFFFF;
    font-size: 14px;
    font-weight: 700;
    padding: 14px 26px;
    box-shadow: 0 3px 10px rgba(24,24,24,0.16);
  }
  .cta-primary:hover{ box-shadow: 0 4px 13px rgba(24,24,24,0.2); }
  .cta-btn:active{ transform: scale(0.96); }

  /* ── 책 읽기 뷰 ───────────────────────────── */
  .reading-view{
    max-width: 560px;
    margin: 0 auto;
  }
  .reading-entry{
    position: relative;
    padding: 28px 4px;
    border-bottom: 1px solid var(--border);
  }
  .reading-entry:last-child{ border-bottom: none; }
  /* 중요 문장: 문장의 위치·폭·카드 높이는 전혀 건드리지 않고,
     여백 바깥의 아주 얇은 accent strip과 미세한 배경 톤만으로 표시함. */
  .reading-entry.important{
    background: #FCFBF7;
  }
  .reading-entry.important::before{
    content: "";
    position: absolute;
    left: -14px;
    top: 28px;
    bottom: 28px;
    width: 2px;
    border-radius: 1px;
    background: var(--accent);
    opacity: 0.55;
  }
  .reading-text{
    font-size: 16.5px;
    line-height: 2;
    color: var(--text);
    margin: 0;
    text-align: left;
    word-break: keep-all;
    overflow-wrap: break-word;
  }
  .reading-text.important{
    font-weight: 500;
  }
  /* [요청 3] 너무 긴 문장은 기본 4줄까지만 보이고 "…"로 줄여 표시, 눌러서 펼침/접음 */
  .reading-text.clamped{
    display: -webkit-box;
    -webkit-box-orient: vertical;
    -webkit-line-clamp: 4;
    line-clamp: 4;
    overflow: hidden;
  }
  .reading-text.has-toggle{ cursor: pointer; }
  .reading-text.clamped.expanded{
    display: block;
    -webkit-line-clamp: unset;
    line-clamp: unset;
    overflow: visible;
  }
  .quote-entry-note{
    margin-top: 10px;
    font-size: 12px;
    color: var(--text-secondary);
    background: var(--hover);
    border-radius: 6px;
    padding: 9px 11px;
    line-height: 1.65;
  }
  .quote-entry-note .note-label{
    display:block;
    font-size: 10.5px;
    font-weight: 700;
    color: var(--text-tertiary);
    margin-bottom: 3px;
  }
  /* [정렬 수정] 페이지 번호·더보기(왼쪽)와 별····(오른쪽)를 같은 flex row에 두어서,
     텍스트 길이나 페이지 유무와 무관하게 항상 같은 줄에서 정렬되도록 함.
     예전에는 아이콘이 카드 하단에 절대 위치로 떠 있고 "더보기"는 텍스트 흐름을 따라가서,
     내용에 따라 둘의 높이가 서로 어긋나는 문제가 있었음. */
  .reading-footer{
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
    min-height: 40px;
  }
  .reading-footer-left{
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }
  .reading-page{
    font-size: 11.5px;
    color: var(--text-tertiary);
    flex-shrink: 0;
  }
  .text-toggle{
    display: inline-block;
    background: none;
    border: none;
    padding: 2px 0;
    font-family: 'Pretendard', sans-serif;
    font-size: 12px;
    color: var(--text-tertiary);
    cursor: pointer;
    flex-shrink: 0;
  }
  .text-toggle:hover{ color: var(--accent); }
  .reading-footer-right{
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }
  .reading-menu{
    width: 40px;
    height: 40px;
    display: flex; align-items: center; justify-content: center;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-tertiary);
    opacity: 0.35;
    font-size: 15px;
    letter-spacing: 1px;
    transition: opacity 0.15s ease, color 0.15s ease;
    touch-action: manipulation;
  }
  .reading-menu:active{ opacity: 1; color: var(--text); }
  @media (hover: hover) and (pointer: fine){
    .reading-menu:hover{ opacity: 1; color: var(--text); }
  }

  /* [B] 중요 표시 - '···' 메뉴를 거치지 않고 탭 한 번으로 즉시 토글됨 */
  .reading-favorite{
    width: 40px;
    height: 40px;
    display: flex; align-items: center; justify-content: center;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-tertiary);
    opacity: 0.35;
    transition: opacity 0.15s ease, color 0.15s ease;
    touch-action: manipulation;
  }
  .reading-favorite.active{ opacity: 1; color: var(--accent); }
  .reading-favorite:active{ opacity: 1; }
  @media (hover: hover) and (pointer: fine){
    .reading-favorite:hover{ opacity: 1; color: var(--text); }
  }

  .echo-link{
    display: inline-flex;
    align-items: center;
    margin-top: 12px;
    background: var(--hover);
    border: none;
    border-radius: 999px;
    cursor: pointer;
    font-size: 11.5px;
    font-weight: 600;
    color: var(--accent);
    padding: 6px 12px;
    transition: background 0.15s ease;
  }
  .echo-link:hover{ background: var(--border); }

  .echo-detail{
    display: none;
    flex-direction: column;
    gap: 16px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px dashed var(--border);
  }
  .echo-detail.open{ display: flex; }
  .echo-book{
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .echo-quote{
    font-size: 13.5px;
    line-height: 1.7;
    color: var(--text);
    margin: 0 0 3px;
  }
  .echo-quote-page{
    font-size: 11px;
    color: var(--text-tertiary);
    margin: 0 0 10px;
  }
  .echo-quote:last-of-type{ margin-bottom: 0; }

  .empty{
    text-align:center;
    padding: 64px 20px;
    color: var(--text-tertiary);
    font-size: 13.5px;
    line-height: 1.9;
  }
  .empty-title{
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 18px;
  }
  .empty-cta{
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 999px;
    padding: 10px 20px;
    font-family: 'Pretendard', sans-serif;

  .toast{

  /* ── 문장 ··· 액션 팝오버 (수정/삭제) ──────── */
  /* 투명하지만 클릭은 가로채는 배경 - 바깥을 눌러 닫을 때 그 클릭이
     뒤로 새어나가지 않게 막아줌 (문장 시트가 이미 자체 스크롤 잠금을 갖고 있어
     이 팝오버는 별도의 lockBodyScroll 없이 가볍게 동작함) */
  .entry-action-backdrop{
    display: none;
    position: fixed;
    inset: 0;
    background: transparent;
    z-index: 96;
  }
  .entry-action-backdrop.open{ display: block; }
  .entry-action-popover{
    position: fixed;
    display: flex;
    flex-direction: column;
    width: min(180px, calc(100vw - 32px));

    border: 1px solid var(--border);

  }
  .entry-action-popover.open{
    opacity: 1;

    pointer-events: auto;
  }
  .entry-action-item{
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    border-radius: 9px;
    padding: 11px 14px;
    font-family: 'Pretendard', sans-serif;
    font-size: 14px;

  .entry-action-item:active{ background: var(--hover); }
  @media (hover: hover) and (pointer: fine){
    .entry-action-item:hover{ background: var(--hover); }
  }
  .entry-action-item.danger{ color: var(--danger); }

  /* iOS Safari는 input/textarea의 font-size가 16px 미만이면 포커스 시 화면을 자동으로 확대함.
     사용자의 핀치 줌 기능 자체는 막지 않고(viewport에 maximum-scale/user-scalable 제한 없음),
     입력창 폰트 크기만 16px로 맞춰서 원치 않는 자동 확대만 방지함. */
  @media (max-width: 768px){
    input,
    textarea,
    select{
      font-size: 16px !important;
    }
  }
</style>

const WORKER_URL = "https://truth-collector-proxy.dingapark1.workers.dev";

// ⚠️ 보안 안내: 아래 SITE_SECRET은 이 HTML 파일 안에 평문으로 들어있습니다.
// GitHub Pages에 올라간 순간 "누구나 페이지 소스에서 볼 수 있는 값"이 되므로,
// 엄밀히는 "비밀"이 아니라 "약한 접근 제한 토큰" 정도로 취급해야 합니다.
// 절대 이 값을 console.log 등으로 출력하지 마세요. (아래 코드 어디에서도 출력하지 않습니다)
// 더 안전하게 만들고 싶다면 Worker 쪽에서 Origin 검증 강화, 요청 속도 제한(rate limit),
// 주기적인 SITE_SECRET 교체 등을 함께 적용하는 것을 권장합니다.
const SITE_SECRET = "my-cat-2026";

const IS_CLAUDE_ARTIFACT = !!window.storage;

// claude.ai 아티팩트 안에서는 window.storage를,
// 깃허브 페이지 등 밖에서는 Worker + Cloudflare KV(클라우드 저장소)를 사용해서
// 어느 기기에서 열어도 같은 데이터를 볼 수 있게 함
const storageAdapter = {
  async get(key){
    if(IS_CLAUDE_ARTIFACT){
      try{ return await window.storage.get(key, false); }catch(e){ return null; }
    }
    try{
      const res = await fetch(WORKER_URL + "/data", {
        method: "GET",
        headers: { "X-Site-Secret": SITE_SECRET }
      });
      if(!res.ok) return null;
      const value = await res.text();
      return { value };
    }catch(e){
      return null;
    }
  },
  async set(key, value){
    if(IS_CLAUDE_ARTIFACT){
      return await window.storage.set(key, value, false);
    }
    try{
      await fetch(WORKER_URL + "/data", {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Site-Secret": SITE_SECRET },
        body: value
      });
    }catch(e){
      return null;
    }
    return { key, value };
  }
};

function showConfirm(message, okLabel){
  confirmMessage.textContent = message;
  confirmOk.textContent = okLabel || '삭제';
  confirmOverlay.classList.add('open');
  return new Promise((resolve) => {
    confirmResolver = resolve;
  });
}
function resolveConfirm(result){
  confirmOverlay.classList.remove('open');
  if(confirmResolver){
    confirmResolver(result);
    confirmResolver = null;
  }
}
confirmOk.addEventListener('click', () => resolveConfirm(true));

let statusTimer = null;
function showStatus(text, type, autoHideMs){
  clearTimeout(statusTimer);
  statusMsg.classList.remove('loading','success','error','show');
  statusMsg.textContent = text;
  if(type) statusMsg.classList.add(type);
  void statusMsg.offsetWidth; // 리플로우를 강제로 일으켜 트랜지션 재시작
  statusMsg.classList.add('show');
  if(autoHideMs){
    statusTimer = setTimeout(() => {
      statusMsg.classList.remove('show');
    }, autoHideMs);
  }
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str || '';

}

function normalizeTitle(title){
  return (title || '').trim().replace(/\s+/g, ' ').toLowerCase();
}

// 검색 결과 썸네일과 Hero 표지 모두 이 함수 하나로 통일해서 처리함.
function renderCoverInto(containerEl, url, initialLetter){
  if(!containerEl) return;
  containerEl.innerHTML = '';
  if(!url){
    containerEl.classList.add('no-cover');
    containerEl.textContent = initialLetter || '';
    return;
  }
  const img = document.createElement('img');
  img.src = url;
  img.alt = '';
  img.addEventListener('error', () => {
    containerEl.classList.add('no-cover');
    containerEl.innerHTML = '';
    containerEl.textContent = initialLetter || '';
  }, { once: true });
  containerEl.classList.remove('no-cover');
  containerEl.appendChild(img);
}

// 사진 보관함에서 선택한 이미지를 표지 비율에 맞게 축소해서 데이터 URL로 반환.
// (KV에 그대로 저장해도 부담 없도록 가로/세로 최대 480px, JPEG 품질 0.82로 압축)
function resizeImageFile(file, maxDim, quality){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let width = img.width;
        let height = img.height;
        if(width > height){
          if(width > maxDim){ height = Math.round(height * maxDim / width); width = maxDim; }
        } else {
          if(height > maxDim){ width = Math.round(width * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = () => reject(new Error('이미지를 읽을 수 없습니다.'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('파일을 읽을 수 없습니다.'));
    reader.readAsDataURL(file);
  });
}

function migrateGroup(g){
  if(g.bookGroups) return g;
  const map = new Map();
  (g.sources || []).forEach(s => {
    const key = (s.book || '').trim();
    if(!map.has(key)) map.set(key, []);
    map.get(key).push({ text: s.text, page: s.page || '', ts: s.ts || 0 });
  });
  g.bookGroups = Array.from(map.entries()).map(([book, quotes]) => ({ book, quotes }));
  if(g.bookGroups.length === 0){
    g.bookGroups = [{ book: '', quotes: [] }];
  }
  g.count = g.bookGroups.length;
  delete g.sources;
  return g;
}

// bookGroups에만 존재하고 아직 books 컬렉션에 없는 책들을 1회성으로 옮겨 담음
function migrateBooksFromGroups(){
  const seen = new Set(books.map(b => normalizeTitle(b.title)));
  let changed = false;
  groups.forEach(g => {
    g.bookGroups.forEach(bg => {
      const title = (bg.book || '').trim();
      if(!title) return;
      const norm = normalizeTitle(title);
      if(!seen.has(norm)){
        seen.add(norm);
        books.push({
          id: 'book_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
          title,
          authors: [],
          publisher: '',
          publishedDate: '',
          coverUrl: '',
          externalId: '',
          addedAt: Date.now()
        });
        changed = true;
      }
    });
  });
  return changed;
}

// (이제는 book.coverUrl에 직접 저장하는 방식으로 바뀌어서 이 로컬 캐시 자체를 더 이상 사용하지 않음)

    const k = localStorage.key(i);
    if(k && k.startsWith('cover:')){
      localStorage.removeItem(k);
    }
  }
}catch(e){}

async function loadAll(){
  let changed = false;
  try{
    const res = await storageAdapter.get(STORAGE_KEY);
    let parsed = res && res.value ? JSON.parse(res.value) : null;

    if(Array.isArray(parsed)){
      // 예전 저장 형식(문장 배열만 저장)에서 새 형식({groups, books})으로 전환
      groups = parsed;
      books = [];
      changed = true;
    } else if(parsed && typeof parsed === 'object'){
      groups = Array.isArray(parsed.groups) ? parsed.groups : [];
      books = Array.isArray(parsed.books) ? parsed.books : [];
    } else {
      groups = [];
      books = [];
    }

    // 예전 버전(브라우저 저장 방식)을 쓰던 시절, 이 브라우저에만 남아있던 데이터가 있다면
    // 클라우드가 비어있을 때 한 번만 끌어올려서 동기화
    if(!IS_CLAUDE_ARTIFACT && groups.length === 0 && books.length === 0){
      const legacyRaw = localStorage.getItem(STORAGE_KEY);
      if(legacyRaw){
        try{
          const legacyParsed = JSON.parse(legacyRaw);
          if(Array.isArray(legacyParsed) && legacyParsed.length > 0){
            groups = legacyParsed;
            changed = true;
          } else if(legacyParsed && Array.isArray(legacyParsed.groups)){
            groups = legacyParsed.groups;
            books = Array.isArray(legacyParsed.books) ? legacyParsed.books : [];
            changed = true;
          }
        }catch(e){}
      }
    }

    // 예전 데이터 구조(sources 배열)를 새 구조(책 단위 bookGroups)로 1회성 변환
    groups.forEach(g => { if(!g.bookGroups) changed = true; });
    groups = groups.map(g => migrateGroup(g));

    // bookGroups에만 있던 책들을 books 컬렉션으로 1회성 이관
    if(migrateBooksFromGroups()) changed = true;

    // 🧪 테스트 전용: claude.ai 미리보기(IS_CLAUDE_ARTIFACT) 안에서만,
    // 책이 하나도 없을 때 구글 Books API 없이도 바로 테스트할 수 있도록 책 1권을 임시로 넣어줌.
    // 실제 깃허브 페이지 배포본에서는 IS_CLAUDE_ARTIFACT가 항상 false라 이 코드는 절대 실행되지 않음.
    if(IS_CLAUDE_ARTIFACT && books.length === 0){
      books.push({
        id: 'book_test_seed',
        title: '데미안',
        authors: ['헤르만 헤세'],
        publisher: '민음사',
        publishedDate: '2000',
        coverUrl: '',
        externalId: '',
        addedAt: Date.now()
      });
      changed = true;
    }

  }catch(e){
    console.error('데이터 로드 실패:', e);
    groups = [];
    books = [];
  }

  if(changed){
    await saveAll();
  }

  currentBookId = loadCurrentBookId();
  renderApp();
}

async function saveAll(){
  try{
    await storageAdapter.set(STORAGE_KEY, JSON.stringify({ groups, books }));
  }catch(e){
    console.error('저장 실패:', e);
    showStatus('기록을 저장하지 못했습니다. 잠시 후 다시 시도해주세요.', 'error');
  }
}

// 한글 제목은 ㄱ~ㅎ 순으로 먼저, 그 다음 영문 등 나머지는 a~z 순으로 정렬
function bookTitleSortBucket(title){
  const ch = (title || '').trim().charAt(0);
  return /[\uAC00-\uD7A3\u3131-\u318E]/.test(ch) ? 0 : 1;
}
function getSortedBooks(){
  return [...books].sort((a, b) => {
    const ba = bookTitleSortBucket(a.title);
    const bb = bookTitleSortBucket(b.title);
    if(ba !== bb) return ba - bb;
    return a.title.localeCompare(b.title, ba === 0 ? 'ko' : 'en');
  });
}

function getBookSentences(book){
  const norm = normalizeTitle(book.title);
  const entries = [];
  groups.forEach(g => {
    g.bookGroups.forEach((bg, bidx) => {
      if(normalizeTitle(bg.book || '') !== norm) return;
      bg.quotes.forEach((q, qidx) => {
        entries.push({
          text: q.text, page: q.page, note: q.note, ts: q.ts || 0,
          important: !!q.important,
          groupId: g.id, groupCount: g.count, bidx, qidx
        });
      });
    });
  });
  entries.sort((a, c) => {
    const pa = parseInt(a.page, 10), pc = parseInt(c.page, 10);
    const av = !isNaN(pa), cv = !isNaN(pc);
    if(av && cv) return pa - pc;
    if(av) return -1;
    if(cv) return 1;
    return 0;
  });
  return entries;
}

  if(sortedBooks.length === 0){
    bookHero.innerHTML = `
      <div class="empty">
        <div class="empty-title">아직 추가한 책이 없습니다.</div>
        <button class="empty-cta" id="emptyAddBookBtn">첫 책 추가하기</button>
      </div>`;
    if(sentenceSheetOverlay.classList.contains('open')) closeSentenceSheet();
    const btn = document.getElementById('emptyAddBookBtn');
    if(btn) btn.addEventListener('click', openAddBook);
    return;
  }

  let idx = sortedBooks.findIndex(b => b.id === currentBookId);
  if(idx < 0) idx = 0;
  currentBookId = sortedBooks[idx].id;
  saveCurrentBookId(currentBookId);

  renderHero(sortedBooks[idx], direction, idx, sortedBooks.length);

  // 문장 시트가 열려있는 동안 저장/수정/삭제가 일어나도 그 내용이 곧바로 최신화되도록 함

    renderReadingView(sortedBooks[idx]);
  }
}

function renderBookListItems(list){
  if(list.length === 0){
    bookListScroll.innerHTML = `<div class="book-list-empty">검색 결과가 없습니다.</div>`;
    return;
  }
  bookListScroll.innerHTML = list.map(b => `
    <button type="button" class="book-list-item ${b.id === currentBookId ? 'current' : ''}" data-id="${b.id}">
      <span class="book-list-item-cover" id="bookListCover-${b.id}"></span>
      <span class="book-list-item-title">${escapeHtml(b.title)}</span>
      ${b.favorite ? '<span class="book-list-heart" title="좋아하는 책"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg></span>' : ''}
    </button>
  `).join('');

  list.forEach(b => {
    const coverEl = document.getElementById(`bookListCover-${b.id}`);
    if(!coverEl) return;
    if(b.coverUrl){
      renderCoverInto(coverEl, b.coverUrl, b.title.slice(0, 1));
    } else {
      coverEl.classList.add('no-cover');
      coverEl.textContent = b.title.slice(0, 1);
    }
  });

  bookListScroll.querySelectorAll('.book-list-item').forEach(item => {
    item.addEventListener('click', () => {
      currentBookId = item.dataset.id;
      saveCurrentBookId(currentBookId);
      closeBookList();
      renderApp();
    });
  });
}

function renderHero(book, direction, idx, total){
  const sentences = getBookSentences(book);
  const sentenceCount = sentences.length;
  // [A] 다른 책과 연결된(같은 생각을 한) 문장이 하나라도 있으면, 메타 줄에 아주 작은 힌트를 얹음
  const hasConnections = sentences.some(e => (e.groupCount || 1) > 1);

  const authors = (book.authors || []).filter(Boolean).join(', ');
  const metaText = authors ? `${authors} · 수집한 문장 ${sentenceCount}개` : `수집한 문장 ${sentenceCount}개`;
  const oneLinerHtml = book.oneLiner
    ? `<div class="hero-oneliner"><span class="quote-mark">“</span>${escapeHtml(book.oneLiner)}<span class="quote-mark">”</span></div>`
    : '';

  const dirClass = direction === 'next' ? 'dir-next' : direction === 'prev' ? 'dir-prev' : '';

  // [A] 이 기기에서 앱을 처음 켠 것이라면, 표지를 탭할 수 있다는 걸 살짝 알려주는 힌트를 한 번만 재생함
  let showTapHint = false;
  try{ showTapHint = !localStorage.getItem('heroTapHintShown'); }catch(e){ showTapHint = false; }

  // 책이 2권 이상일 때만 "3 / 12" 형태로 표시. Dot과 달리 권수가 아무리 많아도 크기가 안 늘어나고,
  // 스와이프할 때마다 조용히 갱신되어 "더 넘길 수 있다"는 힌트도 겸함.
  const positionHtml = (typeof total === 'number' && total > 1)
    ? `<div class="hero-position">${idx + 1} / ${total}</div>`
    : '';

  bookHero.innerHTML = `
    <div class="hero-nav">
      <div class="hero-book ${dirClass}" id="heroBook">
        <div class="hero-cover-wrap" id="heroCoverWrap">
          <div class="hero-cover-stage">
            <div class="hero-cover-frame ${showTapHint ? 'tap-hint' : ''}">
              <div class="hero-cover no-cover" id="heroCover">${escapeHtml(book.title.slice(0,1))}</div>
            </div>
          </div>
        </div>
        <div class="hero-title">${escapeHtml(book.title)}</div>
        <div class="hero-meta">${escapeHtml(metaText)}<span class="meta-chevron">›</span>${hasConnections ? '<span class="meta-connect-dot" title="다른 책과 연결된 문장이 있어요"></span>' : ''}</div>
        ${oneLinerHtml}
      </div>
    </div>
    ${positionHtml}
  `;

  if(showTapHint){
    try{ localStorage.setItem('heroTapHintShown', '1'); }catch(e){}
  }

  const coverEl = document.getElementById('heroCover');
  if(book.coverUrl){
    renderCoverInto(coverEl, book.coverUrl, book.title.slice(0,1));
  } else {
    coverEl.classList.add('no-cover');
    coverEl.textContent = book.title.slice(0,1);
  }

  // [요청 2] 릴스처럼 위/아래로 드래그하면 다음/이전 책, 가볍게 탭하면 문장 시트가 열림.
  // 맨 처음/마지막 책에서 더 당기면 살짝 당겨졌다 튕겨 돌아오는 작은 바운스를 줌.
  const heroBookEl = document.getElementById('heroBook');
  let pointerStartY = null;
  let pointerMoved = false;
  let dragDy = 0;

  const maxDrag = 90;
  const sortedBooks = getSortedBooks();
  const singleBook = sortedBooks.length <= 1;

  function applyDrag(dy){
    const atStart = idx === 0;
    const atEnd = idx === sortedBooks.length - 1;
    let clamped = dy;
    // 맨 끝에서 더 당기면 저항을 줘서 조금만 움직이게 함 (고무줄 느낌)
    if((atStart && dy > 0) || (atEnd && dy < 0)){
      clamped = dy * 0.35;
      if(clamped > 10) clamped = 10;
      if(clamped < -10) clamped = -10;
    } else if(Math.abs(dy) > maxDrag){
      clamped = maxDrag * Math.sign(dy);
    }
    heroBookEl.style.transform = `translateY(${clamped}px)`;
  }

  function resetDrag(withBounce){
    heroBookEl.style.transition = withBounce ? 'transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)' : 'transform 0.2s ease';
    heroBookEl.style.transform = 'translateY(0)';
    setTimeout(() => { heroBookEl.style.transition = ''; }, 320);
  }

  heroBookEl.addEventListener('pointerdown', (e) => {
    pointerStartY = e.clientY;
    pointerMoved = false;
    dragDy = 0;
    heroBookEl.style.transition = 'none';
  });
  heroBookEl.addEventListener('pointermove', (e) => {
    if(pointerStartY === null) return;
    dragDy = e.clientY - pointerStartY;
    if(Math.abs(dragDy) > 6) pointerMoved = true;
    if(!singleBook && pointerMoved) applyDrag(dragDy);
  });
  heroBookEl.addEventListener('pointerup', () => {
    if(pointerStartY === null) return;
    const dy = dragDy;
    pointerStartY = null;

    if(!singleBook && Math.abs(dy) >= 40){
      // 아래로 당기면 이전 책, 위로 당기면 다음 책 (릴스와 동일한 방향 감각)
      const goingPrev = dy > 0 && idx > 0;
      const goingNext = dy < 0 && idx < sortedBooks.length - 1;
      if(goingPrev){ resetDrag(false); goToBook(idx - 1); return; }
      if(goingNext){ resetDrag(false); goToBook(idx + 1); return; }
    }
    if(!pointerMoved){
      // 가볍게 탭한 것으로 판단 → 문장 목록 시트 열기
      openSentenceSheet(book);
    }
    resetDrag(true);
  });
  heroBookEl.addEventListener('pointerleave', () => {
    if(pointerStartY === null) return;
    pointerStartY = null;
    resetDrag(true);
  });
}

function goToBook(newIdx){
  const sortedBooks = getSortedBooks();
  if(newIdx < 0 || newIdx >= sortedBooks.length) return;
  const oldIdx = sortedBooks.findIndex(b => b.id === currentBookId);
  const direction = newIdx > oldIdx ? 'next' : 'prev';
  currentBookId = sortedBooks[newIdx].id;
  saveCurrentBookId(currentBookId);
  renderApp(direction);
}

// 데스크톱 키보드 위/아래 방향키로도 책 전환 (입력 중일 때는 무시)
document.addEventListener('keydown', (e) => {
  const tag = document.activeElement && document.activeElement.tagName;
  if(tag === 'INPUT' || tag === 'TEXTAREA') return;
  if(e.key !== 'ArrowUp' && e.key !== 'ArrowDown') return;
  const sortedBooks = getSortedBooks();
  if(sortedBooks.length === 0) return;
  const idx = sortedBooks.findIndex(b => b.id === currentBookId);
  goToBook(e.key === 'ArrowUp' ? idx - 1 : idx + 1);
});

// 중앙 Dialog가 실제로 "보이는" 화면(visual viewport) 안에 오도록 위치를 맞춤.
// 키보드가 닫혀있으면 화면 중앙(.keyboard-open 없음),
// 키보드가 열려서 visual viewport가 줄어들면 그 안의 위쪽에 붙임(.keyboard-open).
function syncDialogViewport(){
  const vv = window.visualViewport;
  if(!vv) return;
  const keyboardOpen = window.innerHeight - vv.height > 150;
  document.querySelectorAll('.sheet-overlay').forEach(overlay => {
    overlay.style.top = `${vv.offsetTop}px`;
    overlay.style.height = `${vv.height}px`;
    overlay.style.bottom = 'auto';
    overlay.classList.toggle('keyboard-open', keyboardOpen);
  });
}
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', syncDialogViewport);
  window.visualViewport.addEventListener('scroll', syncDialogViewport);
}
window.addEventListener('orientationchange', syncDialogViewport);

// iOS에서 visualViewport의 resize 이벤트가 살짝 늦게 올 때가 있어서,
// 입력창에 포커스가 가는 즉시도 한 번 더 동기화해 반응성을 높임
['quoteInput', 'pageInput', 'editQuoteInput', 'editPageInput',
 'addBookTitleInput', 'addBookAuthorInput', 'editBookTitleInput', 'editBookAuthorInput']
  .forEach(id => {
    const el = document.getElementById(id);
    if(el) el.addEventListener('focus', syncDialogViewport);
  });

// Dialog를 닫을 때 위치 관련 inline 스타일/키보드 상태를 원래대로 되돌림
function resetDialogViewport(overlay){
  overlay.style.top = '';
  overlay.style.height = '';
  overlay.style.bottom = '';
  overlay.classList.remove('keyboard-open');
}

// Dialog가 열려있는 동안 배경 페이지가 스크롤/흔들리지 않도록 고정.
// 단순히 overflow:hidden만 쓰면 iPhone Safari에서 스크롤 위치가 튀는 문제가 있어서,
// 현재 위치를 저장한 뒤 body를 position:fixed로 고정하고, 닫힐 때 그 위치로 복원함.
// 여러 Dialog가 겹쳐 열릴 수 있어(예: 문장 작성 중 새 책 추가) 카운터로 관리함.
// [변경 2] 추가로 body에 modal-open 클래스를 붙여서 touch-action:none 등 CSS 훅도 함께 적용.
let scrollLockCount = 0;
let savedScrollY = 0;
function lockBodyScroll(){
  if(scrollLockCount === 0){
    savedScrollY = window.scrollY || window.pageYOffset || 0;
    document.body.style.position = 'fixed';
    document.body.style.top = `-${savedScrollY}px`;
    document.body.style.width = '100%';
    document.body.classList.add('modal-open');
  }
  scrollLockCount++;
}
function unlockBodyScroll(){
  scrollLockCount = Math.max(0, scrollLockCount - 1);
  if(scrollLockCount === 0){
    document.body.style.position = '';
    document.body.style.top = '';
    document.body.style.width = '';
    document.body.classList.remove('modal-open');
    window.scrollTo(0, savedScrollY);
  }
}

function renderReadingView(book){
  const entries = getBookSentences(book);

  if(entries.length === 0){
    readingView.innerHTML = `
      <div class="empty">
        <div class="empty-title">아직 남긴 문장이 없습니다.</div>
      </div>`;
    return;
  }

  readingView.innerHTML = entries.map((e, entryIdx) => {
    const otherCount = (e.groupCount || 1) - 1;
    return `
    <div class="reading-entry ${e.important ? 'important' : ''}">
      <p class="reading-text clamped ${e.important ? 'important' : ''}">${escapeHtml(e.text)}</p>
      ${e.note ? `<div class="quote-entry-note"><span class="note-label">그때의 생각</span>${escapeHtml(e.note)}</div>` : ''}
      ${otherCount > 0 ? `
        <button class="echo-link" data-gid="${e.groupId}" data-echo="echo-${entryIdx}">같은 생각을 한 책 ${otherCount}권 →</button>
        <div class="echo-detail" id="echo-${entryIdx}"></div>
      ` : ''}
      <div class="reading-footer">
        <div class="reading-footer-left">
          ${e.page ? `<span class="reading-page">${escapeHtml(e.page)}p</span>` : ''}
        </div>
        <div class="reading-footer-right">
          <button class="reading-favorite ${e.important ? 'active' : ''}" data-gid="${e.groupId}" data-bidx="${e.bidx}" data-qidx="${e.qidx}" title="중요 문장으로 표시">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="${e.important ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M12 3l2.5 5.5 6 .6-4.5 4.1 1.3 6-5.3-3-5.3 3 1.3-6L3.5 9.1l6-.6L12 3z"/></svg>
          </button>
          <button class="reading-menu" data-gid="${e.groupId}" data-bidx="${e.bidx}" data-qidx="${e.qidx}" title="더보기">···</button>
        </div>
      </div>
    </div>
    `;
  }).join('');

  readingView.querySelectorAll('.echo-link').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const echoEl = document.getElementById(btn.dataset.echo);
      const opening = !echoEl.classList.contains('open');
      if(opening && !echoEl.dataset.filled){
        echoEl.dataset.filled = '1';
        const g = groups.find(x => x.id === btn.dataset.gid);
        if(g){
          echoEl.innerHTML = g.bookGroups
            .filter(bg => normalizeTitle(bg.book) !== normalizeTitle(book.title))
            .map(bg => `
              <div>
                <div class="echo-book">${escapeHtml(bg.book || '출처 미상')}</div>
                ${bg.quotes.map(q => `
                  <p class="echo-quote">${escapeHtml(q.text)}</p>
                  ${q.page ? `<p class="echo-quote-page">${escapeHtml(q.page)}p</p>` : ''}
                `).join('')}
              </div>
            `).join('');
        }
      }
      echoEl.classList.toggle('open');
    });
  });

  readingView.querySelectorAll('.reading-favorite').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const ctx = {
        gid: btn.dataset.gid,
        bidx: parseInt(btn.dataset.bidx, 10),
        qidx: parseInt(btn.dataset.qidx, 10)
      };
      const { q } = findQuote(ctx);
      if(!q) return;
      q.important = !q.important;
      await saveAll();
      renderApp();
    });
  });

  readingView.querySelectorAll('.reading-menu').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      openEntryAction({
        gid: btn.dataset.gid,
        bidx: parseInt(btn.dataset.bidx, 10),
        qidx: parseInt(btn.dataset.qidx, 10)
      }, btn);
    });
  });

  // [요청 3] 너무 긴 문장은 기본적으로 몇 줄까지만 보이게 접어두고, "더보기"로 펼칠 수 있게 함
  requestAnimationFrame(() => {
    readingView.querySelectorAll('.reading-text.clamped').forEach(textEl => {
      if(textEl.scrollHeight <= textEl.clientHeight + 2){
        textEl.classList.remove('clamped');
        return;
      }
      const toggleBtn = document.createElement('button');
      toggleBtn.type = 'button';
      toggleBtn.className = 'text-toggle';
      toggleBtn.textContent = '더보기';

      function toggleExpand(){
        const expanded = textEl.classList.toggle('expanded');
        toggleBtn.textContent = expanded ? '접기' : '더보기';
      }
      toggleBtn.addEventListener('click', toggleExpand);
      textEl.addEventListener('click', toggleExpand); // [요청 1] 문장 자체를 눌러도 접기/펼치기
      textEl.classList.add('has-toggle');

      // [정렬 수정] 더보기를 텍스트 바로 뒤가 아니라 같은 카드의 footer-left(페이지 번호 옆)에 넣어서,
      // 별/···와 항상 같은 행에서 정렬되도록 함 (텍스트 길이에 따라 위치가 흔들리지 않음)
      const footerLeft = textEl.closest('.reading-entry').querySelector('.reading-footer-left');
      footerLeft.appendChild(toggleBtn);
    });
  });
}

// ── 문장 ··· 액션(수정 / 삭제) - 가벼운 팝오버 ──
const entryActionBackdrop = document.getElementById('entryActionBackdrop');
const entryActionPopover = document.getElementById('entryActionPopover');
const actionEditBtn = document.getElementById('actionEditBtn');
const actionDeleteBtn = document.getElementById('actionDeleteBtn');
let actionContext = null;

function findQuote(ctx){
  const g = groups.find(x => x.id === ctx.gid);
  const bg = g && g.bookGroups[ctx.bidx];
  const q = bg && bg.quotes[ctx.qidx];
  return { g, bg, q };
}

// btnEl: 탭한 "···" 버튼 - 그 위치를 기준으로 팝오버가 바로 옆에 뜸
function openEntryAction(ctx, btnEl){
  actionContext = ctx;

  if(btnEl){
    const rect = btnEl.getBoundingClientRect();
    entryActionPopover.style.top = `${rect.bottom + 6}px`;
    entryActionPopover.style.right = `${window.innerWidth - rect.right}px`;
    entryActionPopover.style.left = 'auto';
  }

  entryActionBackdrop.classList.add('open');
  entryActionPopover.classList.add('open');
}
function closeEntryAction(){
  entryActionBackdrop.classList.remove('open');
  entryActionPopover.classList.remove('open');
}
entryActionBackdrop.addEventListener('click', (e) => {
  e.stopPropagation();
  closeEntryAction();
});

actionEditBtn.addEventListener('click', () => {
  const ctx = actionContext;
  closeEntryAction();
  if(ctx) openEditSheet(ctx);
});

actionDeleteBtn.addEventListener('click', async () => {
  const ctx = actionContext;
  closeEntryAction();
  if(!ctx) return;
  if(!(await showConfirm('이 문장을 삭제하시겠습니까?'))) return;

  const g = groups.find(x => x.id === ctx.gid);
  if(!g) return;
  const bg = g.bookGroups[ctx.bidx];
  if(!bg) return;

  bg.quotes.splice(ctx.qidx, 1);
  if(bg.quotes.length === 0){
    g.bookGroups.splice(ctx.bidx, 1);
  }
  g.count = g.bookGroups.length;
  if(g.count === 0){
    groups = groups.filter(x => x.id !== ctx.gid);
  }

  await saveAll();
  renderApp();
});

const editSheetOverlay = document.getElementById('editSheetOverlay');
const editQuoteInput = document.getElementById('editQuoteInput');
const editPageInput = document.getElementById('editPageInput');
const editSubmitBtn = document.getElementById('editSubmitBtn');
const editStatusMsg = document.getElementById('editStatusMsg');
let editContext = null;

function autoResizeEditInput(){
  editQuoteInput.style.height = 'auto';
  editQuoteInput.style.height = editQuoteInput.scrollHeight + 'px';
}
editQuoteInput.addEventListener('input', autoResizeEditInput);

function showEditStatus(text, type){
  editStatusMsg.classList.remove('error','show');
  editStatusMsg.textContent = text;
  if(type) editStatusMsg.classList.add(type);
  void editStatusMsg.offsetWidth;
  editStatusMsg.classList.add('show');
}

function openEditSheet(ctx){
  const g = groups.find(x => x.id === ctx.gid);
  if(!g) return;
  const bg = g.bookGroups[ctx.bidx];
  if(!bg) return;
  const q = bg.quotes[ctx.qidx];
  if(!q) return;

  editContext = ctx;
  editQuoteInput.value = q.text;
  editPageInput.value = q.page || '';
  editStatusMsg.classList.remove('show');
  editSheetOverlay.classList.add('open');
  lockBodyScroll();
  syncDialogViewport();
  requestAnimationFrame(autoResizeEditInput);
  setTimeout(() => editQuoteInput.focus(), 250);
}
function closeEditSheet(){
  if(document.activeElement && document.activeElement.blur) document.activeElement.blur();
  editSheetOverlay.classList.remove('open');
  resetDialogViewport(editSheetOverlay);
  unlockBodyScroll();
}
editSheetOverlay.addEventListener('click', (e) => {
  if(e.target === editSheetOverlay) closeEditSheet();
});

async function handleEditSubmit(){
  const newText = editQuoteInput.value.trim();
  if(!newText){
    showEditStatus('문장을 입력해주세요.', 'error');
    return;
  }
  if(!editContext) return;

  const g = groups.find(x => x.id === editContext.gid);
  if(!g) return;
  const bg = g.bookGroups[editContext.bidx];
  if(!bg) return;
  const q = bg.quotes[editContext.qidx];
  if(!q) return;

  editSubmitBtn.disabled = true;
  try{
    q.text = newText;
    q.page = editPageInput.value.trim();
    await saveAll();
    renderApp();
    closeEditSheet();
    showToast('✓ 수정했습니다.');
  }catch(e){
    console.error('문장 수정 실패:', e);
    showEditStatus('수정 사항을 저장하지 못했습니다.', 'error');
  }finally{
    editSubmitBtn.disabled = false;
  }
}
editSubmitBtn.addEventListener('click', handleEditSubmit);
editQuoteInput.addEventListener('keydown', (e) => {
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    handleEditSubmit();
  }
});
editPageInput.addEventListener('keydown', (e) => {
  if(e.key === 'Enter'){
    e.preventDefault();
    handleEditSubmit();
  }
});

// ── AI 의미 분석 응답 파싱 (견고화 버전) ──────
// Worker/Anthropic 응답이 여러 형태로 와도 최대한 안전하게 해석하고,
// 실패하면 예외를 던져서 호출부가 "미분류 저장"으로 처리하게 함.
async function parseClassificationResponse(response, quoteText){
  const raw = await response.text();

  if(!response.ok){
    console.error('classifyQuote 응답 오류:', response.status, raw.slice(0, 300));
    throw new Error(`API ${response.status}`);
  }

  let data;
  try{
    data = JSON.parse(raw);
  }catch(e){
    data = raw;
  }

  let candidate = data;
  if(data && Array.isArray(data.content)){
    const textBlock = data.content.find(item => item && item.type === 'text');
    candidate = textBlock ? textBlock.text : null;
  } else if(data && data.result){
    candidate = data.result;
  } else if(data && typeof data.text === 'string'){
    candidate = data.text;
  }

  if(typeof candidate === 'string'){
    const cleaned = candidate.replace(/```json/gi, '').replace(/```/g, '').trim();
    const start = cleaned.indexOf('{');
    const end = cleaned.lastIndexOf('}');
    if(start !== -1 && end !== -1 && end > start){
      try{
        candidate = JSON.parse(cleaned.slice(start, end + 1));
      }catch(e){
        console.error('classifyQuote 파싱 실패, 원문 일부:', cleaned.slice(0, 300));
        candidate = null;
      }
    } else {
      candidate = null;
    }
  }

  if(!candidate || typeof candidate !== 'object'){
    console.error('classifyQuote 응답 형식을 알 수 없음, 원문 일부:', raw.slice(0, 300));
    throw new Error('Invalid response format');
  }

  return {
    matchedId: typeof candidate.matchedId === 'string' ? candidate.matchedId : null,
    canonical: (typeof candidate.canonical === 'string' && candidate.canonical.trim())
      ? candidate.canonical.trim()
      : quoteText,
    updatedCanonical: typeof candidate.updatedCanonical === 'string'
      ? candidate.updatedCanonical.trim()
      : ''
  };
}

function representativeQuotes(g, limit = 4){
  const all = [];
  g.bookGroups.forEach(bg => bg.quotes.forEach(q => all.push(q.text)));
  return all.slice(-limit);
}

async function classifyQuote(quoteText){
  const existing = groups.map(g => ({
    id: g.id,
    canonical: g.canonical,
    examples: representativeQuotes(g, 4)
  }));

  const systemPrompt = `당신은 문장을 "같은 주장"끼리만 묶는 매우 엄격한 분류기입니다.

핵심 원칙: 주제(topic)가 같다고 묶으면 안 됩니다. 주장(claim)이 사실상 일치해야만 묶습니다.
- 주제: 문장이 다루는 소재 (예: 행복, 돈, 시간)
- 주장: 그 소재에 대해 문장이 실제로 내세우는 명제

판정 테스트: 새 문장과 그룹의 예시 문장들을 서로 바꿔 말해도(paraphrase) 저자의 의도가 그대로 보존되어야 같은 그룹입니다. 조금이라도 다른 이야기를 하면 다른 그룹입니다.

묶으면 안 되는 예 (전부 '행복'이라는 주제는 같지만 주장이 달라 서로 다른 그룹이어야 함):
- "내 뜻대로 생각하기에 결국은 행복하다" → 주장: 행복은 자기 마음가짐의 자유에서 온다
- "욕심은 행복을 놓치게 만든다" → 주장: 욕심이 행복을 방해한다
- "가장 행복한 삶은 물질적 빈곤 속에서 정신적 부를 창출해내는 일이다" → 주장: 물질보다 정신적 가치가 행복에 중요하다
- "감사하는 마음으로 일하는 사람이 행복하다" → 주장: 감사하는 태도가 행복을 만든다

묶어야 하는 예 (표현은 달라도 주장이 같음):
- "돈을 좇지 마라" / "부를 추구하는 삶은 공허하다" → 둘 다 '부의 추구를 경계하라'는 같은 주장

확신이 서지 않으면 반드시 matchedId를 null로 하세요. 잘못 묶는 것이 새 그룹을 만드는 것보다 훨씬 나쁩니다.

응답 순서: 먼저 새 문장의 핵심 주장을 "newClaim"에 한 줄로 정리한 뒤, 그 주장과 사실상 일치하는 그룹이 있는지 판단하세요.
매칭되는 그룹이 있다면 그 그룹의 예시 문장들 + 새 문장을 참고해 대표 문구를 "updatedCanonical"에 담고(15자 내외 한국어), 없다면 matchedId를 null로 하고 새 문장을 대표하는 문구를 "canonical"에 담으세요.
반드시 아래 JSON 형식으로만 응답하고 다른 텍스트는 절대 포함하지 마세요:
{"newClaim": "새 문장의 핵심 주장 한 줄", "matchedId": "기존 그룹 id 또는 null", "canonical": "새 그룹일 때 쓸 대표 문구", "updatedCanonical": "매칭된 그룹일 때 갱신할 대표 문구"}`;

  const userPrompt = `기존 그룹 목록:
${JSON.stringify(existing, null, 2)}

새 문장: "${quoteText}"`;

  const endpoint = IS_CLAUDE_ARTIFACT
    ? "https://api.anthropic.com/v1/messages"
    : WORKER_URL + "/classify";

  const response = await fetch(endpoint, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{ role: "user", content: userPrompt }]
    })
  });

  return await parseClassificationResponse(response, quoteText);
}

// ── 전체 문장 재분류 (1회성 유지보수 기능) ─────
// 기존에 느슨한 기준으로 잘못 묶인 그룹들을, 새 기준(주장 일치)으로 전부 다시 계산함.

핵심 원칙: 주제(topic)가 같다고 묶으면 안 됩니다. 주장(claim)이 사실상 일치해야만 묶습니다.
- 주제: 문장이 다루는 소재 (예: 행복, 돈, 시간)

- "내 뜻대로 생각하기에 결국은 행복하다" → 주장: 행복은 자기 마음가짐의 자유에서 온다

사용자가 번호가 붙은 문장 목록을 주면, 사실상 같은 주장을 하는 문장들끼리만 그룹으로 묶으세요.

  try{ data = JSON.parse(raw); }catch(e){ data = raw; }
  let candidate = data;
  if(data && Array.isArray(data.content)){
    const textBlock = data.content.find(item => item && item.type === 'text');
    candidate = textBlock ? textBlock.text : null;
  } else if(data && data.result){
    candidate = data.result;
  } else if(data && typeof data.text === 'string'){
    candidate = data.text;
  }
  if(typeof candidate === 'string'){
    const cleaned = candidate.replace(/```json/gi, '').replace(/```/g, '').trim();
    const start = cleaned.indexOf('{');
    const end = cleaned.lastIndexOf('}');
    if(start !== -1 && end !== -1 && end > start){
      try{ candidate = JSON.parse(cleaned.slice(start, end + 1)); }
      catch(e){ candidate = null; }
    } else { candidate = null; }
  }
  if(!candidate || !Array.isArray(candidate.groups)){
    console.error('재분류 응답 형식을 알 수 없음, 원문 일부:', raw.slice(0, 300));
    throw new Error('invalid reclassify response');
  }

  // 3) 검증: 모든 번호가 정확히 한 번씩 배정됐는지 확인 (중복은 첫 배정만 인정, 누락은 단독 그룹으로 보충)
  const assigned = new Set();
  const cleanGroups = [];
  candidate.groups.forEach(g => {
    if(!g || !Array.isArray(g.indices)) return;
    const idxList = g.indices.filter(i =>
      Number.isInteger(i) && i >= 0 && i < items.length && !assigned.has(i)
    );
    idxList.forEach(i => assigned.add(i));
    if(idxList.length > 0){
      cleanGroups.push({
        canonical: (typeof g.canonical === 'string' && g.canonical.trim()) ? g.canonical.trim() : items[idxList[0]].quote.text.slice(0, 20),
        indices: idxList
      });
    }
  });
  for(let i = 0; i < items.length; i++){
    if(!assigned.has(i)){
      cleanGroups.push({ canonical: items[i].quote.text.slice(0, 20), indices: [i] });
    }
  }

  // 4) 새 그룹 구조로 재조립 (원본 quote 객체를 그대로 옮겨서 페이지/중요표시/메모 전부 보존)
  const newGroups = cleanGroups.map(cg => {
    const byBook = new Map();
    cg.indices.forEach(i => {
      const it = items[i];
      const key = normalizeTitle(it.book || '');
      if(!byBook.has(key)) byBook.set(key, { book: it.book, quotes: [] });
      byBook.get(key).quotes.push(it.quote);
    });
    const bookGroups = [...byBook.values()];
    return {
      id: 'g_' + Date.now() + '_' + Math.random().toString(36).slice(2, 9),
      canonical: cg.canonical,
      count: bookGroups.length,
      bookGroups
    };
  });

  // 5) 교체 직전에 이전 상태를 브라우저에 백업해두고(만일에 대비), 저장
  try{ localStorage.setItem('truth-groups-backup', JSON.stringify(groups)); }catch(e){}
  groups = newGroups;
  await saveAll();
  renderApp();
  showToast(`✓ ${items.length}개 문장을 ${newGroups.length}개 그룹으로 다시 정리했습니다.`);
}

// 책 정보 수정은 FAB 메뉴의 연필 아이콘에서 열림
const heroEditBookBtn = document.getElementById('heroEditBookBtn');
heroEditBookBtn.addEventListener('click', () => {
  closeFabMenu();
  const book = books.find(b => b.id === currentBookId);
  if(book) openEditBookSheet(book);
});

async function handleSubmit(){
  const quoteText = quoteInput.value.trim();
  if(!quoteText){
    showStatus('기록할 문장을 적어주세요.', 'error');
    return;
  }

  const currentBook = books.find(b => b.id === currentBookId);
  if(!currentBook){
    showStatus('먼저 책을 추가해주세요.', 'error');
    return;
  }
  const book = currentBook.title;
  const page = pageInput.value.trim();

  submitBtn.disabled = true;
  showStatus('문장을 기록하는 중입니다...', 'loading');

  // 1) AI 의미 분석은 best-effort로 시도. 실패해도 아래 저장 로직은 항상 진행됨(문장 유실 방지).
  let result = null;
  try{
    result = await classifyQuote(quoteText);
  }catch(e){
    console.error('classifyQuote 실패 (문장 저장은 계속 진행):', e && e.message);
  }

  // 2) 저장은 AI 성공 여부와 무관하게 항상 수행
  try{
    let targetId = null;

    if(result && result.matchedId && groups.some(g => g.id === result.matchedId)){
      const g = groups.find(g => g.id === result.matchedId);
      const bookKey = normalizeTitle(book);
      let bookGroup = g.bookGroups.find(bg => normalizeTitle(bg.book) === bookKey);

      if(bookGroup){
        bookGroup.quotes.push({ text: quoteText, page, ts: Date.now() });
      } else {
        bookGroup = { book, quotes: [{ text: quoteText, page, ts: Date.now() }] };
        g.bookGroups.push(bookGroup);
      }

      g.count = g.bookGroups.length;
      g.canonical = result.updatedCanonical || result.canonical || g.canonical;
      targetId = g.id;
    } else {
      const newGroup = {
        id: 'g_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
        canonical: (result && result.canonical) || quoteText,
        count: 1,
        bookGroups: [{ book, quotes: [{ text: quoteText, page, ts: Date.now() }] }],
        unclassified: !result
      };
      groups.push(newGroup);
      targetId = newGroup.id;
    }

    await saveAll();
    renderApp();

    quoteInput.value = '';
    autoResizeQuoteInput();
    pageInput.value = '';

    if(result){
      setTimeout(() => {
        closeQuoteSheet();
        showToast('✓ 기록했습니다.');
      }, 300);
    } else {
      showStatus('문장은 저장했지만 비슷한 생각을 찾지는 못했습니다.', 'error', 3000);
      setTimeout(() => {
        closeQuoteSheet();
        showToast('✓ 기록했습니다.');
      }, 900);
    }
  }catch(saveErr){
    console.error('문장 저장 실패:', saveErr);
    showStatus('문장을 저장하지 못했습니다. 잠시 후 다시 시도해주세요.', 'error');
  }finally{
    submitBtn.disabled = false;
  }
}

submitBtn.addEventListener('click', handleSubmit);
quoteInput.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    handleSubmit();
  }
});
pageInput.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter'){
    e.preventDefault();
    handleSubmit();
  }
});

loadAll();
</script>
