<style>
  :root{
    --bg: #FFFFFF;
    --surface: #FCFCFC;
    --text: #181818;
    --text-secondary: #666666;
    --text-tertiary: #A0A0A0;
    --border: #ECECEC;
    --category-color: #C6F24E;
    --compose-color: #C6F24E;
    --hover: #F5F5F5;
    --danger: #B23A2E;
    --danger-soft: #F5E6E4;
    --highlight-bg: #FFF176;
    --highlight-text: #2E7D32;
    --cancel-bg: #FFEBEE;
    --cancel-text: #C62828;
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0;
    width: 100%;
    max-width: 100%;
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", sans-serif;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
  }
  body.modal-open{
    overflow: hidden;
    touch-action: none;
  }

  .wrap{
    width: 100%;
    max-width: 640px;
    margin: 0 auto;
    padding: max(28px, env(safe-area-inset-top)) 22px 120px;
  }

  /* ── 시작 스플래시 화면 ─────────────────────── */
  .splash-overlay{
    position: fixed;
    inset: 0;
    z-index: 300;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.4s ease;
  }
  .splash-overlay.hide{
    opacity: 0;
    pointer-events: none;
  }
  .splash-logo{
    width: 108px;
    height: 108px;
    animation: splashPop 0.35s ease-out;
  }
  @keyframes splashPop{
    from{ opacity: 0; transform: scale(0.9); }
    to{ opacity: 1; transform: scale(1); }
  }

  /* ── 보관함 (카테고리별 문장 목록) - 메인 화면 ──── */
  .archive-header{
    display: flex;
    justify-content: center;
    margin-bottom: 12px;
  }
  .archive-header img{
    width: 40px;
    height: 40px;
    display: block;
  }
  .archive-list{ max-width: 560px; margin: 0 auto; }

  /* 문장 목록 맨 아래 - 맞춤법 확인 트리거 */
  .spell-check-trigger{
    display: block;
    width: 100%;
    max-width: 560px;
    margin: 24px auto 0;
    padding: 8px 0;
    border: none;
    background: none;
    color: var(--text-tertiary);
    font-family: 'Pretendard', sans-serif;
    font-size: 11.5px;
    font-weight: 500;
    cursor: pointer;
  }
  .spell-check-trigger:disabled{ opacity: 0.5; cursor: default; }

  /* 맞춤법 확인 결과 검토 목록 */
  .spell-check-item{
    border-bottom: 1px solid var(--border);
    padding: 14px 0;
  }
  .spell-check-item:last-child{ border-bottom: none; }
  .spell-check-item-header{
    display: flex;
    align-items: flex-start;
    gap: 10px;
    cursor: pointer;
  }
  .spell-check-checkbox{
    margin-top: 4px;
    flex-shrink: 0;
    width: 17px; height: 17px;
    accent-color: var(--category-color);
  }
  .spell-check-texts{ flex: 1; min-width: 0; }
  .spell-check-category{
    display: block;
    font-size: 10.5px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .spell-check-original{
    font-size: 13px;
    color: var(--text-tertiary);
    margin-bottom: 5px;
    line-height: 1.55;
    word-break: keep-all;
  }
  .spell-check-corrected{
    font-size: 14.5px;
    color: var(--text);
    line-height: 1.55;
    word-break: keep-all;
  }
  .diff-del{
    background: var(--cancel-bg);
    color: var(--cancel-text);
    text-decoration: line-through;
    border-radius: 2px;
  }
  .diff-ins{
    background: #E8F5E9;
    color: var(--highlight-text);
    font-weight: 700;
    border-radius: 2px;
  }
  .diff-space-mark{
    display: inline-block;
    color: var(--highlight-text);
    font-weight: 700;
    font-size: 10px;
    vertical-align: super;
    line-height: 1;
    margin: 0 1px;
  }

  .quote-block{
    position: relative;
    padding: 20px 0;
    cursor: pointer;
  }
  .quote-block:active{ background: var(--hover); }
  .quote-block + .quote-block{
    border-top: 1px solid var(--border);
  }
  .quote-text{
    border-left: 4px solid var(--category-color);
    padding-left: 14px;
    font-size: 16px;
    font-weight: 400;
    line-height: 1.6;
    color: var(--text);
    margin: 0;
    text-align: left;
    word-break: keep-all;
    overflow-wrap: break-word;
  }
  .quote-comment{
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-top: 10px;
    padding-left: 18px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    line-height: 1.5;
  }
  .quote-comment-mark{
    display: inline-block;
    width: 10px;
    height: 2px;
    border-radius: 1px;
    background: var(--category-color);
    flex-shrink: 0;
    margin-top: 8px;
  }
  .quote-comment-text{
    word-break: keep-all;
  }
  .quote-meta-line{
    position: relative;
    margin-top: 10px;
    padding-left: 18px;
    font-size: 12px;
    color: var(--text-tertiary);
    min-height: 13px;
    display: flex;
    align-items: center;
  }
  /* 책갈피는 항상 세로 선과 같은 x위치(왼쪽 끝)에 고정되도록 절대 위치로 둠.
     출처/페이지 텍스트의 들여쓰기(padding-left:18px)와는 서로 영향을 주지 않아서,
     책갈피가 있든 없든 텍스트 위치는 항상 같고, 책갈피는 항상 선 바로 아래에 옴. */
  .quote-bookmark{
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    color: var(--category-color);
  }
  /* 추가된 지 24시간 안쪽인 문장에만 표시됨. 카테고리 색을 그대로 쓰면 파스텔톤이라
     작은 글자에서는 잘 안 보일 수 있어, 살짝 어둡게 섞어서 가독성을 확보함. */
  .quote-new-badge{
    color: color-mix(in srgb, var(--category-color) 60%, black);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.02em;
    margin-right: 6px;
  }

  .empty{
    text-align:center;
    padding: 64px 20px;
    color: var(--text-tertiary);
    font-size: 13.5px;
    line-height: 1.9;
  }
  .empty-title{
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
  }

  /* ── 하단 좌: 카테고리 세그먼트 탭 ──────────── */
  .category-tabs{
    position: fixed;
    left: 20px;
    bottom: max(20px, env(safe-area-inset-bottom));
    display: flex;
    gap: 2px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px;
    box-shadow: 0 4px 14px rgba(24,24,24,0.1);
    z-index: 70;
  }
  /* 탭 뒤에서 좌우로 슬라이드하는 필 - 애플 세그먼트 컨트롤 느낌 */
  .category-tab-indicator{
    position: absolute;
    top: 4px;
    bottom: 4px;
    left: 0;
    border-radius: 999px;
    background: var(--category-color);
    transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1), width 0.32s cubic-bezier(0.32, 0.72, 0, 1), background 0.25s ease;
    z-index: 0;
  }
  .category-tab{
    position: relative;
    z-index: 1;
    border: none;
    background: none;
    border-radius: 999px;
    padding: 9px 14px;
    font-family: 'Pretendard', sans-serif;
    font-size: 13.5px;
    font-weight: 700;
    color: var(--text-secondary);
    cursor: pointer;
    transition: color 0.2s ease;
  }
  .category-tab.active{
    color: var(--text);
  }

  /* ── 하단 우: + 버튼 ─────────────────────── */
  .add-quote-trigger-btn{
    position: fixed;
    right: 20px;
    bottom: max(20px, env(safe-area-inset-bottom));
    width: 48px; height: 48px;
    border-radius: 50%;
    border: none;
    background: var(--text);
    color: #FFFFFF;
    font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(24,24,24,0.22);
    z-index: 70;
    transition: background 0.2s ease, color 0.2s ease;
  }
  .add-quote-trigger-btn:active{ transform: scale(0.94); }
  /* 문장을 드래그로 선택하면, 새 버튼을 따로 띄우는 대신 이미 익숙한 이 자리(우하단)를
     그대로 재사용해서 "하이라이트" 버튼으로 잠깐 바뀜. 선택이 풀리면 다시 +로 돌아옴. */
  .add-quote-trigger-btn.highlight-mode{
    background: var(--highlight-bg);
    color: #3D3200;
  }
  .add-quote-trigger-btn.highlight-mode.cancel-mode{
    background: var(--cancel-bg);
    color: var(--cancel-text);
  }

  /* 형광펜 하이라이트 - 카테고리 색과 무관하게 항상 통일된 노랑 */
  .quote-highlight{
    background: var(--highlight-bg);
    padding: 1px 0;
    border-radius: 2px;
    cursor: pointer;
  }

  /* ── 확인 다이얼로그 ──────────────────────── */
  .modal-overlay{
    position: fixed;
    inset: 0;
    background: rgba(31,35,40,0.32);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 100;
  }
  .modal-overlay.open{ display: flex; }
  .modal-box{
    background: var(--surface);
    border-radius: 14px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 12px 32px rgba(31,35,40,0.16);
    animation: fadeIn 0.18s ease;
  }
  .confirm-box{
    max-width: 300px;
    padding: 26px 22px 20px;
  }
  .confirm-message{
    margin: 0 0 20px;
    font-size: 14px;
    line-height: 1.75;
    color: var(--text);
    text-align: center;
  }
  .spell-error-text{
    text-align: left;
    font-size: 12.5px;
    line-height: 1.6;
    color: var(--text-secondary);
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 50vh;
    overflow-y: auto;
  }
  .confirm-actions{ display:flex; gap: 8px; }
  .confirm-btn{
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 0;
    font-family: 'Pretendard', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    background: var(--surface);
  }
  .confirm-cancel{ color: var(--text-secondary); }
  .confirm-cancel:hover{ background: var(--hover); }
  .confirm-ok{ color: var(--danger); border-color: var(--danger-soft); background: var(--danger-soft); }
  .confirm-ok:hover{ background: #EBDAD6; }

  @keyframes fadeIn{
    from{ opacity: 0; transform: translateY(2px); }
    to{ opacity: 1; transform: translateY(0); }
  }

  /* ── 중앙 Dialog 공통 ──────────────────────── */
  .sheet-overlay{
    position: fixed;
    inset: 0;
    background: rgba(24,24,24,0.28);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 16px;
    z-index: 90;
  }
  .sheet-overlay.open{ display: flex; }
  .bottom-sheet{
    width: 100%;
    max-width: 480px;
    height: auto;
    max-height: min(82dvh, 720px);
    background: var(--surface);
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(24,24,24,0.18);
    opacity: 0;
    transform: scale(0.97) translateY(4px);
    transition: opacity 0.2s ease, transform 0.2s ease;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  .sheet-overlay.open .bottom-sheet{
    opacity: 1;
    transform: scale(1) translateY(0);
  }
  .sheet-overlay.keyboard-open{
    align-items: flex-start;
    padding-top: 10px;
  }
  .sheet-overlay.keyboard-open .bottom-sheet{
    max-height: calc(100% - 20px);
    transform: none;
  }
  .sheet-title{
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin: 0 0 14px;
  }
  .sheet-body{
    padding: 22px;
    overflow-y: auto;
    overscroll-behavior: contain;
  }

  /* ── 문장 추가/수정 시트 공통 입력 요소 ────── */
  .category-chip-row{
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .category-chip{
    flex: 1;
    text-align: center;
    border: 1px solid var(--border);
    background: var(--bg);
    border-radius: 10px;
    padding: 10px 0;
    font-family: 'Pretendard', sans-serif;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text-secondary);
    cursor: pointer;
  }
  .category-chip.active{
    background: var(--compose-color);
    border-color: var(--compose-color);
    color: var(--text);
  }

  /* [1] 출처: 입력칸을 포커스하면 최근 사용한 출처가 바로 아래 드롭다운으로 나타남 */
  .source-field-wrap{ position: relative; }
  .source-suggest{
    display: none;
    position: absolute;
    top: calc(100% - 8px);
    left: 0; right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 10px 24px rgba(24,24,24,0.14);
    z-index: 5;
    overflow: hidden;
  }
  .source-suggest.open{ display: block; }
  .source-suggest-item{
    display: block;
    width: 100%;
    text-align: left;
    padding: 12px 14px;
    background: none;
    border: none;
    border-bottom: 1px solid var(--border);
    font-family: 'Pretendard', sans-serif;
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
  }
  .source-suggest-item:last-child{ border-bottom: none; }
  .source-suggest-item:active{ background: var(--hover); }

  /* [2] 페이지/일자 토글 + 전용 입력 */
  .ref-field-row{
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 12px;
  }
  .ref-mode-toggle{
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    box-sizing: border-box;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    background: var(--bg);
    border-radius: 8px;
    padding: 0;
    color: var(--text-secondary);
    cursor: pointer;
  }
  .ref-mode-label{
    flex-shrink: 0;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text-secondary);
    white-space: nowrap;
  }
  .ref-input{
    flex: 1;
    min-width: 0;
    margin-bottom: 0 !important;
  }
  .add-book-input{
    width: 100%;
    height: 52px;
    box-sizing: border-box;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0 14px;
    font-family: 'Pretendard', sans-serif;
    font-size: 16px;
    color: var(--text);
    outline: none;
    margin-bottom: 12px;
    background: var(--bg);
  }
  .add-book-input:focus{ border-color: var(--category-color); }
  .quote-textarea{
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    font-family: 'Pretendard', sans-serif;
    font-size: 16px;
    line-height: 1.65;
    color: var(--text);
    outline: none;
    margin-bottom: 12px;
    background: var(--bg);
    resize: none;
  }
  .quote-textarea:focus{ border-color: var(--category-color); }
  .quote-textarea::placeholder, .add-book-input::placeholder{ color: var(--text-tertiary); }

  .cta-btn{
    pointer-events: auto;
    border: none;
    border-radius: 999px;
    font-family: 'Pretendard', sans-serif;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  }
  .cta-primary{
    background: var(--category-color);
    color: var(--text);
    font-size: 14px;
    font-weight: 700;
    padding: 14px 26px;
    box-shadow: 0 3px 10px rgba(24,24,24,0.16);
  }
  .cta-primary:hover{ box-shadow: 0 4px 13px rgba(24,24,24,0.2); }
  .cta-btn:active{ transform: scale(0.96); }
  /* 문장 작성/수정 시트 안에서는 저장 버튼/포커스 테두리가 시트 전용 미리보기 색(compose-color)을
     따로 쓰도록 덮어씀 - 보관함 화면의 색과는 완전히 분리되어 서로 영향을 주지 않음 */
  #addQuoteOverlay .cta-primary,
  #editSheetOverlay .cta-primary{ background: var(--compose-color); }
  #addQuoteOverlay .add-book-input:focus,
  #addQuoteOverlay .quote-textarea:focus,
  #editSheetOverlay .add-book-input:focus,
  #editSheetOverlay .quote-textarea:focus{ border-color: var(--compose-color); }
  .add-book-submit{
    width: 100%;
    margin-top: 6px;
    padding: 13px 0;
  }
  .add-book-submit:disabled{ opacity: 0.5; cursor: default; }

  .status-msg{
    font-size: 12px;
    color: var(--text-secondary);
    min-height: 0;
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.3s ease, max-height 0.3s ease, margin 0.3s ease;
  }
  .status-msg.show{
    opacity: 1;
    max-height: 30px;
    margin-top: 8px;
    margin-bottom: 8px;
  }
  .status-msg.error{ color: var(--danger); }

  /* ── 저장 완료 토스트 ─────────────────────── */
  .toast{
    position: fixed;
    top: max(20px, env(safe-area-inset-top));
    left: 50%;
    transform: translateX(-50%) translateY(-6px);
    background: var(--category-color);
    color: var(--text);
    font-size: 12.5px;
    font-weight: 600;
    padding: 9px 18px;
    border-radius: 999px;
    box-shadow: 0 6px 18px rgba(24,24,24,0.2);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
    z-index: 200;
    white-space: nowrap;
  }
  .toast.show{
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── 문장 ··· 액션 (아이폰 기본 선택 버튼/액션시트 스타일) ──── */
  .ios-sheet-backdrop{
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(24,24,24,0.32);
    z-index: 96;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .ios-sheet-backdrop.open{ display: block; opacity: 1; }
  .ios-action-sheet{
    position: fixed;
    left: 12px; right: 12px;
    bottom: max(12px, env(safe-area-inset-bottom));
    z-index: 97;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transform: translateY(100%);
    opacity: 0;
    transition: transform 0.22s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.2s ease;
    pointer-events: none;
  }
  .ios-action-sheet.open{
    transform: translateY(0);
    opacity: 1;
    pointer-events: auto;
  }
  .ios-action-group{
    background: var(--surface);
    border-radius: 14px;
    overflow: hidden;
  }
  .ios-action-item{
    display: block;
    width: 100%;
    padding: 16px;
    background: none;
    border: none;
    border-bottom: 1px solid var(--border);
    font-family: 'Pretendard', sans-serif;
    font-size: 16px;
    color: var(--text);
    text-align: center;
    cursor: pointer;
  }
  .ios-action-item:last-child{ border-bottom: none; }
  .ios-action-item:active{ background: var(--hover); }
  .ios-action-item.danger{ color: var(--danger); }
  .ios-action-item.cancel{ font-weight: 700; }

  /* iOS Safari는 input/textarea의 font-size가 16px 미만이면 포커스 시 화면을 자동으로 확대함.
     margin-bottom을 12px로 잡은 입력 필드들 폰트는 14~15.5px라 확대가 걸릴 수 있어
     16px 미만 필드는 아래에서 별도로 보정함(선택 사항, 현재는 유지). */
</style>
</head>

<script>
const WORKER_URL = "https://truth-collector-proxy.dingapark1.workers.dev";

// ⚠️ 보안 안내: 아래 SITE_SECRET은 이 HTML 파일 안에 평문으로 들어있습니다.
// GitHub Pages에 올라간 순간 "누구나 페이지 소스에서 볼 수 있는 값"이 되므로,
// 엄밀히는 "비밀"이 아니라 "약한 접근 제한 토큰" 정도로 취급해야 합니다.
const SITE_SECRET = "my-cat-2026";

const storageAdapter = {

      const res = await fetch(WORKER_URL + "/data", {

      });
      if(!res.ok) return null;
      const value = await res.text();
      return { value };
    }catch(e){
      return null;
    }
  },
  async set(key, value){
    if(IS_CLAUDE_ARTIFACT){
      return await window.storage.set(key, value, false);
    }
    try{
      await fetch(WORKER_URL + "/data", {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Site-Secret": SITE_SECRET },

      });
    }catch(e){

    return { key, value };

};

const CATEGORIES = ['일', '관계', '삶', '사랑'];

const BOOKMARK_SVG = '<svg width="11.7" height="15" viewBox="5 3 14 18" fill="currentColor" style="display:block"><path d="M6 3a1 1 0 0 0-1 1v17l7-4.5 7 4.5V4a1 1 0 0 0-1-1H6z"/></svg>';

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function genId(){
  return 'q_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);

// 겹치거나 인접한 구간을 하나로 합쳐서, 항상 정렬되고 겹치지 않는 배열로 유지함.
// 이렇게 저장해두면 화면에 그려지는 <mark> 개수와 실제 저장된 구간 개수가 항상 1:1로 맞아서,
// "이 마크를 탭하면 지운다"를 인덱스로 안전하게 매칭할 수 있음.
function mergeHighlights(list){
  const sorted = [...list].sort((a, b) => a.start - b.start);
  const merged = [];
  sorted.forEach(h => {
    const last = merged[merged.length - 1];
    if(last && h.start <= last.end){
      last.end = Math.max(last.end, h.end);
    } else {
      merged.push({ start: h.start, end: h.end });
    }
  });
  return merged;
}

// 하이라이트 버튼을 다시 누르면 취소되도록 하는 토글 로직.
// 선택한 구간이 기존 하이라이트와 조금이라도 겹치면, 그 겹치는 부분만 정확히 빼냄
// (겹치는 하이라이트가 딱 그 구간이면 통째로 사라지고, 일부만 겹치면 안 겹치는 조각만 남음).
// 전혀 안 겹치면 새 하이라이트로 추가함.
function toggleHighlightRange(existing, range){
  const overlapping = existing.some(h => range.start < h.end && range.end > h.start);
  if(!overlapping){
    return mergeHighlights([...existing, range]);
  }
  const result = [];
  existing.forEach(h => {
    if(range.end <= h.start || range.start >= h.end){
      result.push(h); // 안 겹치는 기존 구간은 그대로 유지
      return;
    }
    if(h.start < range.start) result.push({ start: h.start, end: range.start });
    if(h.end > range.end) result.push({ start: range.end, end: h.end });
  });
  return mergeHighlights(result);
}

// 문장 텍스트를 하이라이트 구간에 따라 <mark>로 감싸서 HTML로 만듦.
// 하이라이트가 아닌 부분은 그대로 escapeHtml 처리함.
function renderHighlightedText(text, highlights){
  if(!highlights || highlights.length === 0) return escapeHtml(text);
  let result = '';
  let cursor = 0;
  highlights.forEach((h, i) => {
    const start = Math.max(0, Math.min(h.start, text.length));
    const end = Math.max(0, Math.min(h.end, text.length));
    if(start > cursor) result += escapeHtml(text.slice(cursor, start));
    if(end > start) result += `<mark class="quote-highlight" data-hidx="${i}">${escapeHtml(text.slice(start, end))}</mark>`;
    cursor = Math.max(cursor, end);
  });
  if(cursor < text.length) result += escapeHtml(text.slice(cursor));
  return result;
}

// 드래그로 선택한 영역(range)의 시작/끝이, 문장 컨테이너 기준으로 순수 텍스트에서
// 몇 번째 글자에 해당하는지 계산함. 이미 <mark>가 섞여 있어도 정확히 셀 수 있도록
// 컨테이너의 자식 노드를 순서대로 훑으면서 글자 수를 누적함.
function getTextOffset(container, targetNode, targetOffset){
  let charCount = 0;
  let found = false;
  function walk(el){
    for(const child of el.childNodes){
      if(found) return;
      if(child === targetNode){
        charCount += targetOffset;
        found = true;
        return;
      }
      if(child.nodeType === Node.TEXT_NODE){
        charCount += child.textContent.length;
      } else if(child.nodeType === Node.ELEMENT_NODE){
        walk(child);
      }
    }
  }
  walk(container);
  return charCount;
}

// 정렬 우선순위: 1) 즐겨찾기+하이라이트  2) 즐겨찾기만  3) 하이라이트만  4) 아무것도 없음
function sentenceSortRank(s){
  const hasFav = !!s.important;
  const hasHighlight = Array.isArray(s.highlights) && s.highlights.length > 0;
  if(hasFav && hasHighlight) return 0;
  if(hasFav) return 1;
  if(hasHighlight) return 2;
  return 3;
}

// 추가된 지 24시간 안쪽인지 확인 (수정 시에는 ts를 안 건드리므로, 순수하게 "새로 추가됨"만 반영함)
function isRecentlyAdded(ts){
  return !!ts && (Date.now() - ts) < (24 * 60 * 60 * 1000);
}

function showConfirm(message, okLabel){
  confirmMessage.textContent = message;
  confirmOk.textContent = okLabel || '삭제';
  confirmOverlay.classList.add('open');
  return new Promise((resolve) => {
    confirmResolver = resolve;
  });
}
function resolveConfirm(result){
  confirmOverlay.classList.remove('open');
  if(confirmResolver){
    confirmResolver(result);
    confirmResolver = null;
  }
}
confirmOk.addEventListener('click', () => resolveConfirm(true));
confirmCancel.addEventListener('click', () => resolveConfirm(false));
confirmOverlay.addEventListener('click', (e) => {
  if(e.target === confirmOverlay) resolveConfirm(false);
});

const toastEl = document.getElementById('toastMsg');
let toastTimer = null;
function showToast(text, ms){
  clearTimeout(toastTimer);
  toastEl.textContent = text;
  void toastEl.offsetWidth;
  toastEl.classList.add('show');
  toastTimer = setTimeout(() => {
    toastEl.classList.remove('show');
  }, ms || 1400);
}

let statusTimer = null;
function showStatus(el, text, type, autoHideMs){
  clearTimeout(statusTimer);
  el.classList.remove('error', 'show');
  el.textContent = text;
  if(type) el.classList.add(type);
  void el.offsetWidth;
  el.classList.add('show');
  if(autoHideMs){
    statusTimer = setTimeout(() => { el.classList.remove('show'); }, autoHideMs);
  }
}

// ── 데이터 로드/저장 ───────────────────────────
// [대개편] 예전엔 책(groups/books) 기준 구조였는데, 이제 카테고리(sentences 배열) 기준으로 바뀜.
// 예전 구조가 KV에 남아있으면 이 브라우저의 localStorage에 안전하게 백업해두고, 새 구조로 새로 시작함.
async function loadAll(){
  try{
    const res = await storageAdapter.get(STORAGE_KEY);
    let parsed = res && res.value ? JSON.parse(res.value) : null;

    if(parsed && Array.isArray(parsed.sentences)){
      sentences = parsed.sentences;
      recentSources = Array.isArray(parsed.recentSources) ? parsed.recentSources : [];
    } else if(parsed && (Array.isArray(parsed.groups) || Array.isArray(parsed.books))){
      // 예전(책 기반) 데이터 발견 → 로컬 백업 후 새 구조로 초기화
      try{
        const backupKey = 'truth-collector-backup-books-' + Date.now();
        localStorage.setItem(backupKey, JSON.stringify(parsed));
        console.log('예전 데이터를 로컬에 백업했습니다:', backupKey);
      }catch(e){}
      sentences = [];
      recentSources = [];
      await saveAll();
      setTimeout(() => showToast('예전 책 데이터는 이 브라우저에 백업해뒀어요'), 500);
    } else {
      sentences = [];
      recentSources = [];
    }
  }catch(e){
    console.error('데이터 로드 실패:', e);
    sentences = [];
    recentSources = [];
  }

  currentCategory = loadLastCategory();
  renderArchive();
}
async function saveAll(){
  try{
    await storageAdapter.set(STORAGE_KEY, JSON.stringify({ sentences, recentSources }));
  }catch(e){
    console.error('저장 실패:', e);
    showToast('저장하지 못했습니다. 잠시 후 다시 시도해주세요.');
  }
}

function loadLastCategory(){
  try{
    const saved = localStorage.getItem('truth-last-category');
    if(CATEGORIES.includes(saved)) return saved;
  }catch(e){}
  return CATEGORIES[0];
}
function saveLastCategory(cat){
  try{ localStorage.setItem('truth-last-category', cat); }catch(e){}
}

function addRecentSource(src){
  src = (src || '').trim();
  if(!src) return;
  recentSources = [src, ...recentSources.filter(s => s !== src)].slice(0, 3);
}

// ── 보관함(카테고리별 문장 목록) 렌더링 ──────────
function renderArchive(){
  applyCategoryColor();
  categoryTabs.querySelectorAll('.category-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.cat === currentCategory);
  });
  updateCategoryIndicator();

  const list = sentences
    .filter(s => s.category === currentCategory)
    .sort((a, b) => {
      const rankDiff = sentenceSortRank(a) - sentenceSortRank(b);
      if(rankDiff !== 0) return rankDiff;
      return (b.ts || 0) - (a.ts || 0); // 같은 등급 안에서는 최신순
    });

  if(list.length === 0){
    archiveList.innerHTML = `
      <div class="empty">
        <div class="empty-title">아직 남긴 문장이 없습니다.</div>
      </div>`;
    return;
  }

  archiveList.innerHTML = list.map(s => {
    const metaParts = [];
    if(s.source) metaParts.push(escapeHtml(s.source));
    if(s.ref) metaParts.push(escapeHtml(s.ref));
    const metaLine = metaParts.join(' · ');
    const bookmarkHtml = s.important ? `<span class="quote-bookmark" title="즐겨찾기">${BOOKMARK_SVG}</span>` : '';
    const newBadgeHtml = isRecentlyAdded(s.ts) ? `<span class="quote-new-badge">NEW</span>` : '';
    const showMetaRow = metaLine || s.important || newBadgeHtml;
    return `
      <div class="quote-block" data-id="${s.id}">
        <p class="quote-text">${renderHighlightedText(s.text, s.highlights)}</p>
        ${s.comment ? `<div class="quote-comment"><span class="quote-comment-mark"></span><span class="quote-comment-text">${escapeHtml(s.comment)}</span></div>` : ''}
        ${showMetaRow ? `<div class="quote-meta-line">${bookmarkHtml}${newBadgeHtml}${metaLine ? `<span>${metaLine}</span>` : ''}</div>` : ''}
      </div>
    `;
  }).join('');
}

// 이벤트 위임: archiveList 자체는 재렌더링해도 그대로 유지되는 요소라, 리스너를 한 번만 붙여두고
// 클릭된 대상이 어느 quote-block인지는 매번 closest로 찾음.
// (이전엔 renderArchive가 실행될 때마다 문장 개수만큼 리스너를 새로 붙이고 있었음)
archiveList.addEventListener('click', async (e) => {
  const block = e.target.closest('.quote-block');
  if(!block) return;

  // 드래그로 문장을 선택한 상태면(하이라이트 하려는 것) 액션시트를 열지 않음
  const sel = window.getSelection();
  if(sel && !sel.isCollapsed && sel.toString().trim()) return;

  // 이미 칠해진 하이라이트를 탭하면, 메뉴 대신 그 하이라이트를 바로 지움
  const markEl = e.target.closest('.quote-highlight');
  if(markEl){

// 모드+입력값 → 저장용 문자열 ("51p" 또는 "2026.04.25")
function buildRefString(mode, pageVal, dateVal){
  if(mode === 'page'){
    const v = (pageVal || '').trim();
    return v ? `${v}p` : '';
  }
  return dateVal ? dateVal.replace(/-/g, '.') : '';
}
// 저장된 문자열 → 수정 시트를 열 때 모드+입력값 복원 (옛 형식/자유 입력도 최대한 추측해서 복원)
function parseRefString(ref){
  if(!ref) return { mode: 'page', page: '', date: '' };
  const pageMatch = ref.match(/^(\d+)\s*p$/i);
  if(pageMatch) return { mode: 'page', page: pageMatch[1], date: '' };
  const dateMatch = ref.match(/^(\d{4})[.\-](\d{2})[.\-](\d{2})$/);
  if(dateMatch) return { mode: 'date', page: '', date: `${dateMatch[1]}-${dateMatch[2]}-${dateMatch[3]}` };
  const digits = ref.match(/\d+/);
  return { mode: 'page', page: digits ? digits[0] : '', date: '' };
}

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if(!sel || sel.isCollapsed || !sel.toString().trim()){
    resetAddButtonToNormal();
    return;
  }
  const range = sel.getRangeAt(0);
  const anchorEl = range.commonAncestorContainer.nodeType === 1
    ? range.commonAncestorContainer
    : range.commonAncestorContainer.parentElement;
  const textEl = anchorEl ? anchorEl.closest('.quote-text') : null;
  if(!textEl){
    resetAddButtonToNormal();
    return;
  }

  const start = getTextOffset(textEl, range.startContainer, range.startOffset);
  const end = getTextOffset(textEl, range.endContainer, range.endOffset);
  if(start === end){
    resetAddButtonToNormal();
    return;
  }

  const block = textEl.closest('.quote-block');
  const rangeStart = Math.min(start, end);
  const rangeEnd = Math.max(start, end);
  pendingHighlight = { sentenceId: block.dataset.id, start: rangeStart, end: rangeEnd };

  // 선택한 부분이 이미 하이라이트와 겹치면 취소 가능 상태(빨강)로, 아니면 칠하기 상태(노랑)로 바꿈
  const s = findSentence(block.dataset.id);
  const existing = (s && Array.isArray(s.highlights)) ? s.highlights : [];
  const overlapping = existing.some(h => rangeStart < h.end && rangeEnd > h.start);
  addQuoteTriggerBtn.innerHTML = HIGHLIGHTER_ICON;
  addQuoteTriggerBtn.title = overlapping ? '하이라이트 취소' : '하이라이트';
  addQuoteTriggerBtn.classList.add('highlight-mode');
  addQuoteTriggerBtn.classList.toggle('cancel-mode', overlapping);
});

let pendingCorrections = []; // [{ key, entryId, sentenceIdx(전체 비교면 null), category, original, corrected }]

// 마침표/물음표/느낌표(+ 뒤따르는 닫는 인용부호) 기준으로 한 문단을 문장 단위로 쪼갬
function splitSentences(text){
  const matches = text.match(/[^.!?]*[.!?]+["'”’」』]*|[^.!?]+$/g) || [];
  return matches.map(s => s.trim()).filter(Boolean);
}

// 문자 단위 diff (LCS 기반) - 원문/수정본에서 실제로 달라진 글자만 표시하기 위함.
// 문장 전체를 다 그어버리면 뭐가 바뀐 건지 찾기 힘드니, 진짜 다른 부분만 표시함.
function computeCharDiff(a, b){
  const m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
  for(let i = 1; i <= m; i++){
    for(let j = 1; j <= n; j++){
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);
    }
  }
  const ops = [];
  let i = m, j = n;
  while(i > 0 && j > 0){
    if(a[i-1] === b[j-1]){ ops.push({ type: 'equal', ch: a[i-1] }); i--; j--; }
    else if(dp[i-1][j] >= dp[i][j-1]){ ops.push({ type: 'delete', ch: a[i-1] }); i--; }
    else { ops.push({ type: 'insert', ch: b[j-1] }); j--; }
  }
  while(i > 0){ ops.push({ type: 'delete', ch: a[--i] }); }
  while(j > 0){ ops.push({ type: 'insert', ch: b[--j] }); }
  ops.reverse();
  return ops;
}

// diff 결과를 원문 줄/수정본 줄 각각의 HTML로 만듦 - 달라진 글자만 색칠/취소선 처리
function renderCharDiffHtml(original, corrected){
  const ops = computeCharDiff(original, corrected);
  let origHtml = '';
  let correctedHtml = '';
  ops.forEach(op => {
    const escaped = escapeHtml(op.ch);
    if(op.type === 'equal'){
      origHtml += escaped;
      correctedHtml += escaped;
    } else if(op.type === 'delete'){
      origHtml += `<span class="diff-del">${escaped}</span>`;
    } else if(op.ch === ' '){
      // 공백 삽입(띄어쓰기 추가)은 하이라이트만으로는 잘 안 보이므로 V 표시로 눈에 띄게 함
      correctedHtml += `<span class="diff-space-mark" title="띄어쓰기 추가">V</span> `;
    } else {
      correctedHtml += `<span class="diff-ins">${escaped}</span>`;
    }
  });
  return { origHtml, correctedHtml };
}

const SPELLCHECK_CHUNK_SIZE = 10; // 한 번에 너무 많이 보내면 응답이 중간에 잘려 조용히 실패할 수 있어 작은 묶음으로 나눔

function chunkArray(arr, size){
  const chunks = [];
  for(let i = 0; i < arr.length; i += size) chunks.push(arr.slice(i, i + size));
  return chunks;
}

async function requestSpellCheckChunk(chunkList){
  // 문장 안에 줄바꿈이 있으면 아래 "한 줄에 하나씩" 파싱이 깨지므로 미리 공백으로 정리함
  const payload = chunkList.map(s => ({ id: s.id, text: s.text.replace(/\r?\n/g, ' ') }));
  const prompt = `다음은 책에서 옮겨 적은 문장들입니다. 각 문장에서 명백한 오타, 맞춤법 오류, 띄어쓰기 오류만 고쳐주세요.
문장 끝에 마침표(. ? !)가 빠져 있으면 자연스럽게 붙여주세요.
따옴표(' " ' " 등)는 원문에 있는 그대로 두고 절대 바꾸지 마세요 - 스타일이 다르거나 짝이 안 맞아 보여도 오류가 아닙니다.
원문의 표현, 어투, 의미는 절대 바꾸지 마세요 - 실제로 틀린 부분만 고쳐야 합니다.

문장 목록(JSON):
${JSON.stringify(payload)}

수정 결과를 한 줄에 하나씩, 아래 형식으로만 출력하세요. 각 줄은 "id" 다음에 "|||" 다음에 "수정된 문장" 순서입니다.
설명, 번호, 마크다운 없이 이 형식의 줄들만 출력하세요 (문장 안에 큰따옴표나 특수문자가 있어도 그대로 쓰면 됩니다):
id|||수정된 문장`;

  const res = await fetch(WORKER_URL + '/classify', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 4000,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if(!res.ok) throw new Error('요청 실패: ' + res.status);
  const data = await res.json();
  const rawText = (data.content || []).map(b => b.text || '').join('');

  const corrections = rawText
    .split('\n')
    .map(line => line.trim())
    .filter(Boolean)
    .map(line => {
      const sepIdx = line.indexOf('|||');
      if(sepIdx === -1) return null;
      return {
        id: line.slice(0, sepIdx).trim(),
        text: line.slice(sepIdx + 3).trim()
      };
    })
    .filter(Boolean);

  if(corrections.length === 0) throw new Error('응답에서 유효한 줄을 찾지 못함');
  return corrections;
}

function showSpellError(message){
  spellErrorMessage.textContent = message;
  spellErrorOverlay.classList.add('open');
}
spellErrorCloseBtn.addEventListener('click', () => {
  spellErrorOverlay.classList.remove('open');
});
spellErrorOverlay.addEventListener('click', (e) => {
  if(e.target === spellErrorOverlay) spellErrorOverlay.classList.remove('open');
});

async function runSpellCheck(){
  // [1] 이미 점검했던 문장은 다시 보내지 않음. [3] 카테고리 구분 없이 전체 대상.
  const list = sentences.filter(s => !s.spellChecked);
  if(list.length === 0){
    showToast('새로 점검할 문장이 없어요');
    return;
  }

  spellCheckBtn.disabled = true;

  const chunks = chunkArray(list, SPELLCHECK_CHUNK_SIZE);
  const diffItems = [];
  const errorMessages = [];
  let successCount = 0;

  for(let i = 0; i < chunks.length; i++){
    const chunk = chunks[i];
    spellCheckBtn.textContent = chunks.length > 1 ? `점검 중... (${i + 1}/${chunks.length})` : '점검 중...';

    try{
      const corrections = await requestSpellCheckChunk(chunk);

      // 이 묶음은 성공했으니 점검 완료로 표시하고 바로 저장.
      // 실패한 묶음은 건드리지 않아서, 다음에 버튼을 누르면 그 문장들만 다시 시도됨.
      chunk.forEach(s => { s.spellChecked = true; });
      await saveAll();
      successCount++;

      // [4] 문단 전체가 아니라 문장 단위로 쪼개서 비교 - 실제로 달라진 문장만 모음
      corrections.forEach(c => {
        const orig = chunk.find(s => s.id === c.id);
        if(!orig || typeof c.text !== 'string') return;
        const correctedFull = c.text.trim();
        if(!correctedFull || correctedFull === orig.text.trim()) return;

        const origSentences = splitSentences(orig.text);
        const correctedSentences = splitSentences(correctedFull);

        if(origSentences.length > 0 && origSentences.length === correctedSentences.length){
          origSentences.forEach((os, idx) => {
            const cs = correctedSentences[idx];
            if(os.trim() !== cs.trim()){
              diffItems.push({
                key: `${c.id}:${idx}`,
                entryId: c.id,
                sentenceIdx: idx,
                category: orig.category,
                original: os,
                corrected: cs
              });
            }
          });
        } else {
          // 문장 개수가 서로 안 맞으면 안전하게 전체를 통째로 비교
          diffItems.push({
            key: `${c.id}:whole`,
            entryId: c.id,
            sentenceIdx: null,
            category: orig.category,
            original: orig.text,
            corrected: correctedFull
          });
        }
      });
    }catch(e){
      const msg = (e && e.message) ? e.message : String(e);
      console.error(`맞춤법 확인 실패 (묶음 ${i + 1}/${chunks.length}):`, e);
      errorMessages.push(`묶음 ${i + 1}/${chunks.length}: ${msg}`);
    }
  }

  spellCheckBtn.disabled = false;
  spellCheckBtn.textContent = '맞춤법 확인하기';

  if(successCount === 0 && errorMessages.length > 0){
    showSpellError('맞춤법 확인에 실패했어요. 아래 내용을 캡처해서 알려주시면 원인을 더 정확히 찾을 수 있어요.\n\n' + errorMessages.join('\n'));
    return;
  }
  if(diffItems.length === 0){
    showToast('고칠 부분을 찾지 못했어요', 2200);
    return;
  }

  openSpellCheckReview(diffItems);
  if(errorMessages.length > 0){
    showToast(`일부는 확인하지 못했어요 (${errorMessages.length}개 묶음 실패, 다음에 다시 시도돼요)`, 3200);
  }
}
spellCheckBtn.addEventListener('click', runSpellCheck);

function openSpellCheckReview(diffItems){
  pendingCorrections = diffItems;
  spellCheckList.innerHTML = diffItems.map(item => {
    const { origHtml, correctedHtml } = renderCharDiffHtml(item.original, item.corrected);
    return `
      <div class="spell-check-item">
        <label class="spell-check-item-header">
          <input type="checkbox" class="spell-check-checkbox" data-key="${item.key}" checked>
          <div class="spell-check-texts">
            <span class="spell-check-category" style="color:${CATEGORY_COLORS[item.category] || CATEGORY_COLORS['삶']}">${item.category}</span>
            <div class="spell-check-original">${origHtml}</div>
            <div class="spell-check-corrected">${correctedHtml}</div>
          </div>
        </label>
      </div>
    `;
  }).join('');
  spellCheckOverlay.classList.add('open');
  lockBodyScroll();
}
function closeSpellCheckReview(){
  spellCheckOverlay.classList.remove('open');
  unlockBodyScroll();
  pendingCorrections = [];
}
spellCheckOverlay.addEventListener('click', (e) => {
  if(e.target === spellCheckOverlay) closeSpellCheckReview();
});

spellCheckApplyBtn.addEventListener('click', async () => {
  const checkedKeys = new Set(
    Array.from(spellCheckList.querySelectorAll('.spell-check-checkbox:checked')).map(el => el.dataset.key)
  );

  if(checkedKeys.size === 0){
    closeSpellCheckReview();
    return;
  }

  // entryId별로 모아서, 문장 단위 항목이면 원본 문장 배열 중 체크된 것만 교체해 재조립함
  const byEntry = {};
  pendingCorrections.forEach(item => {
    if(!byEntry[item.entryId]) byEntry[item.entryId] = [];
    byEntry[item.entryId].push(item);
  });

  let appliedCount = 0;
  Object.keys(byEntry).forEach(entryId => {
    const items = byEntry[entryId];
    const s = findSentence(entryId);
    if(!s) return;

    const isWholeEntry = items.length === 1 && items[0].sentenceIdx === null;
    if(isWholeEntry){
      if(checkedKeys.has(items[0].key)){
        s.text = items[0].corrected;
        s.highlights = [];
        appliedCount++;
      }
      return;
    }

    const origSentences = splitSentences(s.text);
    let changedAny = false;
    items.forEach(item => {
      if(checkedKeys.has(item.key) && origSentences[item.sentenceIdx] !== undefined){
        origSentences[item.sentenceIdx] = item.corrected;
        changedAny = true;
        appliedCount++;
      }
    });
    if(changedAny) s.text = origSentences.join(' ');
    if(changedAny) s.highlights = [];
  });

  await saveAll();
  closeSpellCheckReview();
  renderArchive();
  showToast(appliedCount > 0 ? `✓ ${appliedCount}개 문장을 수정했어요` : '적용된 변경사항이 없어요');
});

const splashOverlay = document.getElementById('splashOverlay');
const SPLASH_MIN_MS = 700; // 데이터가 순식간에 로드돼도 로고가 최소 이 정도는 보이도록 함
const splashStart = Date.now();

loadAll().then(() => {
  const wait = Math.max(0, SPLASH_MIN_MS - (Date.now() - splashStart));
  setTimeout(() => {
    splashOverlay.classList.add('hide');
  }, wait);
});
</script>
