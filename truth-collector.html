<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수집가들 — 겹치는 진리 수집</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FFFFFF;
    --bg-secondary: #F4F8FE;
    --border: #E3E8EF;
    --text: #202124;
    --text-secondary: #5F6368;
    --text-tertiary: #9AA0A6;
    --hover: #EEF4FF;
    --blue: #4285F4;
    --blue-dark: #3367D6;
    --blue-bg: #E8F0FE;
    --green: #03C75A;
    --green-bg: #E3FBEC;
    --pill-bg: #F1F3F4;
    --shadow: rgba(66,133,244,0.08);
    --shadow-md: rgba(32,33,36,0.12);
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard-Regular", "Apple SD Gothic Neo", sans-serif;
    min-height: 100vh;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap{ max-width: 760px; margin: 0 auto; padding: 64px 24px 100px; }

  header.masthead{
    margin-bottom: 40px;
    text-align: center;
  }
  .icon-row{
    width: 76px;
    height: 76px;
    margin: 0 auto 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    filter: drop-shadow(0 8px 16px rgba(66,133,244,0.28));
  }
  .icon-row svg{ width: 100%; height: 100%; }
  h1.title{
    font-size: 34px;
    font-weight: 700;
    margin: 0 0 10px;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  h1.title .accent{
    background: linear-gradient(135deg, var(--blue), var(--green));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .subtitle{
    color: var(--text-secondary);
    font-size: 14px;
    line-height: 1.6;
    max-width: 460px;
    margin: 0 auto;
  }

  /* input block */
  .callout{
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 2px 10px var(--shadow);
    margin-bottom: 40px;
    overflow: visible;
  }
  .callout-body{
    padding: 16px 18px 14px;
  }
  .input-row{
    display: flex;
    align-items: flex-end;
    gap: 12px;
    margin-bottom: 12px;
  }
  textarea#quoteInput{
    flex: 1;
    width: 100%;
    border: none;
    background: transparent;
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    color: var(--text);
    resize: none;
    min-height: 24px;
    max-height: none;
    overflow: hidden;
    outline: none;
    padding: 4px 0;
  }
  textarea#quoteInput::placeholder{ color: var(--text-tertiary); }

  .meta-row{
    display:flex; gap: 8px; flex-wrap: wrap;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .meta-field{
    display:flex; align-items:center; gap: 6px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 10px;
    flex: 1 1 160px;
    position: relative;
  }
  .meta-field .field-icon{ font-size: 13px; opacity: 0.6; flex-shrink: 0; }
  .meta-field input{
    border: none;
    background: transparent;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--text);
    outline: none;
    width: 100%;
  }
  .meta-field input::placeholder{ color: var(--text-tertiary); }

  .book-caret{
    background:none; border:none; cursor:pointer;
    color: var(--text-tertiary);
    font-size: 11px;
    padding: 2px 2px;
    flex-shrink: 0;
    line-height: 1;
    border-radius: 3px;
  }
  .book-caret:hover{ color: var(--text); background: var(--hover); }

  .book-dropdown{
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    min-width: 100%;
    max-width: 260px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 4px 14px var(--shadow-md);
    z-index: 20;
    display: none;
    flex-direction: column;
    padding: 4px;
    max-height: 220px;
    overflow-y: auto;
  }
  .book-dropdown.open{ display: flex; }
  .book-dropdown .dropdown-empty{
    font-size: 12.5px;
    color: var(--text-tertiary);
    padding: 8px 10px;
  }
  .book-dropdown-item{
    text-align: left;
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--text);
    padding: 7px 10px;
    border-radius: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .book-dropdown-item:hover{ background: var(--hover); }

  .status-msg{
    font-size: 12.5px;
    color: var(--text-secondary);
    min-height: 16px;
    margin-top: 10px;
    transition: color 0.2s ease;
  }
  .status-msg:empty{ margin-top: 0; min-height: 0; }
  .status-msg.error{ color: #EB5757; font-weight: 600; }
  .status-msg.loading{
    font-weight: 600;
    background: linear-gradient(100deg,
      var(--text-tertiary) 30%, var(--blue) 45%,
      var(--green) 50%, var(--text-tertiary) 65%);
    background-size: 250% auto;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: shimmerMove 2.6s ease-in-out infinite alternate;
    will-change: background-position;
  }
  .status-msg.success{
    color: var(--text-secondary);
    font-weight: 600;
    animation: statusPop 0.3s ease;
  }
  @keyframes shimmerMove{
    0%{ background-position: 160% center; }
    100%{ background-position: -60% center; }
  }
  @keyframes statusPop{
    from{ opacity: 0; transform: translateY(3px); }
    to{ opacity: 1; transform: translateY(0); }
  }

  .confetti-piece{
    position: fixed;
    width: 6px;
    height: 6px;
    border-radius: 1px;
    pointer-events: none;
    z-index: 999;
    animation: confettiPop 0.7s ease-out forwards;
  }
  @keyframes confettiPop{
    0%{ transform: translate(0,0) rotate(0deg); opacity: 1; }
    100%{ transform: translate(var(--dx), var(--dy)) rotate(var(--rot)); opacity: 0; }
  }
  button#submitBtn{
    background: var(--blue);
    color: #FFFFFF;
    border: none;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease, box-shadow 0.15s ease;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(66,133,244,0.3);
  }
  button#submitBtn:hover{ background: var(--blue-dark); box-shadow: 0 4px 12px rgba(66,133,244,0.4); }
  button#submitBtn:active{ transform: scale(0.94); }
  button#submitBtn:disabled{ opacity: 0.4; cursor: default; box-shadow: none; }

  /* section header */
  .section-head{
    display:flex; align-items:center; justify-content: space-between;
    margin-bottom: 10px;
    padding: 0 2px;
  }
  .section-head h2{
    font-size: 14px;
    font-weight: 600;
    margin: 0;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .section-head .count-tag{
    font-size: 12px;
    color: var(--text-tertiary);
    background: var(--pill-bg);
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }

  /* cards - notion block/page style */
  .grid{ display:flex; flex-direction:column; gap: 2px; }

  .card{
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px 18px;
    position: relative;
    margin-bottom: 8px;
    transition: box-shadow 0.15s ease;
    animation: cardIn 0.3s ease both;
  }
  .card:hover{ box-shadow: 0 2px 8px var(--shadow-md); }
  @keyframes cardIn{
    from{ opacity:0; transform: translateY(4px); }
    to{ opacity:1; transform: translateY(0); }
  }

  .card-top{
    display:flex; align-items:flex-start; justify-content: space-between;
    gap: 12px;
  }
  .canonical{
    font-size: 16px;
    font-weight: 600;
    line-height: 1.5;
    margin: 0;
    color: var(--text);
    flex: 1;
  }
  .unclassified-tag{
    display: inline-block;
    font-size: 10.5px;
    font-weight: 600;
    color: var(--text-secondary);
    background: var(--pill-bg);
    padding: 1px 7px;
    border-radius: 8px;
    margin-left: 8px;
    vertical-align: middle;
  }
  .count-pill{
    flex-shrink: 0;
    display:flex; align-items:center; gap: 5px;
    font-size: 13.5px;
    font-weight: 800;
    padding: 5px 12px;
    border-radius: 14px;
    font-family: 'Inter', sans-serif;
    letter-spacing: -0.01em;
  }
  .count-pill.tier-1{
    background: var(--green-bg);
    color: #059142;
  }
  .count-pill.tier-2{
    background: linear-gradient(135deg, #05D967, #03A64A);
    color: #FFFFFF;
    box-shadow: 0 3px 10px rgba(3,199,90,0.35);
  }
  .count-pill.tier-3{
    background: linear-gradient(135deg, #FFA53D, #FF5B5B);
    color: #FFFFFF;
    box-shadow: 0 3px 10px rgba(255,91,91,0.35);
  }
  .count-pill.tier-4{
    background: linear-gradient(135deg, #FFD166, #FF6B6B 55%, #C86DD7);
    color: #FFFFFF;
    box-shadow: 0 3px 12px rgba(200,109,215,0.4);
  }
  .count-pill.pulse{ animation: thump 0.45s ease; }
  @keyframes thump{
    0%{ transform: scale(1); }
    40%{ transform: scale(1.18); }
    100%{ transform: scale(1); }
  }

  .toggle-row{
    margin-top: 10px;
  }
  .toggle-sources{
    background:none; border:none; cursor:pointer;
    display:flex; align-items:center; gap: 5px;
    font-size: 12.5px;
    color: var(--text-secondary);
    padding: 3px 4px;
    border-radius: 3px;
  }
  .toggle-sources:hover{ background: var(--hover); color: var(--text); }
  .toggle-sources .caret{
    display:inline-block;
    transition: transform 0.15s ease;
    font-size: 10px;
  }
  .toggle-sources.open .caret{ transform: rotate(90deg); }

  .sources{
    margin-top: 4px;
    padding-left: 14px;
    border-left: 2px solid var(--border);
    display: none;
    flex-direction: column;
    gap: 10px;
  }
  .sources.open{ display:flex; margin-top: 10px; padding-top: 2px; padding-bottom: 2px;}
  .source-item{
    display:flex; justify-content: space-between; align-items:flex-start;
    gap: 10px;
    padding: 8px 10px;
    background: var(--bg-secondary);
    border-radius: 4px;
  }
  .source-text{
    font-size: 13.5px;
    color: var(--text);
    line-height: 1.5;
  }
  .source-origin{
    display:flex; gap: 6px; margin-top: 5px;
  }
  .origin-pill{
    font-size: 11px;
    color: var(--text-secondary);
    background: var(--pill-bg);
    padding: 1px 7px;
    border-radius: 3px;
  }
  .remove-source{
    background:none; border:none; cursor:pointer;
    color: var(--text-tertiary); font-size: 14px; line-height:1;
    flex-shrink:0;
    padding: 2px;
    border-radius: 3px;
  }
  .remove-source:hover{ color: #EB5757; background: var(--hover); }

  .card-controls{
    margin-top: 8px;
  }
  .delete-group{
    background:none; border:none; cursor:pointer;
    font-size: 11.5px;
    color: var(--text-tertiary);
    padding: 2px 4px;
    border-radius: 3px;
  }
  .delete-group:hover{ color: #EB5757; background: var(--hover); }

  .empty{
    text-align:center;
    padding: 60px 20px;
    color: var(--text-tertiary);
    font-size: 14px;
    line-height: 1.7;
    background: var(--bg);
    border: 1px dashed var(--border);
    border-radius: 6px;
  }

  footer.note{
    margin-top: 44px;
    text-align:center;
    font-size: 11.5px;
    color: var(--text-tertiary);
  }

  @media (max-width: 520px){
    .card-top{ flex-direction: column; }
    .count-pill{ align-self: flex-start; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="masthead">
    <div class="icon-row">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#4285F4"/>
            <stop offset="1" stop-color="#03C75A"/>
          </linearGradient>
        </defs>
        <circle cx="50" cy="50" r="48" fill="url(#logoGrad)"/>
        <path d="M50 42 C39 34 27 36 23 40 V63 C27 59 39 57 50 65 C61 57 73 59 77 63 V40 C73 36 61 34 50 42 Z" fill="#FFFFFF"/>
        <line x1="50" y1="42" x2="50" y2="65" stroke="#D8E6FB" stroke-width="2"/>
        <circle cx="42" cy="48" r="3.1" fill="#2A2420"/>
        <circle cx="58" cy="48" r="3.1" fill="#2A2420"/>
        <circle cx="34" cy="54.5" r="3" fill="#FF9AA8" opacity="0.75"/>
        <circle cx="66" cy="54.5" r="3" fill="#FF9AA8" opacity="0.75"/>
        <path d="M79 18 L81.3 24.7 L88 27 L81.3 29.3 L79 36 L76.7 29.3 L70 27 L76.7 24.7 Z" fill="#FFD166"/>
      </svg>
    </div>
    <h1 class="title">문장 <span class="accent">수집가들</span></h1>
    <p class="subtitle">성공한 사람들이 하는 이야기는 결국 다 비슷하다는 느낌을 받아본 적이 있나요?<br>여러 책에서 반복되는 문장들을 모아 그 공통점을 찾아봅니다.</p>
  </header>

  <div class="callout">
    <div class="callout-body">
      <div class="input-row">
        <textarea id="quoteInput" rows="1" placeholder="인상 깊었던 문장을 적어주세요"></textarea>
        <button id="submitBtn" title="문장 수집하기" aria-label="문장 수집하기">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="meta-row">
        <div class="meta-field" id="bookField">
          <span class="field-icon">📖</span>
          <input id="bookInput" type="text" placeholder="책 제목" list="bookDatalist" autocomplete="off">
          <datalist id="bookDatalist"></datalist>
          <button type="button" class="book-caret" id="bookCaret" title="최근 입력한 책 제목">▾</button>
          <div class="book-dropdown" id="bookDropdown"></div>
        </div>
        <div class="meta-field">
          <span class="field-icon">#</span>
          <input id="pageInput" type="text" placeholder="페이지 (예: 124)">
        </div>
      </div>
      <div class="status-msg" id="statusMsg"></div>
    </div>
  </div>

  <div class="section-head">
    <h2>모인 문장들</h2>
    <span class="count-tag" id="groupCountTag">0개</span>
  </div>

  <div class="grid" id="cardGrid"></div>

</div>

<script>
const STORAGE_KEY = 'truth-groups';
let groups = [];

const quoteInput = document.getElementById('quoteInput');
const bookInput = document.getElementById('bookInput');
const pageInput = document.getElementById('pageInput');
const submitBtn = document.getElementById('submitBtn');
const statusMsg = document.getElementById('statusMsg');
const cardGrid = document.getElementById('cardGrid');
const groupCountTag = document.getElementById('groupCountTag');
const bookCaret = document.getElementById('bookCaret');
const bookDropdown = document.getElementById('bookDropdown');
const bookDatalist = document.getElementById('bookDatalist');

function autoResizeQuoteInput(){
  quoteInput.style.height = 'auto';
  quoteInput.style.height = quoteInput.scrollHeight + 'px';
}
quoteInput.addEventListener('input', autoResizeQuoteInput);
autoResizeQuoteInput();

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function getRecentBooks(limit = 8){
  const all = [];
  groups.forEach(g => {
    g.sources.forEach(s => {
      if(s.book && s.book.trim()){
        all.push({ book: s.book.trim(), ts: s.ts || 0 });
      }
    });
  });
  all.sort((a,b) => b.ts - a.ts);
  const seen = new Set();
  const result = [];
  for(const item of all){
    const key = item.book.toLowerCase();
    if(!seen.has(key)){
      seen.add(key);
      result.push(item.book);
    }
    if(result.length >= limit) break;
  }
  return result;
}

function refreshBookSuggestions(){
  const recent = getRecentBooks(8);

  bookDatalist.innerHTML = recent.map(b => `<option value="${escapeHtml(b)}"></option>`).join('');

  if(recent.length === 0){
    bookDropdown.innerHTML = `<div class="dropdown-empty">아직 입력한 책이 없어요</div>`;
  } else {
    bookDropdown.innerHTML = recent.map(b =>
      `<button type="button" class="book-dropdown-item">${escapeHtml(b)}</button>`
    ).join('');
    bookDropdown.querySelectorAll('.book-dropdown-item').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        bookInput.value = btn.textContent;
        bookDropdown.classList.remove('open');
        pageInput.focus();
      });
    });
  }
}

bookCaret.addEventListener('click', (e)=>{
  e.stopPropagation();
  refreshBookSuggestions();
  bookDropdown.classList.toggle('open');
});
document.addEventListener('click', (e)=>{
  if(!bookDropdown.contains(e.target) && e.target !== bookCaret){
    bookDropdown.classList.remove('open');
  }
});

async function loadGroups(){
  try{
    const res = await window.storage.get(STORAGE_KEY, false);
    groups = res && res.value ? JSON.parse(res.value) : [];
  }catch(e){
    groups = [];
  }
  render();
  refreshBookSuggestions();
}

async function saveGroups(){
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify(groups), false);
  }catch(e){
    statusMsg.textContent = '저장에 실패했어요. 잠시 후 다시 시도해주세요.';
    statusMsg.classList.add('error');
  }
}

function getCountMeta(count){
  if(count >= 10) return { emoji: '🏆', tier: 4 };
  if(count >= 5) return { emoji: '🔥', tier: 3 };
  if(count >= 2) return { emoji: '✨', tier: 2 };
  return { emoji: '🌱', tier: 1 };
}

function render(pulseId){
  const sorted = [...groups].sort((a,b)=> b.count - a.count);
  groupCountTag.textContent = `${sorted.length}개`;

  if(sorted.length === 0){
    cardGrid.innerHTML = `<div class="empty">아직 모인 문장이 없어요.<br>위에 첫 문장을 적어보세요.</div>`;
    return;
  }

  cardGrid.innerHTML = sorted.map(g => {
    const meta = getCountMeta(g.count);
    return `
    <div class="card" data-id="${g.id}">
      <div class="card-top">
        <p class="canonical">${escapeHtml(g.canonical)}${g.unclassified ? '<span class="unclassified-tag">미분류</span>' : ''}</p>
        <div class="count-pill tier-${meta.tier} ${g.id === pulseId ? 'pulse' : ''}">${meta.emoji} ${g.count}회 발견</div>
      </div>
      <div class="toggle-row">
        <button class="toggle-sources" data-id="${g.id}"><span class="caret">▶</span>출처 ${g.sources.length}개</button>
        <div class="sources" id="sources-${g.id}">
          ${g.sources.map((s, idx) => `
            <div class="source-item">
              <div>
                <div class="source-text">"${escapeHtml(s.text)}"</div>
                ${(s.book || s.page) ? `
                <div class="source-origin">
                  ${s.book ? `<span class="origin-pill">📖 ${escapeHtml(s.book)}</span>` : ''}
                  ${s.page ? `<span class="origin-pill"># ${escapeHtml(s.page)}p</span>` : ''}
                </div>` : ''}
              </div>
              <button class="remove-source" data-gid="${g.id}" data-idx="${idx}" title="이 항목 삭제">×</button>
            </div>
          `).join('')}
        </div>
      </div>
      <div class="card-controls">
        <button class="delete-group" data-gid="${g.id}">그룹 삭제</button>
      </div>
    </div>
  `;
  }).join('');

  cardGrid.querySelectorAll('.toggle-sources').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const el = document.getElementById(`sources-${btn.dataset.id}`);
      el.classList.toggle('open');
      btn.classList.toggle('open');
    });
  });
  cardGrid.querySelectorAll('.remove-source').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const gid = btn.dataset.gid;
      const idx = parseInt(btn.dataset.idx, 10);
      const g = groups.find(x=>x.id===gid);
      if(!g) return;
      g.sources.splice(idx,1);
      g.count = g.sources.length;
      if(g.count === 0){
        groups = groups.filter(x=>x.id!==gid);
      }
      await saveGroups();
      render();
    });
  });
  cardGrid.querySelectorAll('.delete-group').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const gid = btn.dataset.gid;
      groups = groups.filter(x=>x.id!==gid);
      await saveGroups();
      render();
    });
  });
}

async function classifyQuote(quoteText){
  const existing = groups.map(g => ({ id: g.id, canonical: g.canonical }));
  const systemPrompt = `당신은 문장의 의미를 분석해 유사한 인생 교훈/진리끼리 묶는 분류기입니다.
사용자가 새 문장을 입력하면, 기존 그룹 목록과 의미가 사실상 같은 교훈을 말하는지 판단하세요.
표현이 달라도 핵심 메시지가 같으면 매칭시킵니다 (예: "돈을 좇지 마라"와 "부를 추구하지 말라"는 같은 그룹).
반드시 아래 JSON 형식으로만 응답하고 다른 텍스트는 절대 포함하지 마세요:
{"matchedId": "기존 그룹 id 또는 null", "canonical": "이 교훈을 나타내는 한국어 간결한 대표 문구 (15자 내외, 새 그룹일 때만 의미있게 사용됨)"}`;

  const userPrompt = `기존 그룹 목록:
${JSON.stringify(existing, null, 2)}

새 문장: "${quoteText}"`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{ role: "user", content: userPrompt }]
    })
  });

  if(!response.ok){
    throw new Error('API 오류');
  }

  const data = await response.json();
  const textBlock = data.content.find(c => c.type === 'text');
  if(!textBlock) throw new Error('응답 파싱 실패');

  const cleaned = textBlock.text.replace(/```json|```/g, '').trim();
  return JSON.parse(cleaned);
}

function fireConfetti(originEl){
  const rect = originEl.getBoundingClientRect();
  const originX = rect.left + rect.width / 2;
  const originY = rect.top + rect.height / 2;
  const colors = ['#4285F4', '#03C75A', '#FFD166', '#FF6B6B', '#C86DD7'];

  for(let i = 0; i < 16; i++){
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const angle = Math.random() * Math.PI * 2;
    const distance = 36 + Math.random() * 46;
    const dx = Math.cos(angle) * distance;
    const dy = Math.sin(angle) * distance - 16;
    piece.style.setProperty('--dx', dx + 'px');
    piece.style.setProperty('--dy', dy + 'px');
    piece.style.setProperty('--rot', (Math.random() * 360) + 'deg');
    piece.style.left = originX + 'px';
    piece.style.top = originY + 'px';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    if(Math.random() > 0.5){
      piece.style.borderRadius = '50%';
    }
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 720);
  }
}

async function handleSubmit(){
  const quoteText = quoteInput.value.trim();
  if(!quoteText){
    statusMsg.classList.remove('loading','success');
    statusMsg.textContent = '문장을 입력해주세요.';
    statusMsg.classList.add('error');
    return;
  }

  const book = bookInput.value.trim();
  const page = pageInput.value.trim();

  submitBtn.disabled = true;
  statusMsg.classList.remove('error','success');
  statusMsg.classList.add('loading');
  statusMsg.textContent = '의미를 분석하는 중...';

  try{
    const result = await classifyQuote(quoteText);
    let targetId = null;

    if(result.matchedId && groups.some(g => g.id === result.matchedId)){
      const g = groups.find(g => g.id === result.matchedId);
      g.sources.push({ text: quoteText, book, page, ts: Date.now() });
      g.count = g.sources.length;
      targetId = g.id;
      statusMsg.classList.remove('loading');
      statusMsg.classList.add('success');
      statusMsg.textContent = `기존 그룹에 추가했어요. (${g.count}회째 발견)`;
    } else {
      const newGroup = {
        id: 'g_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
        canonical: result.canonical || quoteText,
        count: 1,
        sources: [{ text: quoteText, book, page, ts: Date.now() }]
      };
      groups.push(newGroup);
      targetId = newGroup.id;
      statusMsg.classList.remove('loading');
      statusMsg.classList.add('success');
      statusMsg.textContent = '새 그룹으로 등록했어요.';
    }

    await saveGroups();
    render(targetId);
    refreshBookSuggestions();
    fireConfetti(submitBtn);

    quoteInput.value = '';
    autoResizeQuoteInput();
    bookInput.value = '';
    pageInput.value = '';
    quoteInput.focus();
  }catch(e){
    // AI 분석이 실패해도(사용량 초과 등) 문장 자체는 잃어버리지 않도록 새 그룹으로 저장
    const newGroup = {
      id: 'g_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      canonical: quoteText,
      count: 1,
      sources: [{ text: quoteText, book, page, ts: Date.now() }],
      unclassified: true
    };
    groups.push(newGroup);
    await saveGroups();
    render(newGroup.id);
    refreshBookSuggestions();

    statusMsg.classList.remove('loading','success');
    statusMsg.textContent = 'AI 분석 없이 일단 저장했어요. (사용량 제한 등으로 자동 분류를 못했어요)';
    statusMsg.classList.add('error');

    quoteInput.value = '';
    autoResizeQuoteInput();
    bookInput.value = '';
    pageInput.value = '';
    quoteInput.focus();
  }finally{
    submitBtn.disabled = false;
  }
}

submitBtn.addEventListener('click', handleSubmit);
quoteInput.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    handleSubmit();
  }
});

loadGroups();
</script>
