<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수집가들 — 좋은 문장은 다시 찾아옵니다</title>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root{
    --bg: #FFFFFF;
    --surface: #FFFFFF;
    --text: #1C1C1E;
    --text-secondary: #6E6E73;
    --text-tertiary: #AEAEB2;
    --border: #E5E5EA;
    --accent: #3A3A3C;
    --hover: #F5F5F7;
    --danger: #B3453D;
    --danger-soft: #F5E8E6;
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", sans-serif;
    min-height: 100vh;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap{ max-width: 720px; margin: 0 auto; padding: 72px 24px 100px; }

  header.masthead{
    margin-bottom: 40px;
    text-align: center;
  }
  .title{
    font-size: 21px;
    font-weight: 700;
    letter-spacing: 0.02em;
    margin: 0 0 10px;
    color: var(--text);
  }
  .tagline{
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    margin: 0;
    letter-spacing: 0.01em;
  }

  /* 입력 카드 */
  .callout{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 44px;
  }
  .callout-body{
    padding: 14px 16px 12px;
  }
  .input-row{
    display: flex;
    align-items: center;
    gap: 8px;
  }
  textarea#quoteInput{
    flex: 1;
    width: 100%;
    border: none;
    background: transparent;
    font-family: 'Pretendard', sans-serif;
    font-size: 15.5px;
    line-height: 1.6;
    color: var(--text);
    resize: none;
    min-height: 22px;
    max-height: none;
    overflow: hidden;
    outline: none;
    padding: 6px 0;
  }
  textarea#quoteInput::placeholder{ color: var(--text-tertiary); }

  button#submitBtn{
    flex-shrink: 0;
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    color: var(--text-tertiary);
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: color 0.15s ease, background 0.15s ease;
  }
  button#submitBtn:hover{ color: var(--accent); background: var(--hover); }
  button#submitBtn:active{ opacity: 0.7; }
  button#submitBtn:disabled{ opacity: 0.35; cursor: default; }

  .meta-row{
    display:flex; gap: 8px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .meta-field{
    display:flex; align-items:center; gap: 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 11px;
    position: relative;
  }
  .meta-field.book-field{ flex: 7 1 0; }
  .meta-field.page-field{ flex: 3 1 0; }
  .meta-field input{
    border: none;
    background: transparent;
    font-family: 'Pretendard', sans-serif;
    font-size: 13px;
    color: var(--text);
    outline: none;
    width: 100%;
  }
  .meta-field input::placeholder{ color: var(--text-tertiary); }

  .book-caret{
    background:none; border:none; cursor:pointer;
    color: var(--text-tertiary);
    font-size: 11px;
    padding: 2px 2px;
    flex-shrink: 0;
    line-height: 1;
  }
  .book-caret:hover{ color: var(--text); }

  .book-dropdown{
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    min-width: 100%;
    max-width: 260px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 4px 14px rgba(31,35,40,0.08);
    z-index: 20;
    display: none;
    flex-direction: column;
    padding: 4px;
    max-height: 220px;
    overflow-y: auto;
  }
  .book-dropdown.open{ display: flex; }
  .book-dropdown .dropdown-empty{
    font-size: 12.5px;
    color: var(--text-tertiary);
    padding: 8px 10px;
  }
  .book-dropdown-row{ display:flex; align-items:center; gap:2px; }
  .book-dropdown-item{
    flex: 1;
    text-align: left;
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Pretendard', sans-serif;
    font-size: 13px;
    color: var(--text);
    padding: 7px 10px;
    border-radius: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .book-dropdown-item:hover{ background: var(--hover); }
  .book-dropdown-remove{
    flex-shrink: 0;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-tertiary);
    font-size: 13px;
    padding: 6px 8px;
  }
  .book-dropdown-remove:hover{ color: var(--danger); }

  .status-msg{
    font-size: 12px;
    color: var(--text-secondary);
    min-height: 0;
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.3s ease, max-height 0.3s ease, margin 0.3s ease;
  }
  .status-msg.show{
    opacity: 1;
    max-height: 20px;
    margin-top: 8px;
  }
  .status-msg.error{ color: var(--danger); }
  .status-msg.loading{
    color: var(--text-tertiary);
    animation: gentlePulse 1.6s ease-in-out infinite;
  }
  @keyframes gentlePulse{
    0%, 100%{ opacity: 0.5; }
    50%{ opacity: 1; }
  }
  @keyframes fadeIn{
    from{ opacity: 0; transform: translateY(2px); }
    to{ opacity: 1; transform: translateY(0); }
  }

  /* 섹션 헤더 */
  .section-head{
    margin-bottom: 4px;
    padding: 0 2px;
  }
  .section-head:has(.count-tag:empty){ display: none; }
  .section-head .count-tag{
    font-size: 12px;
    color: var(--text-tertiary);
  }

  /* 문장 목록 */
  .grid{ display:flex; flex-direction:column; }

  .card{
    position: relative;
    padding: 22px 30px 22px 2px;
    border-bottom: 1px solid var(--border);
    animation: fadeIn 0.2s ease both;
  }
  .card:last-child{ border-bottom: none; }

  .card-delete{
    position: absolute;
    top: 20px;
    right: 0;
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-tertiary);
    opacity: 0.25;
    font-size: 14px;
    transition: opacity 0.15s ease, color 0.15s ease;
  }
  .card-delete:hover{ opacity: 1; color: var(--danger); }

  .card-summary{
    cursor: pointer;
  }

  .quote-text{
    font-size: 16.5px;
    font-weight: 500;
    line-height: 1.85;
    margin: 0 0 8px;
    color: var(--text);
    padding-right: 8px;
  }
  .discover-meta{
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12.5px;
    color: var(--text-tertiary);
    margin: 0;
  }
  .discover-meta .caret{
    display:inline-block;
    transition: transform 0.15s ease;
    font-size: 10px;
  }
  .card-summary.open .caret{ transform: rotate(90deg); }

  .detail{
    display: none;
    flex-direction: column;
    gap: 18px;
  }
  .detail.open{
    display:flex;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .book-block{ display:flex; flex-direction:column; gap: 12px; }
  .book-name{
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.02em;
  }
  .quote-entry{
    padding-left: 14px;
    border-left: 2px solid var(--border);
    position: relative;
  }
  .quote-entry-text{
    font-size: 14px;
    line-height: 1.75;
    color: var(--text);
    margin: 0 0 4px;
    padding-right: 20px;
  }
  .quote-entry-meta{
    font-size: 11.5px;
    color: var(--text-tertiary);
    margin: 0;
    font-family: 'Pretendard', sans-serif;
  }
  .quote-entry-note{
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-secondary);
    background: var(--hover);
    border-radius: 6px;
    padding: 9px 11px;
    line-height: 1.65;
    font-family: 'Pretendard', sans-serif;
  }
  .quote-entry-note .note-label{
    display:block;
    font-size: 10.5px;
    font-weight: 700;
    color: var(--text-tertiary);
    margin-bottom: 3px;
  }
  .entry-delete{
    position: absolute;
    top: 0;
    right: 0;
    background: none; border:none; cursor:pointer;
    color: var(--text-tertiary);
    font-size: 13px;
    padding: 2px 4px;
    font-family: 'Pretendard', sans-serif;
  }
  .entry-delete:hover{ color: var(--danger); }

  .empty{
    text-align:center;
    padding: 64px 20px;
    color: var(--text-tertiary);
    font-size: 13.5px;
    line-height: 1.9;
  }
  .empty-title{
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 18px;
  }

  /* 확인 다이얼로그 */
  .modal-overlay{
    position: fixed;
    inset: 0;
    background: rgba(31,35,40,0.32);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 100;
  }
  .modal-overlay.open{ display: flex; }
  .modal-box{
    background: var(--surface);
    border-radius: 14px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 12px 32px rgba(31,35,40,0.16);
    animation: fadeIn 0.18s ease;
  }

  .confirm-box{
    max-width: 300px;
    padding: 26px 22px 20px;
  }
  .confirm-message{
    margin: 0 0 20px;
    font-size: 14px;
    line-height: 1.75;
    color: var(--text);
    text-align: center;
  }
  .confirm-actions{ display:flex; gap: 8px; }
  .confirm-btn{
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 0;
    font-family: 'Pretendard', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    background: var(--surface);
  }
  .confirm-cancel{ color: var(--text-secondary); }
  .confirm-cancel:hover{ background: var(--hover); }
  .confirm-ok{ color: var(--danger); border-color: var(--danger-soft); background: var(--danger-soft); }
  .confirm-ok:hover{ background: #EBDAD6; }

  footer.note{
    margin-top: 56px;
    text-align:center;
    font-size: 11px;
    color: var(--text-tertiary);
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="masthead">
    <h1 class="title">수집가들</h1>
    <p class="tagline">좋은 문장은 다시 찾아옵니다.</p>
  </header>

  <div class="callout">
    <div class="callout-body">
      <div class="input-row">
        <textarea id="quoteInput" rows="1" placeholder="기억하고 싶은 문장을 남겨보세요."></textarea>
        <button id="submitBtn" title="기록하기" aria-label="기록하기">→</button>
      </div>
      <div class="meta-row">
        <div class="meta-field book-field" id="bookField">
          <input id="bookInput" type="text" placeholder="책 제목" list="bookDatalist" autocomplete="off">
          <datalist id="bookDatalist"></datalist>
          <button type="button" class="book-caret" id="bookCaret" title="최근 입력한 책 제목">⌄</button>
          <div class="book-dropdown" id="bookDropdown"></div>
        </div>
        <div class="meta-field page-field">
          <input id="pageInput" type="text" placeholder="페이지">
        </div>
      </div>
      <div class="status-msg" id="statusMsg"></div>
    </div>
  </div>

  <div class="section-head">
    <span class="count-tag" id="groupCountTag"></span>
  </div>

  <div class="grid" id="cardGrid"></div>

</div>

<div class="modal-overlay" id="confirmOverlay">
  <div class="modal-box confirm-box">
    <p class="confirm-message" id="confirmMessage"></p>
    <div class="confirm-actions">
      <button class="confirm-btn confirm-cancel" id="confirmCancel">취소</button>
      <button class="confirm-btn confirm-ok" id="confirmOk">꺼내기</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'truth-groups';

// 👇 Cloudflare Worker 배포 후, 여기에 본인 Worker 주소를 넣어주세요.
// (claude.ai 아티팩트 안에서 미리보기할 때는 이 값이 쓰이지 않고 자동으로 내장 방식이 사용돼요)
const WORKER_URL = "https://truth-collector-proxy.dingapark1.workers.dev";

// 👇 Worker의 Settings > Variables and Secrets에 등록한 SITE_SECRET과 똑같은 값을 넣어주세요.
const SITE_SECRET = "my-cat-2026";

const IS_CLAUDE_ARTIFACT = !!window.storage;

// claude.ai 아티팩트 안에서는 window.storage를,
// 깃허브 페이지 등 밖에서는 Worker + Cloudflare KV(클라우드 저장소)를 사용해서
// 어느 기기에서 열어도 같은 데이터를 볼 수 있게 함
const storageAdapter = {
  async get(key){
    if(IS_CLAUDE_ARTIFACT){
      try{ return await window.storage.get(key, false); }catch(e){ return null; }
    }
    try{
      const res = await fetch(WORKER_URL + "/data", {
        method: "GET",
        headers: { "X-Site-Secret": SITE_SECRET }
      });
      if(!res.ok) return null;
      const value = await res.text();
      return { value };
    }catch(e){
      return null;
    }
  },
  async set(key, value){
    if(IS_CLAUDE_ARTIFACT){
      return await window.storage.set(key, value, false);
    }
    try{
      await fetch(WORKER_URL + "/data", {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Site-Secret": SITE_SECRET },
        body: value
      });
    }catch(e){
      return null;
    }
    return { key, value };
  }
};
let groups = [];

const quoteInput = document.getElementById('quoteInput');
const bookInput = document.getElementById('bookInput');
const pageInput = document.getElementById('pageInput');
const submitBtn = document.getElementById('submitBtn');
const statusMsg = document.getElementById('statusMsg');
const cardGrid = document.getElementById('cardGrid');
const groupCountTag = document.getElementById('groupCountTag');
const bookCaret = document.getElementById('bookCaret');
const bookDropdown = document.getElementById('bookDropdown');
const bookDatalist = document.getElementById('bookDatalist');
const confirmOverlay = document.getElementById('confirmOverlay');
const confirmMessage = document.getElementById('confirmMessage');
const confirmCancel = document.getElementById('confirmCancel');
const confirmOk = document.getElementById('confirmOk');
let confirmResolver = null;

function showConfirm(message){
  confirmMessage.textContent = message;
  confirmOverlay.classList.add('open');
  return new Promise((resolve) => {
    confirmResolver = resolve;
  });
}
function resolveConfirm(result){
  confirmOverlay.classList.remove('open');
  if(confirmResolver){
    confirmResolver(result);
    confirmResolver = null;
  }
}
confirmOk.addEventListener('click', () => resolveConfirm(true));
confirmCancel.addEventListener('click', () => resolveConfirm(false));
confirmOverlay.addEventListener('click', (e) => {
  if(e.target === confirmOverlay) resolveConfirm(false);
});

let dismissedBooks = new Set();

let statusTimer = null;
function showStatus(text, type, autoHideMs){
  clearTimeout(statusTimer);
  statusMsg.classList.remove('loading','success','error','show');
  statusMsg.textContent = text;
  if(type) statusMsg.classList.add(type);
  void statusMsg.offsetWidth; // 리플로우를 강제로 일으켜 트랜지션 재시작
  statusMsg.classList.add('show');
  if(autoHideMs){
    statusTimer = setTimeout(() => {
      statusMsg.classList.remove('show');
    }, autoHideMs);
  }
}

function autoResizeQuoteInput(){
  quoteInput.style.height = 'auto';
  quoteInput.style.height = quoteInput.scrollHeight + 'px';
}
quoteInput.addEventListener('input', autoResizeQuoteInput);
autoResizeQuoteInput();

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function getRecentBooks(limit = 8){
  const all = [];
  groups.forEach(g => {
    (g.bookGroups || []).forEach(bg => {
      const book = (bg.book || '').trim();
      if(!book) return;
      if(dismissedBooks.has(book.toLowerCase())) return;
      const latestTs = bg.quotes.reduce((max,q)=> Math.max(max, q.ts || 0), 0);
      all.push({ book, ts: latestTs });
    });
  });
  all.sort((a,b) => b.ts - a.ts);
  const seen = new Set();
  const result = [];
  for(const item of all){
    const key = item.book.toLowerCase();
    if(!seen.has(key)){
      seen.add(key);
      result.push(item.book);
    }
    if(result.length >= limit) break;
  }
  return result;
}

async function loadDismissedBooks(){
  try{
    const res = await storageAdapter.get('dismissed-books');
    const arr = res && res.value ? JSON.parse(res.value) : [];
    dismissedBooks = new Set(arr);
  }catch(e){
    dismissedBooks = new Set();
  }
}

async function saveDismissedBooks(){
  try{
    await storageAdapter.set('dismissed-books', JSON.stringify([...dismissedBooks]));
  }catch(e){}
}

function refreshBookSuggestions(){
  const recent = getRecentBooks(8);

  bookDatalist.innerHTML = recent.map(b => `<option value="${escapeHtml(b)}"></option>`).join('');

  if(recent.length === 0){
    bookDropdown.innerHTML = `<div class="dropdown-empty">아직 입력한 책이 없습니다</div>`;
  } else {
    bookDropdown.innerHTML = recent.map(b => `
      <div class="book-dropdown-row">
        <button type="button" class="book-dropdown-item" data-book="${escapeHtml(b)}">${escapeHtml(b)}</button>
        <button type="button" class="book-dropdown-remove" data-book="${escapeHtml(b)}" title="추천 목록에서 제거">×</button>
      </div>
    `).join('');
    bookDropdown.querySelectorAll('.book-dropdown-item').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        bookInput.value = btn.dataset.book;
        bookDropdown.classList.remove('open');
        pageInput.focus();
      });
    });
    bookDropdown.querySelectorAll('.book-dropdown-remove').forEach(btn=>{
      btn.addEventListener('click', async (e)=>{
        e.stopPropagation();
        dismissedBooks.add(btn.dataset.book.toLowerCase());
        await saveDismissedBooks();
        refreshBookSuggestions();
      });
    });
  }
}

bookCaret.addEventListener('click', (e)=>{
  e.stopPropagation();
  refreshBookSuggestions();
  bookDropdown.classList.toggle('open');
});
document.addEventListener('click', (e)=>{
  if(!bookDropdown.contains(e.target) && e.target !== bookCaret){
    bookDropdown.classList.remove('open');
  }
});

function migrateGroup(g){
  if(g.bookGroups) return g;
  const map = new Map();
  (g.sources || []).forEach(s => {
    const key = (s.book || '').trim();
    if(!map.has(key)) map.set(key, []);
    map.get(key).push({ text: s.text, page: s.page || '', ts: s.ts || 0 });
  });
  g.bookGroups = Array.from(map.entries()).map(([book, quotes]) => ({ book, quotes }));
  if(g.bookGroups.length === 0){
    g.bookGroups = [{ book: '', quotes: [] }];
  }
  g.count = g.bookGroups.length;
  delete g.sources;
  return g;
}

async function loadGroups(){
  try{
    const res = await storageAdapter.get(STORAGE_KEY);
    groups = res && res.value ? JSON.parse(res.value) : [];

    // 예전 버전(브라우저 저장 방식)을 쓰던 시절, 이 브라우저에만 남아있던 데이터가 있다면
    // 클라우드가 비어있을 때 한 번만 끌어올려서 동기화
    if(!IS_CLAUDE_ARTIFACT && groups.length === 0){
      const legacyRaw = localStorage.getItem(STORAGE_KEY);
      if(legacyRaw){
        try{
          const legacyGroups = JSON.parse(legacyRaw);
          if(Array.isArray(legacyGroups) && legacyGroups.length > 0){
            groups = legacyGroups;
            await storageAdapter.set(STORAGE_KEY, JSON.stringify(groups));
          }
        }catch(e){}
      }
    }

    // 예전 데이터 구조(sources 배열)를 새 구조(책 단위 bookGroups)로 1회성 변환
    let migrated = false;
    groups = groups.map(g => {
      if(!g.bookGroups){ migrated = true; }
      return migrateGroup(g);
    });
    if(migrated){
      await saveGroups();
    }
  }catch(e){
    groups = [];
  }
  await loadDismissedBooks();
  render();
  refreshBookSuggestions();
}

async function saveGroups(){
  try{
    await storageAdapter.set(STORAGE_KEY, JSON.stringify(groups));
  }catch(e){
    showStatus('기록을 저장하지 못했습니다. 잠시 후 다시 시도해주세요.', 'error');
  }
}

function render(pulseId){
  const sorted = [...groups].sort((a,b)=> b.count - a.count);

  if(sorted.length === 0){
    groupCountTag.textContent = '';
    cardGrid.innerHTML = `<div class="empty">
      <div class="empty-title">아직 기록된 문장이 없습니다.</div>
      좋은 문장은<br>언젠가 다른 책에서<br>다시 찾아옵니다.
    </div>`;
    return;
  }

  groupCountTag.textContent = `${sorted.length}개의 문장`;

  cardGrid.innerHTML = sorted.map(g => {
    return `
    <div class="card" data-id="${g.id}">
      <button class="card-delete" data-gid="${g.id}" title="이 기록 전체 꺼내기">×</button>
      <div class="card-summary" data-id="${g.id}">
        <p class="quote-text">“${escapeHtml(g.canonical)}”</p>
        <p class="discover-meta"><span class="caret">▸</span>${g.count}권에서 발견되었습니다</p>
      </div>
      <div class="detail" id="detail-${g.id}">
        ${g.bookGroups.map((bg, bidx) => `
          <div class="book-block">
            <div class="book-name">${escapeHtml(bg.book || '출처 미상')}</div>
            ${sortedQuoteIndices(bg.quotes).map(({ q, idx: qidx }) => `
              <div class="quote-entry">
                <p class="quote-entry-text">“${escapeHtml(q.text)}”</p>
                ${q.page ? `<p class="quote-entry-meta">p.${escapeHtml(q.page)}</p>` : ''}
                ${q.note ? `<div class="quote-entry-note"><span class="note-label">그때의 생각</span>${escapeHtml(q.note)}</div>` : ''}
                <button class="entry-delete" data-gid="${g.id}" data-bidx="${bidx}" data-qidx="${qidx}" title="이 문장 꺼내기">×</button>
              </div>
            `).join('')}
          </div>
        `).join('')}
      </div>
    </div>
  `;
  }).join('');

  cardGrid.querySelectorAll('.card-summary').forEach(el=>{
    el.addEventListener('click', ()=>{
      const detailEl = document.getElementById(`detail-${el.dataset.id}`);
      detailEl.classList.toggle('open');
      el.classList.toggle('open');
    });
  });
  cardGrid.querySelectorAll('.entry-delete').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      if(!(await showConfirm('이 문장을 기록에서 꺼내시겠습니까?'))) return;
      const gid = btn.dataset.gid;
      const bidx = parseInt(btn.dataset.bidx, 10);
      const qidx = parseInt(btn.dataset.qidx, 10);
      const g = groups.find(x => x.id === gid);
      if(!g) return;
      const bg = g.bookGroups[bidx];
      if(!bg) return;

      bg.quotes.splice(qidx, 1);
      if(bg.quotes.length === 0){
        g.bookGroups.splice(bidx, 1);
      }
      g.count = g.bookGroups.length;
      if(g.count === 0){
        groups = groups.filter(x => x.id !== gid);
      }

      await saveGroups();
      render();
    });
  });
  cardGrid.querySelectorAll('.card-delete').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      if(!(await showConfirm('이 기록 전체를 꺼내시겠습니까?'))) return;
      const gid = btn.dataset.gid;
      groups = groups.filter(x=>x.id!==gid);
      await saveGroups();
      render();
    });
  });
}

function sortedQuoteIndices(quotes){
  return quotes
    .map((q, idx) => ({ q, idx }))
    .sort((a, b) => {
      const pa = parseInt(a.q.page, 10);
      const pb = parseInt(b.q.page, 10);
      const aValid = !isNaN(pa);
      const bValid = !isNaN(pb);
      if(aValid && bValid) return pa - pb;
      if(aValid) return -1;
      if(bValid) return 1;
      return 0;
    });
}

function representativeQuotes(g, limit = 4){
  const all = [];
  g.bookGroups.forEach(bg => bg.quotes.forEach(q => all.push(q.text)));
  return all.slice(-limit);
}

async function classifyQuote(quoteText){
  const existing = groups.map(g => ({
    id: g.id,
    canonical: g.canonical,
    examples: representativeQuotes(g, 4)
  }));

  const systemPrompt = `당신은 문장의 의미를 분석해 유사한 인생 교훈/진리끼리 묶는 분류기입니다.
사용자가 새 문장을 입력하면, 기존 그룹 목록(대표 문구 + 예시 문장들)과 의미가 사실상 같은 교훈을 말하는지 판단하세요.
표현이 달라도 핵심 메시지가 같으면 매칭시킵니다 (예: "돈을 좇지 마라"와 "부를 추구하지 말라"는 같은 그룹). 예시 문장들과 새 문장이 실제로는 결이 다른 이야기라면 매칭시키지 마세요.
매칭되는 그룹이 있다면, 그 그룹의 예시 문장들 + 새 문장을 모두 참고해서 그룹 전체 의미를 가장 잘 대표하는 대표 문구를 새로 다듬어 "updatedCanonical"에 담아주세요 (기존 canonical을 그대로 유지해도 되고 조금 더 정확하게 다듬어도 됩니다. 15자 내외 한국어).
매칭되는 그룹이 없다면 matchedId를 null로 하고, 새 문장 자체를 대표하는 대표 문구를 "canonical"에 담아주세요.
반드시 아래 JSON 형식으로만 응답하고 다른 텍스트는 절대 포함하지 마세요:
{"matchedId": "기존 그룹 id 또는 null", "canonical": "새 그룹일 때 쓸 대표 문구", "updatedCanonical": "매칭된 그룹일 때 갱신할 대표 문구"}`;

  const userPrompt = `기존 그룹 목록:
${JSON.stringify(existing, null, 2)}

새 문장: "${quoteText}"`;

  const endpoint = IS_CLAUDE_ARTIFACT
    ? "https://api.anthropic.com/v1/messages"
    : WORKER_URL;

  const response = await fetch(endpoint, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{ role: "user", content: userPrompt }]
    })
  });

  if(!response.ok){
    throw new Error('API 오류');
  }

  const data = await response.json();
  const textBlock = data.content.find(c => c.type === 'text');
  if(!textBlock) throw new Error('응답 파싱 실패');

  const cleaned = textBlock.text.replace(/```json|```/g, '').trim();
  return JSON.parse(cleaned);
}

async function handleSubmit(){
  const quoteText = quoteInput.value.trim();
  if(!quoteText){
    showStatus('기록할 문장을 적어주세요.', 'error');
    return;
  }

  const book = bookInput.value.trim();
  const page = pageInput.value.trim();

  submitBtn.disabled = true;
  showStatus('문장을 기록하는 중입니다...', 'loading');

  try{
    const result = await classifyQuote(quoteText);
    let targetId = null;

    if(result.matchedId && groups.some(g => g.id === result.matchedId)){
      const g = groups.find(g => g.id === result.matchedId);
      const bookKey = book.toLowerCase();
      let bookGroup = g.bookGroups.find(bg => (bg.book || '').toLowerCase() === bookKey);

      if(bookGroup){
        bookGroup.quotes.push({ text: quoteText, page, ts: Date.now() });
      } else {
        bookGroup = { book, quotes: [{ text: quoteText, page, ts: Date.now() }] };
        g.bookGroups.push(bookGroup);
      }

      g.count = g.bookGroups.length;
      g.canonical = result.updatedCanonical || result.canonical || g.canonical;
      targetId = g.id;
    } else {
      const newGroup = {
        id: 'g_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
        canonical: result.canonical || quoteText,
        count: 1,
        bookGroups: [{ book, quotes: [{ text: quoteText, page, ts: Date.now() }] }]
      };
      groups.push(newGroup);
      targetId = newGroup.id;
    }

    await saveGroups();
    render(targetId);
    refreshBookSuggestions();
    showStatus('문장을 기록했습니다.', 'success', 2000);

    quoteInput.value = '';
    autoResizeQuoteInput();
    bookInput.value = '';
    pageInput.value = '';
    quoteInput.focus();
  }catch(e){
    console.error('classifyQuote 실패:', e);
    // AI 분석이 실패해도(사용량 초과 등) 문장 자체는 잃어버리지 않도록 새 그룹으로 저장
    const newGroup = {
      id: 'g_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      canonical: quoteText,
      count: 1,
      bookGroups: [{ book, quotes: [{ text: quoteText, page, ts: Date.now() }] }],
      unclassified: true
    };
    groups.push(newGroup);
    await saveGroups();
    render(newGroup.id);
    refreshBookSuggestions();
    showStatus('우선 기록해두었습니다. (분류는 다음에 다시 시도할게요)', 'error', 4000);

    quoteInput.value = '';
    autoResizeQuoteInput();
    bookInput.value = '';
    pageInput.value = '';
    quoteInput.focus();
  }finally{
    submitBtn.disabled = false;
  }
}

submitBtn.addEventListener('click', handleSubmit);
quoteInput.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    handleSubmit();
  }
});
bookInput.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter'){
    e.preventDefault();
    handleSubmit();
  }
});
pageInput.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter'){
    e.preventDefault();
    handleSubmit();
  }
});

loadGroups();
</script>
